<script>
const CHAPTER_KEY = 'review_ch02';
const parasData = [{"id": 0, "lines": [{"text": "第一接触圧痕が湖になり始めたころ、百川十々瀬はもう別の景色を見ていた。", "is_dialogue": false, "cls": "narration"}]}, {"id": 1, "lines": [{"text": "つい先ほどまで三百キロメートル級と記録されていた彼女の身体は、さらに大きくなっていた。理由はわからない。原因は記録されない。ただ結果だけが地図に残った。", "is_dialogue": false, "cls": "narration"}, {"text": "列島の中央部に横たわる彼女の影は、複数の地方をまたいでいた。足先は海へ届き、膝は山脈の上にあり、腰のあたりで雲帯が裂け、肩は成層圏の暗い青へ沈んでいる。", "is_dialogue": false, "cls": "narration"}, {"text": "その身体の前面では、胸元が五百キロメートルという身長に見合わないほど強い存在感を持って張り出していた。衛星画像では、彼女の上半身前面に沿って巨大な弧が走り、その影が山地から都市圏へゆっくり移動しているように見えた。", "is_dialogue": false, "cls": "narration"}]}, {"id": 2, "lines": [{"text": "十々瀬は自分の手を顔の近くへ持ち上げ、まじまじと眺めた。", "is_dialogue": false, "cls": "narration"}, {"text": "「また大きくなってる」", "is_dialogue": true, "cls": "dialogue"}, {"text": "声は明るかった。困惑よりも、発見の方がずっと強い。", "is_dialogue": false, "cls": "narration"}, {"text": "指先を曲げる。伸ばす。掌をひらひらさせる。爪の先に引っかかっていた雲が千切れ、下の山岳地帯へ白く落ちていく。", "is_dialogue": false, "cls": "narration"}, {"text": "「さっきより、街が細かく見えないかも」", "is_dialogue": true, "cls": "dialogue"}, {"text": "彼女は地上を覗き込んだ。その姿勢では胸元のふくらみが先に前へせり出すが、彼女の目線はその上から十分に地表を見下ろせていた。首都圏の上空はまず大きな影に覆われ、ついで胸部下面が都市圏外縁の地表へ広く触れ、雲帯と空気が押し分けられた。", "is_dialogue": false, "cls": "narration"}]}, {"id": 3, "lines": [{"text": "さっきまでは、都市は灰色の染みに見えた。今はもっと薄い。模様というより、地面に走った色の濃淡だった。道路や鉄道は髪の毛より細く、川は光る皺。高層ビル街ですら、遠目には布地の凹凸ほどにしか見えない。", "is_dialogue": false, "cls": "narration"}, {"text": "だが、その中にひとつ、ひときわ濃い灰色の塊があった。首都圏。広大な湾を抱え、放射状に伸びる鉄道と高速道路を持ち、行政、金融、報道、通信、軍事指揮の中枢が密集する、最大級の都市圏だった。十々瀬には、大きな刺繍の模様に見えた。", "is_dialogue": false, "cls": "narration"}, {"text": "「ここ、なんか密集してる。おもしろそう」", "is_dialogue": true, "cls": "dialogue"}]}, {"id": 4, "lines": [{"text": "庁舎の上層階では、モニターに十々瀬の身体を示す輪郭線が表示されていた。だがその輪郭線は、画面に収まりきっていなかった。", "is_dialogue": false, "cls": "narration"}]}, {"id": 5, "lines": [{"text": "十々瀬の人差し指が、首都の北西からゆっくり降りてきた。指の腹だけで、都市の外縁部を覆うほどの広さがある。風圧で雲が逃げ、ヘリコプター部隊は接近前に姿勢を崩した。高層ビル群のガラスは、まだ触れられる前から震え始めた。", "is_dialogue": false, "cls": "narration"}, {"text": "「まず、ここから」", "is_dialogue": true, "cls": "dialogue"}, {"text": "十々瀬は指先を地表へ置いた。", "is_dialogue": false, "cls": "narration"}, {"text": "首都の外れを走る環状道路の一部が消えた。", "is_dialogue": false, "cls": "narration"}]}, {"id": 6, "lines": [{"text": "十々瀬は指を横へ滑らせる。たった数十センチ。彼女にとっては、布の表面をなぞるような動きだった。地上では、それが数十キロメートルの破壊線になった。高速道路は途切れ、鉄道は線路ごと剥がれ、川は堰き止められ、地下に張り巡らされた管路と駅施設がまとめて露出した。都市の表面に、巨大な指紋の溝が刻まれていく。", "is_dialogue": false, "cls": "narration"}, {"text": "「線、さっきより太いね」", "is_dialogue": true, "cls": "dialogue"}, {"text": "十々瀬は嬉しそうに言った。", "is_dialogue": false, "cls": "narration"}]}, {"id": 7, "lines": [{"text": "彼女はそのまま、首都の中心へ向かって指を進めた。中心業務地区の超高層ビル群が、指の進路に入った。地上三百メートル級のビル、展望台、電波塔、大規模駅。複数の地下路線が交差する巨大ターミナル。十々瀬にとっては、少し濃い灰色の盛り上がりだった。", "is_dialogue": false, "cls": "narration"}, {"text": "「でこぼこしてる」", "is_dialogue": true, "cls": "dialogue"}, {"text": "彼女は爪先で、軽く弾いた。", "is_dialogue": false, "cls": "narration"}, {"text": "展望塔が折れた。根元からではない。彼女の爪に触れた中ほどから、飴細工のようにしなり、上部構造が隣のビル群へ倒れ込んだ。倒壊は連鎖し、周囲の高層建築が互いにぶつかり、ガラスと鉄骨の雲を上げながら沈んでいく。", "is_dialogue": false, "cls": "narration"}, {"text": "「わ、倒れた」", "is_dialogue": true, "cls": "dialogue"}, {"text": "十々瀬は目を輝かせた。そして、もう一度弾いた。今度はすぐ隣の街区が消えた。ビル群がまとめて座屈し、地下へつながる構造物が押し込まれ、通信用の鉄塔が倒れていった。", "is_dialogue": false, "cls": "narration"}]}, {"id": 8, "lines": [{"text": "軍の航空部隊は攻撃を開始した。", "is_dialogue": false, "cls": "narration"}, {"text": "十々瀬には、細い光の粒に見えた。", "is_dialogue": false, "cls": "narration"}, {"text": "「ん？」", "is_dialogue": true, "cls": "dialogue"}, {"text": "ミサイルが彼女の手の甲で爆ぜた。小さな光。小さな煙。ほんの少しの熱。十々瀬は手を止めた。", "is_dialogue": false, "cls": "narration"}, {"text": "「なにこれ。ちくってした」", "is_dialogue": true, "cls": "dialogue"}, {"text": "彼女は手の甲を顔に近づけた。そこに残っていた煤は、ほくろにも満たない。戦闘機の編隊は、彼女の視界では細かな虫の群れのように旋回していた。", "is_dialogue": false, "cls": "narration"}, {"text": "「あ、飛んでる」", "is_dialogue": true, "cls": "dialogue"}, {"text": "十々瀬は息を吹きかけた。ただ、軽く。手の上の埃を払うくらいのつもりだった。しかし五百キロメートル級の彼女の吐息は、局地的な暴風では済まなかった。戦闘機群は航跡ごと乱され、何機もが姿勢を失い、雲の裂け目へ吸い込まれるように散っていった。首都圏上空の雲は半円形に吹き払われ、地上ではビル風をはるかに超える突風が街路を走った。", "is_dialogue": false, "cls": "narration"}, {"text": "「飛んでっちゃった」", "is_dialogue": true, "cls": "dialogue"}, {"text": "その声に、まだ立っていた高層ビルのガラスが雨のように落ちた。", "is_dialogue": false, "cls": "narration"}]}, {"id": 9, "lines": [{"text": "軍は次に、長距離誘導弾を使用した。複数の基地から発射された弾体が、弾道を描いて十々瀬の肩と首元へ向かう。だが、十々瀬は空を横切る光を見つけて、ぱっと笑った。", "is_dialogue": false, "cls": "narration"}, {"text": "「花火？」", "is_dialogue": true, "cls": "dialogue"}, {"text": "彼女は手を伸ばした。掌が弾道の前に広がる。ミサイル群は、彼女の掌の前で次々と爆ぜた。赤と白の閃光が、雲より高い場所で小さく咲く。", "is_dialogue": false, "cls": "narration"}, {"text": "「きれい」", "is_dialogue": true, "cls": "dialogue"}, {"text": "十々瀬は本当にそう思った。そして、もっと見たくなった。", "is_dialogue": false, "cls": "narration"}, {"text": "「もう一回やってくれないかな」", "is_dialogue": true, "cls": "dialogue"}, {"text": "地上の司令系統は沈黙した。通信線は破断し、基地の滑走路は地震動で亀裂を走らせ、湾岸の弾薬庫は津波警報で閉鎖されていた。彼女が期待する二度目の花火を、すぐには用意できなかった。", "is_dialogue": false, "cls": "narration"}, {"text": "「ないの？」", "is_dialogue": true, "cls": "dialogue"}, {"text": "十々瀬は少しつまらなそうに首を傾げた。", "is_dialogue": false, "cls": "narration"}]}, {"id": 10, "lines": [{"text": "少しつまらなそうに首を傾げた十々瀬。その拍子に、白い髪のひと房が首都東部の上空へ垂れた。巨大な吊り橋のように空を横切り、地表をかすめた。髪の先端が臨海部に触れる。それだけで、港湾倉庫群が薙ぎ払われた。コンテナヤードは色とりどりの粉のように散り、埋立地の道路は波打ち、空港の滑走路には長い擦過痕が刻まれた。駐機していた航空機は紙片のように転がり、管制塔は根元から折れた。", "is_dialogue": false, "cls": "narration"}, {"text": "「あ、髪ついちゃった」", "is_dialogue": true, "cls": "dialogue"}, {"text": "十々瀬は髪を払った。その動きで、湾岸の水面が大きく押し出され、人工島の一部が沈んだ。", "is_dialogue": false, "cls": "narration"}]}, {"id": 11, "lines": [{"text": "彼女は首都の中心に戻る。さっき指で引いた溝が、もう水を集め始めていた。地下鉄の路線は露出し、一部は川のように水を流している。駅の吹き抜けは陥没湖になり、地下街は泥と瓦礫で埋まりつつあった。", "is_dialogue": false, "cls": "narration"}, {"text": "「迷路みたい」", "is_dialogue": true, "cls": "dialogue"}, {"text": "十々瀬は指先で、別の線を引いた。今度は湾へ向かって。指跡は都市を斜めに裂き、河川と運河と地下道をつなげ、巨大な排水路のようになった。水が流れ込む。瓦礫が流れる。ビルの残骸が傾き、橋脚が折れ、都市の内部へ海が入り始めた。", "is_dialogue": false, "cls": "narration"}]}, {"id": 12, "lines": [{"text": "十々瀬は、環状の路線図を思い浮かべた。山手線。人で混み合う駅のホーム。黄緑色のライン。何駅も過ぎて最初の場所へ戻ってくる、輪っかの電車。", "is_dialogue": false, "cls": "narration"}, {"text": "「山手線、だっけ」", "is_dialogue": true, "cls": "dialogue"}, {"text": "十々瀬は楽しそうに目を細めた。地上の山手線はすでに原形を失っていたが、彼女は環状の路線をよく知っていた。", "is_dialogue": false, "cls": "narration"}, {"text": "「たしか、こう」", "is_dialogue": true, "cls": "dialogue"}, {"text": "十々瀬は人差し指をそっと下ろした。首都中心部の西側から、南へ。そこから湾岸寄りへ曲がり、東へ。さらに北へ回り込み、また西へ戻る。彼女にとっては、頭の中の線をなぞっているだけだった。しかし、五百キロメートル級の指先が描く円は、実際の山手線よりはるかに巨大だった。都心を丸ごと囲み、周辺都市を巻き込み、河川と高速道路と地下鉄網をまとめて切断する、直径数十キロの環状指溝が生まれていく。", "is_dialogue": false, "cls": "narration"}, {"text": "線路の跡は消えた。代わりに、深さ数百メートルの巨大な溝が首都を取り囲んだ。駅だった場所は圧力の節目で丸い陥没湖となり、かつて線路が曲がっていた地点では、地盤が大きくえぐれて湾の水が流れ込んだ。", "is_dialogue": false, "cls": "narration"}]}, {"id": 13, "lines": [{"text": "十々瀬は、途中で少し首を傾げた。", "is_dialogue": false, "cls": "narration"}, {"text": "「んー、こんな形だったかな。まあ、だいたい合ってるよね」", "is_dialogue": true, "cls": "dialogue"}, {"text": "彼女は環状の溝をもう一周なぞった。二周目で、溝はさらに深くなった。内側の地盤が沈み、外側の都市区画が盛り上がり、首都の中心部は巨大な堀に囲まれた島のようになった。だがその島も、すでに島と呼べるほど整った形ではない。掌圧痕、指溝、陥没湖、瓦礫の丘が重なった、灰色の地形だった。", "is_dialogue": false, "cls": "narration"}, {"text": "「できた」", "is_dialogue": true, "cls": "dialogue"}, {"text": "十々瀬は満足そうに指を上げた。地図上には、かつての山手線よりもずっと大きく、ずっと深く、ずっと荒々しい円が刻まれていた。", "is_dialogue": false, "cls": "narration"}, {"text": "「山手線じゃなくて……十々瀬線、かな」", "is_dialogue": true, "cls": "dialogue"}, {"text": "彼女は自分で言って、くすっと笑った。", "is_dialogue": false, "cls": "narration"}]}, {"id": 14, "lines": [{"text": "旧首都中心部を囲む巨大環状陥没帯。もちろん、それは鉄道ではなかった。列車が走ることはない。駅に人が並ぶこともない。内回りも外回りもない。ただ、百川十々瀬が指でなぞった、巨大な傷だった。", "is_dialogue": false, "cls": "narration"}]}, {"id": 15, "lines": [{"text": "十々瀬は、ふと自分の胸元に視線を落とした。しゃがんだ姿勢で身体を支えていたため、胸元が都市の外縁に近づいていた。その丸みは、地上から見れば山脈よりもなだらかで、山脈よりも大きい。五百キロメートル級になった今、その曲面はひとつの気象現象のように空を覆い、接地すれば都市圏の外周をまとめて押し沈めるほどだった。", "is_dialogue": false, "cls": "narration"}, {"text": "「ここ、当たるかな」", "is_dialogue": true, "cls": "dialogue"}, {"text": "彼女は少し身体を前へ傾けた。柔らかな影が、首都圏の西側を覆った。地上では、昼が消えた。圧力はゆっくり降りてきた。山裾の住宅都市、研究学園都市、物流基地、郊外鉄道の終端駅。すべてが広い弧を描いて沈み始める。地盤は押され、川は逆流し、高架道路は途中から下向きに曲がった。", "is_dialogue": false, "cls": "narration"}, {"text": "足や掌のように一点から潰れるのではない。巨大な丸い面が、都市の端を静かに包み込むように降りてくる。高層住宅群は上から叩かれる前に基礎ごと傾き、丘陵地のニュータウンは地盤ごと滑り、道路網は胸元の曲率に沿うように弧を描いて裂けた。", "is_dialogue": false, "cls": "narration"}, {"text": "接地。衝撃ではなく、圧迫だった。都市の外縁は、巨大な丸い低地へ変わっていく。ビルの上層階から潰れるのではない。地面そのものが下がり、構造物が基礎ごと傾き、街全体がひとつの窪みへ沈んでいく。接地帯の中心では、街区の直線が消えた。碁盤目の道路は丸みに合わせて曲がり、地下鉄の終端駅は圧痕の底へ沈み、研究施設のドーム屋根は地盤の傾きに引きずられて半分だけ土に埋まった。", "is_dialogue": false, "cls": "narration"}, {"text": "「わ、やっぱり跡つく」", "is_dialogue": true, "cls": "dialogue"}, {"text": "十々瀬は笑った。その笑い声で、周囲の雲が輪のように広がった。", "is_dialogue": false, "cls": "narration"}]}, {"id": 16, "lines": [{"text": "軍の残存部隊は、最後の迎撃を試みた。首都圏外縁に残る複数の発射地点から、大型弾頭が放たれる。都市の上空を裂く白い線。目標は、彼女の接地点付近だった。しかし、十々瀬はそれを横目で見て、指を一本伸ばした。", "is_dialogue": false, "cls": "narration"}, {"text": "「また花火？」", "is_dialogue": true, "cls": "dialogue"}, {"text": "指先が弾道を遮った。爆発が、彼女の爪の先で弾けた。爪の表面に、ほんの小さな焦げ跡が残る。", "is_dialogue": false, "cls": "narration"}, {"text": "「熱っ」", "is_dialogue": true, "cls": "dialogue"}, {"text": "十々瀬は指を振った。その何気ない動きで、大気が裂けた。衝撃波が首都圏の残骸を横断し、まだ残っていた高架橋をまとめて倒した。湾の水面は逆立ち、炎上していた地区の煙が一方向へ流れ、地上の通信は完全に途絶した。", "is_dialogue": false, "cls": "narration"}, {"text": "「びっくりした。ちょっと痛かったかも」", "is_dialogue": true, "cls": "dialogue"}, {"text": "彼女はむっとした。怒りというより、遊んでいた玩具が指先を刺したときのような顔だった。", "is_dialogue": false, "cls": "narration"}, {"text": "「じゃあ、ここ、平らにしちゃお」", "is_dialogue": true, "cls": "dialogue"}]}, {"id": 17, "lines": [{"text": "十々瀬は掌を広げた。首都の中心部が、すっぽり影に入った。五百キロメートル級の彼女の掌は、都市の中枢を覆うには十分すぎるほど大きかった。指の間からわずかに光が漏れ、そこにビルの影が細く伸びる。", "is_dialogue": false, "cls": "narration"}, {"text": "そして、掌が降りた。空気が逃げた。暴風が外周へ吹き抜け、残っていた建物を先に倒した。次に、掌そのものの圧力が都市へ乗った。超高層ビルは高さを失い、駅も道路も地下施設も区別をなくしていく。地表は、彼女の掌紋に沿って波打った。生命線のような深い溝が河川を曲げ、指の付け根の圧力が複数の区画を湖底へ変え、掌の中央部は広大な平坦地になった。", "is_dialogue": false, "cls": "narration"}, {"text": "十々瀬が手を上げたとき、首都中心部はもう都市ではなかった。掌の形をした巨大な窪地だった。", "is_dialogue": false, "cls": "narration"}, {"text": "「きれいに平らになった」", "is_dialogue": true, "cls": "dialogue"}, {"text": "彼女は満足そうに言った。", "is_dialogue": false, "cls": "narration"}, {"text": "その日、旧首都中心線は地図から消えた。巨大な掌の形をした窪地だけが残った。", "is_dialogue": false, "cls": "narration"}]}, {"id": 18, "lines": [{"text": "十々瀬は自分の手の跡をしばらく眺めていた。足跡。指跡。接触圧痕。掌の跡。世界に、自分の形が増えていく。それがたまらなく面白かった。", "is_dialogue": false, "cls": "narration"}, {"text": "「もっといろんな跡、残せるかな」", "is_dialogue": true, "cls": "dialogue"}, {"text": "彼女は立ち上がった。立ち上がるだけで、海から風が流れ込み、首都圏だった盆地に水が入り始めた。湾は拡張され、河口は変わり、都市の残骸は新しい海岸線の一部になっていく。", "is_dialogue": false, "cls": "narration"}, {"text": "十々瀬は遠くの山脈を見た。さっきは大きく見えた山々が、今は低い皺のように見えた。自分はまだ大きくなっている。その事実に、彼女は不安ではなく期待を覚えた。", "is_dialogue": false, "cls": "narration"}, {"text": "「次は、寝転んでみよっかな」", "is_dialogue": true, "cls": "dialogue"}]}, {"id": 19, "lines": [{"text": "それは宣言ではない。脅迫でもない。ただの思いつきだった。だがそれは、次の災害の予告でもあった。", "is_dialogue": false, "cls": "narration"}]}];

let reviewData = {};

function loadReviewData() {
  try {
    const raw = localStorage.getItem(CHAPTER_KEY);
    if (raw) reviewData = JSON.parse(raw);
  } catch(e) { reviewData = {}; }
}
function saveReviewData() {
  localStorage.setItem(CHAPTER_KEY, JSON.stringify(reviewData));
  updateStats();
}

function getStatus(pid) {
  return (reviewData[pid] && reviewData[pid].status) || 'pending';
}
function getComment(pid) {
  return (reviewData[pid] && reviewData[pid].comment) || '';
}

function markFix(pid) {
  const c = document.getElementById('comment-' + pid);
  reviewData[pid] = { status: 'fix', comment: c ? c.value : getComment(pid) };
  saveReviewData();
  render();
}
function markOK(pid) {
  const c = document.getElementById('comment-' + pid);
  reviewData[pid] = { status: 'ok', comment: c ? c.value : getComment(pid) };
  saveReviewData();
  render();
}
function saveComment(pid) {
  const c = document.getElementById('comment-' + pid);
  reviewData[pid] = { status: getStatus(pid), comment: c ? c.value : '' };
  saveReviewData();
}
function clearPara(pid) {
  delete reviewData[pid];
  saveReviewData();
  render();
}

let currentFilter = 'all';
function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.toolbar button').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + f).classList.add('active');
  render();
}

function getFilteredParas() {
  if (currentFilter === 'all') return parasData;
  if (currentFilter === 'pending') return parasData.filter(p => getStatus(p.id) === 'pending');
  if (currentFilter === 'fix') return parasData.filter(p => getStatus(p.id) === 'fix');
  if (currentFilter === 'ok') return parasData.filter(p => getStatus(p.id) === 'ok');
  return parasData;
}

function render() {
  const container = document.getElementById('container');
  const filtered = getFilteredParas();
  let html = '';
  filtered.forEach(para => {
    const s = getStatus(para.id);
    let cls = '';
    if (s === 'fix') cls = ' needs-fix';
    else if (s === 'ok') cls = ' marked-ok';
    html += '<div class="para-block' + cls + '" id="p-' + para.id + '" onclick="selectPara(' + para.id + ', event)">';
    html += '<div class="para-meta"><span class="para-id">#' + (para.id + 1) + '</span>';
    html += '<span class="status-tags">';
    if (s === 'fix') html += '<span class="tag-fix">要修正</span>';
    if (s === 'ok') html += '<span class="tag-ok">OK</span>';
    html += '</span></div>';
    para.lines.forEach(line => {
      html += '<div class="line ' + line.cls + '">' + esc(line.text) + '</div>';
    });
    html += '<div class="review-panel"><textarea id="comment-' + para.id + '" placeholder="レビューコメント...">' + esc(getComment(para.id)) + '</textarea>';
    html += '<div class="btn-row">';
    html += '<button class="fix" onclick="event.stopPropagation();markFix(' + para.id + ')">要修正</button>';
    html += '<button class="ok" onclick="event.stopPropagation();markOK(' + para.id + ')">OK</button>';
    html += '<button class="savecomment" onclick="event.stopPropagation();saveComment(' + para.id + ')">コメント保存</button>';
    html += '<button onclick="event.stopPropagation();clearPara(' + para.id + ')">クリア</button>';
    html += '</div></div></div>';
  });
  container.innerHTML = html;
  updateStats();
}

function selectPara(pid, e) {
  const el = document.getElementById('p-' + pid);
  if (el) {
    const wasSelected = el.classList.contains('selected');
    document.querySelectorAll('.para-block').forEach(p => p.classList.remove('selected'));
    if (!wasSelected) el.classList.add('selected');
  }
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function updateStats() {
  const total = parasData.length;
  let fix = 0, ok = 0, pending = 0;
  parasData.forEach(p => {
    const s = getStatus(p.id);
    if (s === 'fix') fix++;
    else if (s === 'ok') ok++;
    else pending++;
  });
  const reviewed = fix + ok;
  const pct = total > 0 ? Math.round(reviewed / total * 100) : 0;
  document.getElementById('stats').textContent = 'レビュー済: ' + reviewed + '/' + total + ' (OK:' + ok + ' / 要修正:' + fix + ' / 未:' + pending + ')';
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = reviewed + '/' + total + ' (' + pct + '%)';
}

function exportData() {
  const lines = [];
  parasData.forEach(p => {
    const s = getStatus(p.id);
    const c = getComment(p.id);
    if (s !== 'pending' || c) {
      lines.push('--- #' + (p.id + 1) + ' [' + (s === 'fix' ? '要修正' : s === 'ok' ? 'OK' : '未') + '] ---');
      if (c) lines.push('コメント: ' + c);
      p.lines.forEach(line => lines.push(line.text));
      lines.push('');
    }
  });
  const blob = new Blob([lines.join('\n')], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'review_ch02.txt';
  a.click();
}

function copyCommentSummary() {
  let lines = [];
  parasData.forEach(p => {
    const s = getStatus(p.id);
    const c = getComment(p.id);
    if (s !== 'pending' || c) {
      lines.push('#' + (p.id + 1) + ' [' + (s === 'fix' ? '要修正' : s === 'ok' ? 'OK' : '未') + ']');
      if (c) lines.push('  ' + c);
    }
  });
  navigator.clipboard.writeText(lines.join('\n'));
  alert('コメント一覧をコピーしました');
}

// Init
loadReviewData();
render();
</script>
</body>
</html>
