<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>第13話 Codex改修試作 v2 レビューUI</title>
<style>
:root{--bg:#101114;--panel:#181c21;--panel2:#222832;--ink:#eef3f8;--muted:#aeb8c4;--line:#303946;--accent:#f0a6c8;--accent2:#82d7ff;--good:#75dc98;--warn:#ffbf69;--bad:#ff8585;--hold:#c8aeff;--dialogue:#211a23}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(180deg,#111419 0,#0d0f12 100%);color:var(--ink);font-family:"Yu Gothic UI","Hiragino Sans","Meiryo",sans-serif;line-height:1.78}
header{position:sticky;top:0;z-index:50;background:rgba(14,16,19,.94);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:14px 16px}
.wrap{max-width:1120px;margin:0 auto;padding:16px}
.title{font-size:22px;font-weight:850;letter-spacing:0}
.sub{color:var(--muted);font-size:14px;margin-top:2px}
.toolbar{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
button{appearance:none;border:0;cursor:pointer;font:inherit}
.topbtn{min-height:42px;padding:9px 12px;border-radius:8px;background:var(--panel2);color:var(--ink);border:1px solid var(--line);font-weight:750}
.topbtn:hover{outline:2px solid rgba(240,166,200,.28)}
.stats{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.stat{background:#171b20;border:1px solid var(--line);border-radius:999px;padding:7px 11px;color:var(--muted);font-size:13px}
.note{background:rgba(240,166,200,.1);border:1px solid rgba(240,166,200,.28);border-radius:8px;padding:12px 14px;margin-top:12px;color:#f4dce8}
main{padding:14px 0 42px}
.card{background:rgba(24,28,33,.96);border:1px solid var(--line);border-radius:8px;padding:16px;margin-bottom:14px;box-shadow:0 14px 34px rgba(0,0,0,.18)}
.card.dialogue{background:linear-gradient(180deg,rgba(38,26,43,.98),rgba(26,28,34,.98));border-color:#49364f}
.head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:10px}
.pid{font-size:20px;font-weight:850;color:var(--accent)}
.dialogue .pid{color:var(--warn)}
.badge{display:inline-flex;align-items:center;border-radius:999px;padding:7px 11px;font-size:13px;font-weight:850;border:1px solid var(--line)}
.state-none{background:#232832;color:var(--muted)}
.state-ok{background:rgba(117,220,152,.16);color:#b8ffd0;border-color:rgba(117,220,152,.4)}
.state-review{background:rgba(255,133,133,.16);color:#ffc3c3;border-color:rgba(255,133,133,.42)}
.state-hold{background:rgba(200,174,255,.16);color:#e4d6ff;border-color:rgba(200,174,255,.42)}
.para{font-size:19px;background:#11161b;border:1px solid #29333d;border-radius:8px;padding:15px;margin:10px 0 14px;white-space:pre-wrap}
.controls{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.pill{padding:8px 11px;border-radius:999px;background:#26303a;color:#dfe9f2;border:1px solid #34424f;font-weight:720;min-height:38px}
.pill.active{background:#4b3546;border-color:var(--accent);box-shadow:0 0 0 2px rgba(240,166,200,.18) inset;color:#fff}
.row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.big{min-height:48px;border-radius:8px;font-weight:900;border:1px solid var(--line)}
.ok{background:rgba(117,220,152,.18);color:#c7ffd8}
.review{background:rgba(255,133,133,.18);color:#ffd0d0}
.hold{background:rgba(200,174,255,.18);color:#eadfff}
.clear{background:#242a31;color:#d3dbe4}
details{margin-top:10px;border-top:1px dashed #374450;padding-top:10px}
summary{cursor:pointer;color:var(--muted);font-weight:760}
textarea{width:100%;margin-top:10px;min-height:84px;border-radius:8px;border:1px solid #3d4b59;background:#0f1317;color:var(--ink);padding:12px;font:inherit}
.hidden{display:none!important}
footer{color:var(--muted);padding:22px 0 8px;font-size:13px}
a{color:#ffd1e4}
@media (max-width:720px){.row{grid-template-columns:1fr 1fr}.para{font-size:17px}.title{font-size:19px}.wrap{padding:12px}}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <div class="title">第13話 Codex改修試作 v2 レビューUI</div>
    <div class="sub">銀河をかき混ぜる / 指摘反映版。段落単位で確認できます。</div>
    <div class="toolbar">
      <button class="topbtn" id="filter-all">全部表示</button>
      <button class="topbtn" id="filter-review">要修正だけ</button>
      <button class="topbtn" id="filter-unchecked">未チェックだけ</button>
      <button class="topbtn" id="toggle-memo">メモ欄を全部開く/閉じる</button>
      <button class="topbtn" id="copy-report">結果をコピー</button>
      <button class="topbtn" id="download-report">結果をtxt保存</button>
      <button class="topbtn" id="reset-all">全部リセット</button>
    </div>
    <div class="stats" id="stats"></div>
    <div class="note">狙い: 詩的な比喩と幼い反応を抑え、十々瀬の視点と地の文を主軸にする。衣装ディテールは、黒レース・水色フリル・ハート金具・チェーンが銀河腕側から巨大構造として見える場面に絞って使っています。</div>
  </div>
</header>
<main class="wrap" id="cards"></main>
<footer class="wrap">進捗はブラウザの localStorage に保存されます。会話を含む段落は少し紫寄りの背景です。</footer>

<template id="source-text">
銀河統括航宙軍主力艦隊は、銀河腕の中腹に防衛陣を置いた。

対象、百川十々瀬。
彼女の身体はすでに数千光年級に達していた。銀河円盤は腰の下に広がり、腕状構造は足元から左右へ伸びる光の帯になっている。中心核の膨らみは、少し離れた場所で明るくまとまっていた。

十々瀬は、その帯を見下ろしていた。
星団は細かな光の粒に見える。星間雲は、濃淡のある薄い層。暗黒星雲は、その層に入った黒い筋。恒星生成領域の青白い広がりも、彼女の視界では指先で寄せられそうな淡いむらだった。

「砂場みたい」

十々瀬はそう言って、銀河腕のそばへ身を屈めた。
その動作だけで、太腿と膝の影が銀河円盤を横切った。胸元を覆うくすんだ桃色の衣装面が前へ出て、黒いレースの縁が腕状構造の一部に重なる。胸元の下端を飾る淡い水色のフリルは、地上で見れば細かな布の波でしかない。だが銀河腕の中にいた艦隊からは、その一段だけで星団列をまたぐ巨大な遮蔽帯に見えた。

航宙軍は、その遮蔽帯の下で主力を展開していた。
星団要塞。暗黒物質流を絞った超重力砲。人工恒星を封じた恒星炉弾。防衛線の全長は数千光年に及び、銀河腕に沿って配置された補給航路と避難航路が、その後ろに何重にも折り畳まれていた。

記録には、短い報告だけが残った。
対象、姿勢低下。
前面に衣装縁部の遮蔽を確認。
第一から第七星団群、光学観測不能。

十々瀬は、星間雲へ手を入れた。
触った、というより、光の濃い場所へ指を通しただけだった。手応えはほとんどない。けれど彼女の指の周囲でガスの密度が変わり、まだ星になっていない濃い領域が、指紋の谷に沿って裂けていく。数万年後に恒星を生むはずだった雲が、彼女の一撫でで薄く伸びた。

「こっちは薄いんだ」

彼女は指先を少し傾けた。
銀河腕の中で、星間雲が横へ流れる。防衛線の前にあった星団要塞群は、背景に使っていた星雲ごと座標を失った。彼らは移動していない。基準にしていた空間のほうが、彼女の指に押されて別の形に変わった。

十々瀬がさらに覗き込むと、胸元の巨大な曲面が銀河腕の別の枝へ近づいた。
接触はしていない。それでも、数千光年級の質量が近づくだけで、腕構造の重力平衡は傾く。桃色の布面と黒レースの境目が星間雲の前を通り、そこにあった迂回陣地は星図上の位置関係を保てなくなった。小さい側から見ると、レースの一山は暗黒星雲より太い弧であり、布の曲面は背景の恒星群をまとめて隠す壁だった。

胸元の中央で揺れたハート形の金具にも、複数の星団の光が反射した。
その反射は一瞬だったが、艦隊の観測機には新しい天体の発光のように記録された。金具の縁に並んだ小さな凹凸の一つが、航宙軍の前線基地より大きい。服飾の細部でしかないものが、銀河腕の内側では地形になっていた。

航宙軍は総攻撃を開始した。
超重力砲が局所的な重力崩壊を彼女の手の甲へ投げつける。恒星炉弾が人工恒星の熱を解放し、星団要塞群が同時に砲門を開いた。銀河腕の一部が、人工の白い光で染まる。

十々瀬はそれを見て、手を止めた。

「火花みたい」

それ以上の反応はなかった。
一個の恒星の全生涯に匹敵するエネルギーも、彼女の肌の上では細かな光点にすぎない。熱は届く前に広がり、重力崩壊は指先の動きで引き伸ばされ、空間歪曲は指紋の谷に沿って流れた。

彼女が手首を返す。
それだけで、銀河腕に沿って並んでいた防衛線が折れた。星間雲は左右へ分かれ、若い恒星群は流れを変えた。航宙軍の配置図ではまだ連続しているはずの陣地が、実際にはもう同じ場所に並んでいない。

細いチェーン飾りが、胸元でわずかに揺れた。
その一コマが銀河腕の上を通るだけで、艦隊の視界には巨大な輪の影が走った。避難航路のいくつかは、その輪の内側に入った時点で背景星を失い、航法計算を打ち切った。十々瀬はチェーンに触れていない。彼女が少し身じろぎしただけだった。

十々瀬は、指で押し分けた雲の流れを見ていた。
自分が何を壊したかではなく、光のむらがどう動くかを見ている。

「こっちへ流したら、どうなるんだろ」

彼女は両手を使った。
片方の手で星間雲を寄せ、もう片方の手で銀河腕の淡い光をならす。星団の縁が伸び、暗黒星雲が細い筋になり、恒星生成領域がまとめて別の密度へ押し込まれた。掌の下で生まれた濃淡は、その後数億年にわたって異常な星形成を起こすことになる。

そこにいた主力艦隊は、戦闘の途中で散った。
撃破された、というより、艦隊を艦隊として保つための座標と距離を失った。星団要塞は星雲の流れに巻き込まれ、砲撃陣地は彼女の掌の移動に合わせてばらばらの方向へずれた。最後まで発射された恒星炉弾も、彼女の手の上では薄い光の点に紛れた。

銀河統括航宙軍は、主力を失った。
記録には一行だけが追加された。
銀河腕内部での防衛陣維持は不可能。

十々瀬は、手のひらに残った星間雲の淡い光を見た。
掌の線に沿って、かき混ぜられたガスと若い星団が細く残っている。ハート形の金具にも、散った艦隊の光点がいくつか反射していた。彼女から見れば、手についた光の粉でしかない。

「残った」

彼女は手を軽く振った。
掌に乗っていた星間雲がこぼれ、銀河腕の外側へ薄く広がる。そこからまた、別の密度の波が生まれていった。

十々瀬は顔を上げた。
銀河腕の外には、隣の渦が見えていた。矮小銀河。淡い伴銀河。さらに遠くの銀河団。さっきまで戦場だったものは、もう彼女の手元の模様の一部になっている。

「まだ、向こうにもある」

彼女は銀河の外側へ視線を移した。
</template>

<script>
const STORAGE_KEY='codex_trial_review_ch13_20260528_v2';
let state={};
try{
  state=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}')||{};
}catch(e){
  localStorage.removeItem(STORAGE_KEY);
  state={};
}
const tags=['良い','弱い','削る','直す','強める','十々瀬主観','地の文','ミクロ視点','衣装物差し','幼さ','詩的すぎ','観測側'];
const sourceEl=document.getElementById('source-text');
const source=(sourceEl.content?.textContent||sourceEl.innerHTML||sourceEl.textContent||'').trim();
const paragraphs=source.split(/\n\s*\n/).map(s=>s.trim()).filter(Boolean);
const cards=document.getElementById('cards');
function esc(s){return s.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function rec(id){if(!state[id])state[id]={mode:'none',tags:[],memo:''};return state[id];}
function modeLabel(m){return m==='ok'?'OK':m==='review'?'要修正':m==='hold'?'保留':'未チェック';}
function render(){
  cards.innerHTML=paragraphs.map((p,i)=>{
    const id='p'+(i+1);
    const dialogue=/「[^」]+」/.test(p);
    const tagButtons=tags.map(t=>`<button class="pill" data-tag="${esc(t)}">${esc(t)}</button>`).join('');
    return `<article class="card ${dialogue?'dialogue':''}" data-id="${id}">
      <div class="head"><div class="pid">#${String(i+1).padStart(2,'0')}</div><span class="badge state-none" data-state>未チェック</span></div>
      <div class="para">${esc(p).replace(/\n/g,'<br>')}</div>
      <div class="controls">${tagButtons}</div>
      <div class="row">
        <button class="big ok" data-mode="ok">OK</button>
        <button class="big review" data-mode="review">要修正</button>
        <button class="big hold" data-mode="hold">保留</button>
        <button class="big clear" data-mode="clear">解除</button>
      </div>
      <details><summary>メモ欄</summary><textarea placeholder="気になったこと、採用可否、直したい方向など"></textarea></details>
    </article>`;
  }).join('');
  bind();
  updateAll();
}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}
function applyCard(card){
  const s=rec(card.dataset.id);
  const badge=card.querySelector('[data-state]');
  badge.textContent=modeLabel(s.mode);
  badge.className='badge state-'+(s.mode==='ok'?'ok':s.mode==='review'?'review':s.mode==='hold'?'hold':'none');
  card.querySelectorAll('.pill').forEach(btn=>btn.classList.toggle('active',s.tags.includes(btn.dataset.tag)));
  card.querySelector('textarea').value=s.memo||'';
}
function updateStats(){
  let total=0,ok=0,review=0,hold=0,none=0;
  document.querySelectorAll('.card').forEach(c=>{total++;const m=rec(c.dataset.id).mode;if(m==='ok')ok++;else if(m==='review')review++;else if(m==='hold')hold++;else none++;});
  document.getElementById('stats').innerHTML=`<span class="stat">全 ${total}</span><span class="stat" style="color:#b8ffd0">OK ${ok}</span><span class="stat" style="color:#ffc3c3">要修正 ${review}</span><span class="stat" style="color:#e4d6ff">保留 ${hold}</span><span class="stat">未チェック ${none}</span>`;
}
function updateAll(){document.querySelectorAll('.card').forEach(applyCard);updateStats();}
function bind(){
  document.querySelectorAll('.card').forEach(card=>{
    card.querySelectorAll('.pill').forEach(btn=>btn.onclick=()=>{const s=rec(card.dataset.id);const i=s.tags.indexOf(btn.dataset.tag);if(i>=0)s.tags.splice(i,1);else s.tags.push(btn.dataset.tag);save();applyCard(card);});
    card.querySelectorAll('[data-mode]').forEach(btn=>btn.onclick=()=>{const m=btn.dataset.mode;rec(card.dataset.id).mode=m==='clear'?'none':m;save();applyCard(card);updateStats();});
    card.querySelector('textarea').oninput=e=>{rec(card.dataset.id).memo=e.target.value;save();};
  });
}
function report(){
  const lines=['第13話 Codex改修試作 v2 レビュー結果',''];
  document.querySelectorAll('.card').forEach((card,i)=>{
    const s=rec(card.dataset.id);
    if(s.mode==='none'&&!s.tags.length&&!s.memo.trim())return;
    lines.push(`#${String(i+1).padStart(2,'0')} [${modeLabel(s.mode)}]`);
    if(s.tags.length)lines.push('タグ: '+s.tags.join(' / '));
    if(s.memo.trim())lines.push('メモ: '+s.memo.trim());
    lines.push('');
  });
  return lines.join('\n');
}
document.getElementById('filter-all').onclick=()=>document.querySelectorAll('.card').forEach(c=>c.classList.remove('hidden'));
document.getElementById('filter-review').onclick=()=>document.querySelectorAll('.card').forEach(c=>c.classList.toggle('hidden',rec(c.dataset.id).mode!=='review'));
document.getElementById('filter-unchecked').onclick=()=>document.querySelectorAll('.card').forEach(c=>c.classList.toggle('hidden',rec(c.dataset.id).mode!=='none'));
let memoOpen=false;
document.getElementById('toggle-memo').onclick=()=>{memoOpen=!memoOpen;document.querySelectorAll('details').forEach(d=>memoOpen?d.setAttribute('open',''):d.removeAttribute('open'));};
document.getElementById('copy-report').onclick=async()=>{try{await navigator.clipboard.writeText(report());alert('コピーしました');}catch(e){alert('コピーできませんでした。txt保存を使ってください。');}};
document.getElementById('download-report').onclick=()=>{const b=new Blob([report()],{type:'text/plain;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='13_Codex改修試作_v2_レビュー結果.txt';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);};
document.getElementById('reset-all').onclick=()=>{if(confirm('レビュー状態をリセットしますか？')){localStorage.removeItem(STORAGE_KEY);state={};updateAll();}};
render();
</script>
</body>
</html>
