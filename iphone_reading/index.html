<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>匣庭のジャステイル</title>
<style>
:root{--bg:#141218;--paper:#1a1620;--ink:#c8c0d6;--dim:#6e6880;--accent:#b0a0c8;--line:#282430;--safe-bottom:env(safe-area-inset-bottom,20px)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:"Hiragino Mincho ProN","Yu Mincho","游明朝",serif;font-size:17px;-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px calc(40px + var(--safe-bottom))}
.container{max-width:400px;width:100%}
h1{font-size:24px;font-weight:400;color:var(--accent);text-align:center;margin-bottom:8px;letter-spacing:.12em}
.subtitle{font-size:13px;color:var(--dim);text-align:center;margin-bottom:36px;letter-spacing:.06em}
ul{list-style:none;display:flex;flex-direction:column;gap:10px}
li a{
  display:flex;flex-direction:column;gap:4px;
  background:var(--paper);border:1px solid var(--line);border-radius:8px;
  padding:18px 20px;text-decoration:none;color:var(--ink);
  transition:border-color .2s;
}
li a:active{border-color:var(--accent)}
.vol-num{font-size:18px;font-weight:400;color:var(--accent);letter-spacing:.04em}
.vol-desc{font-size:14px;color:var(--ink)}
.vol-sub{font-size:11px;color:var(--dim)}
</style>
</head>
<body>
<div class="container">

<li><a href="匣庭のジャステイル_Vol.2.html"><span class="vol-num">Vol.2</span><span class="vol-desc">旅人の来訪 〜 迷い込んだ艦</span><span class="vol-sub">第6〜10話</span></a></li>
<li><a href="匣庭のジャステイル_Vol.3.html"><span class="vol-num">Vol.3</span><span class="vol-desc">星の種 〜 ドットルリルの贖い</span><span class="vol-sub">第11〜15話</span></a></li>
<li><a href="匣庭のジャステイル_Vol.4.html"><span class="vol-num">Vol.4</span><span class="vol-desc">匣庭の改装 〜 アウレリアの日常</span><span class="vol-sub">第16〜20話</span></a></li>
<li><a href="匣庭のジャステイル_Vol.5.html"><span class="vol-num">Vol.5</span><span class="vol-desc">匣、開く 〜 後日談_シキ</span><span class="vol-sub">第21〜23話＋後日談</span></a></li>
<li><a href="匣庭のジャステイル_Vol.6.html"><span class="vol-num">Vol.6</span><span class="vol-desc">後日談_リンデ 〜 匣庭のすみずみ</span><span class="vol-sub">後日談</span></a></li>
</ul>
