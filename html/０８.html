<p>　身長、約十万キロメートル級。<br>　推定三サイズ、B約十八万キロメートル、W約四万二千キロメートル、H約七万二千キロメートル。</p>
<p>　もう、月は小石ですらなかった。</p>
<p>　地球の破片も、月の欠片も、彼女の背後で細かな砂の帯になって漂っている。振り返れば見える。だが、気にしなければ忘れてしまう程度の大きさだった。</p>
<p>　目の前には、赤い惑星があった。</p>
<p>　地球より小さく、月より大きい。</p>
<p>　かつて人類が火星と呼んだ星。</p>
<p>　赤茶色の大地と、薄い大気と、白い極冠を持つ丸い世界だった。</p>
<p>「赤い」</p>
<p>　十々瀬は目を輝かせた。</p>
<p>　彼女は赤い星へ顔を近づけた。</p>
<p>　火星の薄い大気が揺れる。</p>
<p>　彼女の呼吸だけで、火星の空はこれまで経験したことのない圧力の変化を受けた。砂嵐が生まれ、低地へ流れ、巨大な赤い雲となって惑星を包み始める。</p>
<p>「あ、砂っぽく見える」</p>
<p>　十々瀬は、粉を吸いこんだのではなく、赤い砂が舞う見た目につられてそう言った。くしゃみをしそうになって、少し鼻を押さえる。</p>
<p>　その仕草で、さらに大気が乱れた。</p>
<p>　火星の地表には、人類の古い探査機がまだいくつも残っていた。</p>
<p>　車輪の跡。<br>　着陸機の残骸。<br>　停止した観測基地。<br>　遠い昔に送られた、小さな機械の墓標。</p>
<p>　それらは、十々瀬の影が落ちた時点で、砂嵐の中に消えた。</p>
<p>　彼女は指を伸ばした。</p>
<p>　赤い惑星の表面に、そっと触れる。</p>
<p>　指先が火星の大峡谷を横切った。</p>
<p>　もともと惑星規模の裂け目だった谷は、十々瀬の指にとっては細い傷のようなものだった。彼女がなぞると、その縁は崩れ、谷底は赤い粉で埋まり、別の場所へ新しい裂け目が伸びた。</p>
<p>「ここ、ひび入ってる」</p>
<p>　彼女はその裂け目を広げてみた。</p>
<p>　爪先を差し込む。</p>
<p>　火星の地殻が割れた。</p>
<p>　大峡谷はさらに広がり、赤い大地が二つに引き裂かれていく。薄い大気が裂け目へ流れ込み、砂が滝のように落ちた。</p>
<p>　十々瀬は慌てた様子もなく、それを眺めた。</p>
<p>「地球より乾いてるね」</p>
<p>　彼女は火星の極冠に目を留めた。</p>
<p>　白い部分。</p>
<p>　氷だった。</p>
<p>　彼女は人差し指で、極冠を軽くこすった。</p>
<p>　白い氷が削れ、赤い砂と混ざり、淡い桃色の粉になって宇宙へ舞い上がる。</p>
<p>「かき氷みたい」</p>
<p>　十々瀬は笑った。</p>
<p>　そして、火星全体をつまんだ。</p>
<p>　親指と人差し指で、赤い球を挟む。</p>
<p>　このころの彼女にとって、火星はもう片手で持てる玩具だった。完全に握るには少し大きいが、動かすには十分小さい。</p>
<p>　火星の軌道が乱れた。</p>
<p>　赤い星は太陽の周りを回る軌道から外れ、十々瀬の指の間でゆっくり持ち上がった。</p>
<p>「あ、取れた」</p>
<p>　彼女は嬉しそうに言った。</p>
<p>　火星の表面では、地殻が悲鳴を上げていた。</p>
<p>　つままれた部分が沈み、反対側が盛り上がり、内部の応力が惑星全体へ走る。巨大な火山は斜面を崩し、古い盆地はひび割れ、薄い大気は火星の回転に遅れて揺れた。</p>
<p>　十々瀬は火星を少し回した。</p>
<p>　赤い球が指の間でくるりと動く。</p>
<p>　そのたびに、表面の砂嵐が帯になって流れ、裂け目が別の方向へ伸びる。</p>
<p>「地球儀より軽い」</p>
<p>　彼女は火星を掌に乗せた。</p>
<p>　掌紋の谷に、赤い砂がこぼれた。</p>
<p>　火星の一部が削れて、彼女の掌の線に沿って粉の筋を作る。かつて山だった部分が崩れ、盆地だった場所がひしゃげ、赤い惑星は少しずつ丸さを失っていった。</p>
<p>　彼女はそれを、月の欠片の方へ転がそうとした。</p>
<p>「赤いのと白いの、並べたらかわいいかも」</p>
<p>　しかし、地球と月の残骸はすでに遠く、小さく、散らばっていた。</p>
<p>　火星をそこへ向けて軽く押すと、赤い惑星は想定より速く流れた。</p>
<p>「あ、行きすぎ」</p>
<p>　火星は途中で、小惑星帯の一部に突っ込んだ。</p>
<p>　無数の小天体が散る。</p>
<p>　十々瀬には、砂粒が跳ねたように見えた。</p>
<p>　だが小惑星たちにとっては、赤い惑星が軌道を乱しながら突入してきた災厄だった。岩塊が割れ、衝突し、さらに細かな群れになって広がった。</p>
<p>　火星の表面にも傷が増えた。</p>
<p>　赤い地殻に、黒い衝突痕が無数に開く。</p>
<p>「ぶつぶつになった」</p>
<p>　十々瀬は指で火星を止めた。</p>
<p>　その指がまた表面を押し、赤い地殻に新しい大陥没を作った。</p>
<p>　火星はまだ壊れていない。</p>
<p>　だが、元の火星ではなかった。</p>
<p>　軌道は外れ、地形は崩れ、薄い大気は散り、赤い粉を宇宙に引きずっている。</p>
<p>　十々瀬は少し考えた。</p>
<p>「これ、置き場所ないなあ」</p>
<p>　彼女は火星をそっと離した。</p>
<p>　赤い惑星は、歪んだ軌道でゆっくり漂い始めた。太陽の重力に引かれ、小惑星の破片にぶつかり、砕けた赤い粉を尾のように引いている。</p>
<p>　十々瀬は、さらに遠くを見た。</p>
<p>　そこには、大きな縞模様の星があった。</p>
<p>　火星よりずっと大きい。</p>
<p>　丸く、淡い色の帯を持ち、周囲にいくつもの小さな月を従えている。</p>
<p>「大きいの、ある」</p>
<p>　木星だった。</p>
<p>　十々瀬は、それを見つけた瞬間、火星のことを少し忘れた。</p>
<p>　彼女の身体は、また大きくなり始めていた。</p>
<p>　十万キロメートル。<br>　十五万キロメートル。<br>　二十万キロメートル。</p>
<p>　火星はもう、指先についた赤い粉のように見えた。</p>
<p>　木星は、次の玩具に見えた。</p>
<p>　だがそのころ、太陽系の外縁で、別の誰かが百川十々瀬を観測していた。</p>
<p>　人類ではない。</p>
<p>　地球の文明ではない。</p>
<p>　長い時間をかけて太陽系を監視していた、異星由来の自律観測機だった。</p>
<p>　観測機は、砕けた地球、欠けた月、軌道を外れた火星、そして赤い星をつまんで遊ぶ巨大な少女を記録した。</p>
<p>　信号が、太陽系外へ送られる。</p>
<p>　内容は短かった。</p>
<p>　未確認超巨大生命体、恒星系内に出現。<br>　第三惑星、崩壊。<br>　第四惑星、軌道逸脱。<br>　対象、成長継続。<br>　文明圏への警告を要請。</p>
<p>　十々瀬は、その信号に気づかない。</p>
<p>　彼女は縞模様の星へ、楽しそうに手を伸ばしていた。</p>
<p>　百川十々瀬巨大化記録。</p>
