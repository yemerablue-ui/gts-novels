<p>　百川十々瀬が、初めて三百キロメートル級に到達した日。</p>
<p>　ただし、本人にとってそれは、何かの始まりというほど大げさなものではなかった。</p>
<p>「ん……？」</p>
<p>　目を開けたとき、十々瀬はまず、空が近いと思った。</p>
<p>　いや、近いというより、空の方が自分の身体にまとわりついている。雲が肩のあたりをゆっくり流れ、髪の先に白い湿り気を残していた。朝焼けは顔のずっと下に広がっていて、太陽は水平線から昇るというより、彼女の膝の向こうで小さく光り始めたように見えた。</p>
<p>　彼女は、海の中に膝をついていた。</p>
<p>　膝と言っても、その膝ひとつが湾を塞ぎ、海峡の幅を変えていた。海水は太腿の周囲で白く泡立ち、押しのけられた水が沿岸へ向かって低い壁のように進んでいく。</p>
<p>　十々瀬は、自分の両手を見た。</p>
<p>　指が長い。<br>　掌が広い。<br>　爪の半月だけで、下に見える港より大きい。</p>
<p>　手の下には、列島の一部があった。</p>
<p>　山脈は掌紋の細い線のようで、川は銀色の糸だった。都市は灰色の染み。道路は薄く引かれた傷。ひとつひとつの建物など、目を凝らしてもほとんど見分けがつかない。</p>
<p>「わ、すごい」</p>
<p>　十々瀬は笑った。</p>
<p>「ほんとに全部ちっちゃい！」</p>
<p>　その快活な声が、空から落ちた。</p>
<p>　それは音というより、広域の気圧変化だった。数十キロ先のビルの窓が一斉に砕け、湖面には細かな波紋が走り、山腹の樹木が風に伏せた。地上の人々は、その声を耳で聞くより先に、胸の奥で受け止めた。</p>
<p>　十々瀬は悪気なく、ただ自分の大きさを確かめていた。</p>
<p>　昔から、彼女はそうだった。</p>
<p>　面白そうだと思ったものにはすぐ手を伸ばした。知らない道があれば入ってみる。高いところがあれば登ってみる。水たまりがあれば踏んでみる。誰かに怒られても、笑って、少しだけ反省して、次の瞬間には別のものへ目を輝かせている。</p>
<p>　その性格のまま、彼女は三百キロメートルになっていた。</p>
<p>　身長、約三百キロメートル。<br>　推定三サイズ、B約五百四十キロメートル、W約百二十六キロメートル、H約二百十六キロメートル。</p>
<p>　ひとつの都市どころか、県境も、湾も、山脈も、彼女の身体の一部の下に収まる大きさだった。</p>
<p>　十々瀬はゆっくりと立ち上がった。</p>
<p>　膝が海面を割り、腰が雲海を押し分け、肩が高層大気に霞む。顔は朝焼けのさらに上にあり、地上からは輪郭すらはっきり見えない。人々が見上げても、そこにあるのは空を塞ぐ肌色の壁と、雲を裂いて流れる髪だけだった。</p>
<p>　その中でも、地上の観測者が最初に理解したのは、彼女の胸元の異様な大きさだった。</p>
<p>　黒い衣装に包まれた巨大な曲面が、身体の前面から大きく張り出している。単に胸が豊かという範囲ではない。三百キロメートルの身体に比例してなお、上半身の輪郭を決めてしまうほどの量感だった。斜め下から見上げる人々には、それは彼女の胴体に連なるもう一つの丘陵、あるいは雲の下へせり出した黒い半球のように映った。</p>
<p>　腰や脚が比較的すっきりしているぶん、その前面の重みはなおさら際立っていた。彼女が少し姿勢を変えるだけで、胸元の影は湾岸から内陸へゆっくり滑り、複数の町を昼から夕暮れへ変えた。</p>
<p>　足元に、小さな灰色のまとまりが見えた。</p>
<p>「これ、街かな」</p>
<p>　十々瀬は足を持ち上げた。</p>
<p>　白い足裏が、沿岸部の上空に影を落とす。</p>
<p>　足裏の長さだけで四十キロメートル以上。</p>
<p>　港町、工業地帯、埋立地、幹線道路、河口、鉄道の操車場。すべてが一枚の影に呑まれた。地上から見れば、それは足が降りてくるというより、空そのものが底を持って落下してくる光景だった。</p>
<p>　十々瀬にとっては、試しに一歩踏み出しただけだった。</p>
<p>　着地。</p>
<p>　地図の一部が押し潰された。</p>
<p>　何十万もの建物が一瞬で個別の形を失い、都市の輪郭そのものが平たい灰色の層へ変わっていく。海面が円形にへこみ、遅れて白い津波が湾の奥へ押し寄せた。高速道路は地面ごと波打ち、橋は糸のように切れ、港のクレーン群は砂場の玩具のように横倒しになった。</p>
<p>　十々瀬は自分の足元を覗き込んだ。</p>
<p>　足をどけると、そこには巨大な足跡が残っていた。</p>
<p>　長さ、約四十五キロメートル。<br>　幅、約十八キロメートル。<br>　深さ、場所によっては数百メートル。</p>
<p>　都市は消え、道路は断ち切られ、川はその足跡へ流れ込み、新しい湖を作り始めていた。</p>
<p>「わあ……ほんとに壊れちゃった」</p>
<p>　驚いたような声だった。</p>
<p>　けれど、恐怖ではない。</p>
<p>　初めて水たまりを踏んだときのような、明るい発見の響きがあった。</p>
<p>「足跡、残るんだ。すごいすごい、わたしの形だ」</p>
<p>　十々瀬は楽しそうに笑った。</p>
<p>　その笑いだけで雲が散った。</p>
<p>　上空の積乱雲が彼女の頬に触れて崩れ、髪の先が低気圧の渦を乱す。気象レーダーには、彼女の身体の周囲に発生した巨大な乱流が、台風のような渦として映っていた。</p>
<p>　もう一歩、彼女は内陸へ踏み出した。</p>
<p>　足が降りるまでに、太陽が完全に隠れた。街ひとつ、ふたつ、みっつ。鉄道網が途切れ、郊外の住宅地が影に沈み、巨大な足裏が山の斜面と平野を同時に覆った。</p>
<p>　着地。</p>
<p>　山が潰れた。</p>
<p>　標高千メートル級の稜線が、彼女の土踏まずの下で粘土のように押し広げられる。谷は埋まり、川は流路を失い、ダム湖の水があふれて白い筋となって四方へ走った。都市部では、高層ビル群が一斉に沈み込んだ。百メートルを超えるビルでさえ、彼女の足裏の皺に引っかかった突起でしかなかった。</p>
<p>「ちょっと、むにってした」</p>
<p>　十々瀬は足裏を見た。</p>
<p>　そこについた土と瓦礫は、彼女には湿った砂粒のように見えた。指で軽く払うと、その砂粒のひとつひとつが地上では建材であり、橋であり、ビルであり、町だった。</p>
<p>「あ、汚れた。あとで海で洗お」</p>
<p>　彼女はそう言って、しゃがみ込んだ。</p>
<p>　それは地上から見れば、天が落ちてくる光景だった。</p>
<p>　片膝が平野へ降りる。直径数十キロの範囲で地盤が沈み、農地、町、湖、森がまとめて押し潰された。もう片方の手が山岳地帯に置かれる。五本の指が、五つの谷を完全に塞いだ。指先ひとつが都市圏ほどの大きさで、爪の半月だけでも空港より広かった。</p>
<p>　十々瀬は両手を地面につき、顔を近づけた。</p>
<p>「んー……やっぱり、街って模様みたい」</p>
<p>　その姿勢になったことで、彼女の胸元は地表へ近づくのではなく、確実に広く降りていった。</p>
<p>　十々瀬は丸みの強い体格をしていた。とりわけ、黒い衣装に包まれた胸部は身体の前へ大きくせり出し、彼女自身が少し身をかがめるだけで、山や都市の上空へ先に影を落とす。三百キロメートルまで巨大化した今、その量感は地形そのものに近かった。</p>
<p>　胸元の下で風が逃げた。</p>
<p>　丘陵地帯の雲が左右へ押し出され、郊外の住宅地に圧力の境界線が走る。接地直前には高層建築のガラスが震え、山腹の森林は一方向へ伏せ始めた。</p>
<p>　そして、広い面で触れた。</p>
<p>　身をかがめただけの動きだった。だが、胸元の大きな重みは丘陵地帯と郊外の一部に広く乗り、ゆっくりと地面を押し沈めていく。</p>
<p>　山林が沈んだ。</p>
<p>　住宅地の区画が波打ち、道路が円弧状にひび割れた。丘はなだらかな窪みに変わり、湖岸の町は水面ごと押し広げられる。接触面の外周では地盤がわずかに盛り上がり、町の端が皿の縁のように反った。</p>
<p>　衝撃というより、巨大な地形が別の地形を上から塗り替えるような圧迫だった。踏み潰されたのではない。彼女の身体の丸い量感に合わせて、地面が形を変えさせられていた。</p>
<p>「あ、ごめん。そこ当たっちゃった？」</p>
<p>　十々瀬は悪びれない調子で言った。</p>
<p>　謝ってはいる。</p>
<p>　だが、すぐに別のものへ目を輝かせた。</p>
<p>「でも、跡が丸くてかわいいかも」</p>
<p>　彼女が少し身じろぎしただけで、接地していた一帯はさらに沈み込んだ。森は帯状に倒れ、川は流れを変え、街区は巨大な圧痕の縁で傾いていく。後の地質調査では、その場所が「第一接触圧痕」と記録されることになる。</p>
<p>　本人は、そんな名前を知らない。</p>
<p>　知ったらきっと、もっと軽い名前をつけたがるだろう。</p>
<p>　十々瀬は視線を横へ動かした。</p>
<p>　灰色の大きな染みがあった。</p>
<p>　人口数百万の大都市だった。</p>
<p>　地上では超高層ビルが林立し、環状道路が走り、川が何本も市街地を貫いていた。だが、三百キロメートルの十々瀬から見れば、それは薄い灰色の模様にすぎない。</p>
<p>「こっちは大きめの街だ」</p>
<p>　彼女は人差し指を伸ばした。</p>
<p>　指の腹が、都市中心部へ近づいていく。</p>
<p>　それだけで風が吹き荒れた。秒速数十メートルの突風が道路を走り、看板や車両が宙へ舞い、川面が逆立つ。ビル群の上空を巨大な影が覆い、昼が夜に変わった。</p>
<p>　指先が触れた。</p>
<p>　都心の一角が、音もなく沈んだ。</p>
<p>　遅れて、轟音。</p>
<p>　超高層ビル群がまとめて座屈し、地下街が押し込まれ、駅の構造物が砕け、巨大な円形の陥没が街の中心に生まれた。</p>
<p>　十々瀬はそのまま指を少し横へ滑らせた。</p>
<p>　たった数センチの動き。</p>
<p>　彼女にとっては、机の上の埃を払うような仕草。</p>
<p>　だが地上では、十数キロにわたる市街地が削り取られた。道路は剥がれ、ビルは根元から引き倒され、川に架かる橋はすべて断ち切られた。都市の中心線が、巨大な指跡によって一本の谷へ変わっていく。</p>
<p>「おおー。線、引ける」</p>
<p>　十々瀬は嬉しそうに言った。</p>
<p>　そして、もう一本。</p>
<p>　今度は中指で、別の角度から街をなぞった。</p>
<p>　都市は十字に裂けた。</p>
<p>　環状道路は切断され、鉄道の高架は途中で消え、川は瓦礫にせき止められて逆流した。摩天楼の群れは、巨大な爪先にかすめられただけで傾き、連鎖的に崩れていった。</p>
<p>「地図に落書きしてるみたい」</p>
<p>　彼女にとっては落書きだった。</p>
<p>　人類にとっては、首都圏の消失だった。</p>
<p>　次に十々瀬は、親指と人差し指で山をつまんだ。</p>
<p>　標高二千メートルの独立峰だった。</p>
<p>　地元では信仰の対象で、観光名所で、何千年もそこにあった山。だが、彼女の指に挟まれると、それは硬めの砂糖菓子程度の抵抗しか示さなかった。</p>
<p>　山肌が崩れる。<br>　森林が黒い粉のようにこぼれる。<br>　岩盤が軋み、山頂が割れる。</p>
<p>「これ、取れるかな？」</p>
<p>　十々瀬は明るく言った。</p>
<p>　そして力を込めた。</p>
<p>　山は半分になった。</p>
<p>　砕けた岩塊が周囲の盆地へ降り注ぎ、土煙が高度数千メートルまで立ち上った。十々瀬は指についた土を見て、少し眉を寄せる。</p>
<p>「あー、また汚れた」</p>
<p>　彼女は退屈そうに息を吹きかけた。</p>
<p>　その吐息が嵐になった。</p>
<p>　山麓の町々を砂塵が覆い、湖面が白く泡立ち、森林が一方向へなぎ倒される。気象衛星から見ると、彼女の一息は小さな前線の発生として記録された。</p>
<p>　やがて十々瀬は立ち上がった。</p>
<p>　それだけで、彼女の周囲の雲が引き裂かれた。腰のあたりで旅客機の航路が完全に遮られ、肩は青い空のさらに暗い層へ沈んでいる。頭部は地上から直接見ることができない。あまりに高すぎて、大気の霞の向こうに消えていた。</p>
<p>　彼女は海の方を見た。</p>
<p>「よし。足、洗お」</p>
<p>　その言い方は、散歩の途中で水辺を見つけたときのように軽かった。</p>
<p>　そして、片足を海峡へ踏み入れた。</p>
<p>　海が割れた。</p>
<p>　水深数百メートルの海底に彼女の足が届き、海水が四方へ押しのけられる。島々の間を、巨大な白い壁のような波が走った。沿岸の防波堤は意味を失い、港は水と瓦礫に呑まれ、船舶は木の葉のように転がった。</p>
<p>　十々瀬は足裏を海底にこすりつけた。</p>
<p>　海底地形が削れた。</p>
<p>　砂州が消え、海溝の縁が崩れ、押し出された土砂が新しい浅瀬を作った。海水は濁り、そこから広がる波は複数の沿岸都市を同時に襲った。</p>
<p>「ん、すっきり」</p>
<p>　十々瀬は満足げに足を上げた。</p>
<p>　足裏から落ちた水滴のひとつが、地上では小さな湖ほどの質量を持っていた。水滴は山間部に落ち、森を押し潰し、谷を満たし、急造の沼を作った。</p>
<p>　夜になっても、彼女のいる地方だけは暗かった。</p>
<p>　広域停電が発生していた。山から山へ渡る高圧線の束を、十々瀬が爪で軽く引っかけたためだった。人間にとっては巨大なインフラだったが、彼女には細い髪の毛ほどにしか見えなかった。</p>
<p>　完全な闇ではなかった。</p>
<p>　地上に伏せる都市の非常灯、炎、車列のライト、避難所の照明が、彼女の足元で星屑のように瞬いていた。</p>
<p>　十々瀬はそれを見下ろして、静かに言った。</p>
<p>「星みたい」</p>
<p>　その声だけは、少しだけ柔らかかった。</p>
<p>　彼女は破壊を憎しみで行っているわけではない。<br>　支配欲でも、復讐でもない。</p>
<p>　ただ、世界が自分よりあまりにも小さくなってしまったことが面白くて仕方ないのだ。</p>
<p>　踏めば沈む。<br>　なぞれば裂ける。<br>　息を吹けば嵐になる。<br>　寝転べば地形が変わる。</p>
<p>　そして十々瀬は、そのすべてを自分の新しい身体で確かめていた。</p>
<p>　ふいに、彼女は両手を地面についた。</p>
<p>　胸元が再び、広大な平野へ近づいていく。人々の視点からは、空の大部分が黒い衣装の曲面と柔らかな影で覆われたように見えた。彼女が腹ばいに近い姿勢を取ると、身体の前へ張り出したその巨大な重みが地表へ接し、都市の外縁と農村地帯と丘陵がまとめて沈み始めた。</p>
<p>　圧迫はゆっくりだった。</p>
<p>　だからこそ、地形の変化がはっきり見えた。</p>
<p>　道路の直線が曲がり、川の流れが分かれ、田畑の区画が消え、町の灯りがひとつずつ圧痕の下に埋もれていく。接地している範囲は、いくつもの市町村をまたいでいた。</p>
<p>　十々瀬は頬杖をついた。</p>
<p>「んー……このくらい大きいと、寝るだけでも大変だね」</p>
<p>　そう言って笑う。</p>
<p>　その肘が別の町を潰した。</p>
<p>　地表に肘の形をした陥没が生まれ、鉄道の分岐点が消え、周辺の高速道路が土砂に埋もれた。彼女はそれに気づいたのか気づいていないのか、指先で近くの市街地を軽くつついた。</p>
<p>　つん。</p>
<p>　それだけで、数キロ四方の建物群が平たく沈んだ。</p>
<p>　つん、つん。</p>
<p>　二度目で駅前が消えた。<br>　三度目で川沿いの高層住宅群が崩れた。<br>　四度目で、都市の灯りは途切れ途切れの点になった。</p>
<p>「やっぱり、反応がかわいい」</p>
<p>　十々瀬は無邪気に言った。</p>
<p>　地上では、彼女の指先ひとつが運命だった。</p>
<p>　やがて彼女は、もう一度立ち上がる。</p>
<p>　接していた身体が地面から離れると、そこには巨大な丸い窪地が残っていた。縁は押し上げられ、内側には川の水が流れ込み始めている。数日後には湖になるだろう。数年後には地図に名前が載るだろう。だがその地形が何によって生まれたのかを、人類は忘れられない。</p>
<p>　百川十々瀬による、第一接触圧痕。</p>
<p>　後の調査報告には、そう記録された。</p>
<p>　十々瀬は足元の光の群れを見下ろした。</p>
<p>　そして、足を上げた。</p>
<p>　地上の灯りに、再び巨大な影が落ちる。</p>
<p>　その足裏は、ひとつの都市圏を完全に覆うほど大きかった。ビルも、道路も、川も、区画も、すべてが影の中に消えていく。着地までの数秒、世界は息を止めたように静まり返った。</p>
<p>「じゃあ、ここにも一個」</p>
<p>　次の瞬間、地平線が跳ねた。</p>
<p>　衝撃は百キロ先まで伝わり、地震計は一斉に振り切れた。地盤は波のようにうねり、都市は上から圧縮され、無数の構造物が同時に崩壊した。足跡の縁では地面が盛り上がり、郊外の丘陵が新しい環状の土手になった。</p>
<p>　十々瀬が足をどけると、そこにはもう街はなかった。</p>
<p>　巨大な足型の盆地だけがあった。</p>
<p>　雨水が流れ込み、地下水が湧き、やがてそこは湖になるだろう。地図には新しい名前がつけられるかもしれない。だが、それがかつて都市だったことを示すものは、泥の下に埋もれたわずかな直線だけだった。</p>
<p>　十々瀬は満足げに伸びをした。</p>
<p>　両腕が空を横切り、雲の層が二つに裂ける。髪が山脈の上を流れ、先端が地表をかすめただけで、森林が帯状になぎ倒された。</p>
<p>　彼女は三百キロメートル。</p>
<p>　足跡は都市圏を湖に変えた。<br>　指先は都心を谷に変えた。<br>　膝は平野を盆地に変えた。<br>　身体の接地点は町々を丸い低地に沈めた。<br>　吐息は嵐になり、声は地震になり、髪のひと房は森を薙いだ。</p>
<p>　人間の世界は、彼女の足元では薄い模様にすぎなかった。</p>
<p>　百川十々瀬は、自由奔放に笑う。</p>
<p>　まるで、今日は少し遠くまで散歩してみようと思っただけのように。</p>
<p>「次は、あっち」</p>
<p>　彼女は地平線の向こうを指差した。</p>
<p>　その指先が雲を裂き、遠くの海に巨大な影を落とす。</p>
<p>　そして少女は、もう一歩踏み出した。</p>
<p>　その一歩だけで、朝の地図はまた書き換えられた。</p>
<p>　百川十々瀬巨大化記録。</p>
<p>　第一話。</p>
<p>　世界が、彼女の遊び場になった日。<br></p></div><div class="chapter-nav"><span></span><a href="０２.html">０２ →</a></div></section><section class="chapter" id="ch-０２"><header><h2>０２　首都をなぞってみる</h2><div class="meta">改稿版 / ０２_首都をなぞってみる_改稿版.txt</div></header><div class="prose"><p>　第一接触圧痕が湖になり始めたころ、百川十々瀬はもう別の景色を見ていた。</p>
<p>　身長、約五百キロメートル。<br>　推定三サイズ、B約九百キロメートル、W約二百十キロメートル、H約三百六十キロメートル。</p>
<p>　前日まで三百キロメートル級と記録されていた彼女の身体は、夜明けを待たずにさらに大きくなっていた。理由はわからない。原因は記録されない。ただ結果だけが地図に残った。</p>
<p>　列島の中央部に横たわる彼女の影は、複数の地方をまたいでいた。足先は海へ届き、膝は山脈の上にあり、腰のあたりで雲帯が裂け、肩は成層圏の暗い青へ沈んでいる。</p>
<p>　その身体の前面では、黒い衣装に包まれた胸元が、五百キロメートルという身長に見合わないほど強い存在感を持って張り出していた。衛星画像では、彼女の上半身前面に沿って巨大な暗い弧が走り、その影が山地から都市圏へゆっくり移動しているように見えた。</p>
<p>　観測班は当初、それを雲塊か、衣装の影か、地形の誤認だと考えた。だが輪郭解析の結果、そこもまた彼女の身体の一部であり、接地すれば都市圏そのものを広い面で押し潰す質量だとわかった。</p>
<p>　十々瀬は自分の手を顔の近くへ持ち上げ、まじまじと眺めた。</p>
<p>「また大きくなってる」</p>
<p>　声は明るかった。</p>
<p>　困惑よりも、発見の方がずっと強い。</p>
<p>　指先を曲げる。伸ばす。掌をひらひらさせる。爪の先に引っかかっていた雲が千切れ、下の山岳地帯へ白く落ちていく。</p>
<p>「昨日より、街が細かく見えないかも」</p>
<p>　彼女は地上を覗き込んだ。</p>
<p>　その姿勢では、視線より先に胸元の黒い曲面が前へせり出す。首都圏の上空はまず大きな影に覆われ、ついで胸部下面が都市圏外縁の地表へ広く触れ、雲帯と空気が押し分けられた。まだ指を下ろしていない段階で、地上では日照低下と気圧変化に加え、面状の沈下帯まで発生し、観測班は「右手接近」より前に「前面巨大曲面の降下・接地」を記録していた。</p>
<p>　昨日、都市は灰色の染みに見えた。今日はもっと薄い。模様というより、地面に走った色の濃淡だった。道路や鉄道は髪の毛より細く、川は光る皺。高層ビル街ですら、遠目には布地の凹凸ほどにしか見えない。</p>
<p>　だが、その中にひとつ、ひときわ濃い灰色の塊があった。</p>
<p>　首都圏。</p>
<p>　広大な湾を抱え、放射状に伸びる鉄道と高速道路を持ち、行政、金融、報道、通信、軍事指揮の中枢が密集する、人類側の最大級都市圏だった。</p>
<p>　十々瀬には、大きな刺繍の模様に見えた。</p>
<p>「ここ、なんか密集してる。おもしろそう」</p>
<p>　地上では、すでに対策本部が壊滅寸前だった。</p>
<p>　庁舎の上層階では、臨時の統合災害対策会議が開かれていた。モニターには、十々瀬の身体を示す輪郭線が表示されている。だがその輪郭線は、画面に収まりきっていなかった。</p>
<p>「対象、推定五百キロメートル級へ増大」</p>
<p>「首都圏上空に右手接近」</p>
<p>「避難経路、すでに三割以上が寸断」</p>
<p>「地下施設への避難指示は中止しろ。地下は押し潰される」</p>
<p>　声は飛び交ったが、指示は現実に追いつかなかった。</p>
<p>　十々瀬の人差し指が、首都の北西からゆっくり降りてきた。</p>
<p>　指の腹だけで、都市の外縁部を覆うほどの広さがある。風圧で雲が逃げ、ヘリコプター部隊は接近前に姿勢を崩した。高層ビル群のガラスは、まだ触れられる前から震え始めた。</p>
<p>「まず、ここから」</p>
<p>　十々瀬は指先を地表へ置いた。</p>
<p>　外郭環状道路の一部が消えた。</p>
<p>　同時に、その周囲の住宅地、物流拠点、大学キャンパス、河川敷、鉄道車両基地が一枚の圧力に沈んだ。地表は円形にくぼみ、圧痕の縁では道路がめくれ、マンション群が外側へ傾いた。</p>
<p>　十々瀬は指を横へ滑らせる。</p>
<p>　たった数十センチ。</p>
<p>　彼女にとっては、布の表面をなぞるような動きだった。</p>
<p>　地上では、それが数十キロメートルの破壊線になった。</p>
<p>　高速道路は途切れ、鉄道は線路ごと剥がれ、川は堰き止められ、地下に張り巡らされた管路と駅施設がまとめて露出した。都市の表面に、巨大な指紋の溝が刻まれていく。</p>
<p>「線、昨日より太いね」</p>
<p>　十々瀬は嬉しそうに言った。</p>
<p>　彼女はそのまま、首都の中心へ向かって指を進めた。</p>
<p>　中心業務地区の超高層ビル群が、指の進路に入った。</p>
<p>　地上三百メートル級のビル。展望台。電波塔。官庁街。大規模駅。複数の地下路線が交差する巨大ターミナル。</p>
<p>　人類側にとっては都市機能の心臓部だった。</p>
<p>　十々瀬にとっては、少し濃い灰色の盛り上がりだった。</p>
<p>「でこぼこしてる」</p>
<p>　彼女は爪先で、軽く弾いた。</p>
<p>　展望塔が折れた。</p>
<p>　根元からではない。彼女の爪に触れた中ほどから、飴細工のようにしなり、上部構造が隣のビル群へ倒れ込んだ。倒壊は連鎖し、周囲の高層建築が互いにぶつかり、ガラスと鉄骨の雲を上げながら沈んでいく。</p>
<p>「わ、倒れた」</p>
<p>　十々瀬は目を輝かせた。</p>
<p>　そして、もう一度弾いた。</p>
<p>　今度は官庁街の一角が消えた。</p>
<p>　複数の庁舎が同時に座屈し、地下司令部へつながる構造物が押し込まれ、通信アンテナ群が潰れた。災害対策本部のモニターは一斉に砂嵐になり、次の瞬間、部屋全体が傾いた。</p>
<p>「本部応答なし」</p>
<p>「中央管制、消失」</p>
<p>「対象の右手、首都中枢を通過」</p>
<p>　軍の航空部隊は、その時点で攻撃を開始した。</p>
<p>　戦闘機群が雲の下から上昇し、十々瀬の手首へ向かってミサイルを放った。白い航跡が何十本も空を走る。地上の人々には、それが人類の反撃に見えた。</p>
<p>　十々瀬には、細い光の粒に見えた。</p>
<p>「ん？」</p>
<p>　ミサイルが彼女の手の甲で爆ぜた。</p>
<p>　小さな光。<br>　小さな煙。<br>　ほんの少しの熱。</p>
<p>　十々瀬は手を止めた。</p>
<p>「なにこれ。ちくってした」</p>
<p>　彼女は手の甲を顔に近づけた。</p>
<p>　そこに残っていた煤は、ほくろにも満たない。戦闘機の編隊は、彼女の視界では細かな虫の群れのように旋回していた。</p>
<p>「あ、飛んでる」</p>
<p>　十々瀬は息を吹きかけた。</p>
<p>　ただ、軽く。</p>
<p>　手の上の埃を払うくらいのつもりだった。</p>
<p>　しかし五百キロメートル級の彼女の吐息は、局地的な暴風では済まなかった。戦闘機群は航跡ごと乱され、何機もが姿勢を失い、雲の裂け目へ吸い込まれるように散っていった。首都圏上空の雲は半円形に吹き払われ、地上ではビル風をはるかに超える突風が街路を走った。</p>
<p>「飛んでっちゃった」</p>
<p>　十々瀬は楽しそうに言った。</p>
<p>　その声に、まだ立っていた高層ビルのガラスが雨のように落ちた。</p>
<p>　軍は次に、長距離誘導弾を使用した。</p>
<p>　複数の基地から発射された弾体が、弾道を描いて十々瀬の肩と首元へ向かう。人類側は、そこを感覚器官に近い部位と推定していた。</p>
<p>　だが、十々瀬は空を横切る光を見つけて、ぱっと笑った。</p>
<p>「花火？」</p>
<p>　彼女は手を伸ばした。</p>
<p>　掌が弾道の前に広がる。</p>
<p>　ミサイル群は、彼女の掌の前で次々と爆ぜた。赤と白の閃光が、雲より高い場所で小さく咲く。</p>
<p>「きれい」</p>
<p>　十々瀬は本当にそう思った。</p>
<p>　そして、もっと見たくなった。</p>
<p>「もう一回やってくれないかな」</p>
<p>　地上の司令系統は沈黙した。</p>
<p>　通信線は破断し、基地の滑走路は地震動で亀裂を走らせ、湾岸の弾薬庫は津波警報で閉鎖されていた。彼女が期待する二度目の花火を、人類側はすぐには用意できなかった。</p>
<p>「ないの？」</p>
<p>　十々瀬は少しつまらなそうに首を傾げた。</p>
<p>　その髪が、首都東部の上空へ垂れた。</p>
<p>　黒い髪のひと房が、巨大な吊り橋のように空を横切り、地表をかすめた。</p>
<p>　髪の先端が臨海部に触れる。</p>
<p>　それだけで、港湾倉庫群が薙ぎ払われた。コンテナヤードは色とりどりの粉のように散り、埋立地の道路は波打ち、空港の滑走路には長い擦過痕が刻まれた。駐機していた航空機は紙片のように転がり、管制塔は根元から折れた。</p>
<p>「あ、髪ついちゃった」</p>
<p>　十々瀬は髪を払った。</p>
<p>　その動きで、湾岸の水面が大きく押し出され、人工島の一部が沈んだ。</p>
<p>　彼女は首都の中心に戻る。</p>
<p>　さっき指で引いた溝が、もう水を集め始めていた。地下鉄の路線は露出し、一部は川のように水を流している。駅の吹き抜けは陥没湖になり、地下街は泥と瓦礫で埋まりつつあった。</p>
<p>「迷路みたい」</p>
<p>　十々瀬は指先で、別の線を引いた。</p>
<p>　今度は湾へ向かって。</p>
<p>　指跡は都市を斜めに裂き、河川と運河と地下道をつなげ、巨大な排水路のようになった。水が流れ込む。瓦礫が流れる。ビルの残骸が傾き、橋脚が折れ、都市の内部へ海が入り始めた。</p>
<p>　後にこの破壊線は「第二首都指溝」と呼ばれる。</p>
<p>　その名がついたころには、首都という言葉の意味そのものが変わっていた。</p>
<p>　そのとき、十々瀬はふと、昔のことを思い出した。</p>
<p>「そういえば、このへんって……丸い電車、なかったっけ」</p>
<p>　彼女の記憶の中には、まだ小さかったころの首都が残っていた。</p>
<p>　人で混み合う駅のホーム。黄緑色のライン。窓の外を流れるビルの壁。何駅も何駅も過ぎて、気づくと最初の場所へ戻ってくる、不思議な輪っかの電車。</p>
<p>「山手線、だっけ」</p>
<p>　十々瀬は楽しそうに目を細めた。</p>
<p>　地上の山手線は、すでに原形を失っていた。線路は寸断され、駅は潰れ、環状の鉄道網は瓦礫と水と指跡に埋もれている。だが、彼女の頭の中には、その輪がまだ残っていた。</p>
<p>　小さなころに見た路線図。<br>　丸くつながる緑の線。<br>　内回りと外回り。<br>　ぐるぐる回り続ける街の輪郭。</p>
<p>「たしか、こう」</p>
<p>　十々瀬は人差し指をそっと下ろした。</p>
<p>　首都中心部の西側から、南へ。<br>　そこから湾岸寄りへ曲がり、東へ。<br>　さらに北へ回り込み、また西へ戻る。</p>
<p>　彼女にとっては、記憶の中の線をなぞっているだけだった。</p>
<p>　しかし、五百キロメートル級の指先が描く円は、実際の山手線よりはるかに巨大だった。都心を丸ごと囲み、周辺都市を巻き込み、河川と高速道路と地下鉄網をまとめて切断する、直径数十キロの環状指溝が生まれていく。</p>
<p>　線路の跡は消えた。</p>
<p>　代わりに、深さ数百メートルの巨大な溝が首都を取り囲んだ。駅だった場所は圧力の節目で丸い陥没湖となり、かつて線路が曲がっていた地点では、地盤が大きくえぐれて湾の水が流れ込んだ。</p>
<p>　地上の観測員は、それを見て言葉を失った。</p>
<p>「環状破壊線、形成」</p>
<p>「旧山手線沿線、全域消失」</p>
<p>「対象、記憶に基づいて首都をなぞっている可能性」</p>
<p>　十々瀬は、途中で少し首を傾げた。</p>
<p>「んー、こんな形だったかな。まあ、だいたい合ってるよね」</p>
<p>　彼女は環状の溝をもう一周なぞった。</p>
<p>　二周目で、溝はさらに深くなった。内側の地盤が沈み、外側の都市区画が盛り上がり、首都の中心部は巨大な堀に囲まれた島のようになった。だがその島も、すでに島と呼べるほど整った形ではない。掌圧痕、指溝、陥没湖、瓦礫の丘が重なった、灰色の地形だった。</p>
<p>「できた」</p>
<p>　十々瀬は満足そうに指を上げた。</p>
<p>　地図上には、かつての山手線よりもずっと大きく、ずっと深く、ずっと荒々しい円が刻まれていた。</p>
<p>「山手線じゃなくて……十々瀬線、かな」</p>
<p>　彼女は自分で言って、くすっと笑った。</p>
<p>　後世の地図は、その名称を採用した。</p>
<p>　旧首都中心部を囲む巨大環状陥没帯。</p>
<p>　正式名称、百川十々瀬第二環状指溝。</p>
<p>　通称、十々瀬線。</p>
<p>　もちろん、それは鉄道ではなかった。</p>
<p>　列車が走ることはない。<br>　駅に人が並ぶこともない。<br>　内回りも外回りもない。</p>
<p>　ただ、百川十々瀬が昔の記憶を頼りに指でなぞった、巨大な傷だった。</p>
<p>　十々瀬は、ふと自分の胸元に視線を落とした。</p>
<p>　しゃがんだ姿勢で身体を支えていたため、身体の前へ大きく張り出した胸元が都市の外縁に近づいていた。黒い衣装の曲面は、地上から見れば山脈よりもなだらかで、山脈よりも大きい。五百キロメートル級になった今、その丸みはひとつの気象現象のように空を覆い、接地すれば都市圏の外周をまとめて押し沈めるほどだった。</p>
<p>　対策本部の残存観測機は、彼女の顔を捉えようとしていた。だが画面の大半を占めたのは、首都圏上空へせり出す巨大な胸元の影だった。青緑の上着の縁と黒い衣装の境界が、雲の層を切るようにゆっくり動いている。</p>
<p>「ここ、当たるかな」</p>
<p>　彼女は少し身体を前へ傾けた。</p>
<p>　柔らかな影が、首都圏の西側を覆った。</p>
<p>　地上では、昼が消えた。</p>
<p>　圧力はゆっくり降りてきた。山裾の住宅都市、研究学園都市、物流基地、郊外鉄道の終端駅。すべてが広い弧を描いて沈み始める。地盤は押され、川は逆流し、高架道路は途中から下向きに曲がった。</p>
<p>　足や掌のように一点から潰れるのではない。巨大な丸い面が、都市の端を静かに包み込むように降りてくる。高層住宅群は上から叩かれる前に基礎ごと傾き、丘陵地のニュータウンは地盤ごと滑り、道路網は胸元の曲率に沿うように弧を描いて裂けた。</p>
<p>　接地。</p>
<p>　衝撃ではなく、圧迫だった。</p>
<p>　都市の外縁は、巨大な丸い低地へ変わっていく。ビルの上層階から潰れるのではない。地面そのものが下がり、構造物が基礎ごと傾き、街全体がひとつの窪みへ沈んでいく。</p>
<p>　接地帯の中心では、街区の直線が消えた。碁盤目の道路は丸みに合わせて曲がり、地下鉄の終端駅は圧痕の底へ沈み、研究施設のドーム屋根は地盤の傾きに引きずられて半分だけ土に埋まった。後にこの一帯は、首都外縁胸元圧痕と呼ばれることになる。</p>
<p>「わ、やっぱり跡つく」</p>
<p>　十々瀬は笑った。</p>
<p>　その笑い声で、周囲の雲が輪のように広がった。</p>
<p>　軍の残存部隊は、最後の迎撃を試みた。</p>
<p>　首都圏外縁に残る複数の発射地点から、大型弾頭が放たれる。都市の上空を裂く白い線。目標は、彼女の接地点付近だった。</p>
<p>　しかし、十々瀬はそれを横目で見て、指を一本伸ばした。</p>
<p>「また花火？」</p>
<p>　指先が弾道を遮った。</p>
<p>　爆発が、彼女の爪の先で弾けた。</p>
<p>　爪の表面に、ほんの小さな焦げ跡が残る。</p>
<p>「熱っ」</p>
<p>　十々瀬は指を振った。</p>
<p>　その何気ない動きで、大気が裂けた。</p>
<p>　衝撃波が首都圏の残骸を横断し、まだ残っていた高架橋をまとめて倒した。湾の水面は逆立ち、炎上していた地区の煙が一方向へ流れ、地上の通信は完全に途絶した。</p>
<p>「びっくりした。ちょっと痛かったかも」</p>
<p>　彼女はむっとした。</p>
<p>　怒りというより、遊んでいた玩具が指先を刺したときのような顔だった。</p>
<p>「じゃあ、ここ、平らにしちゃお」</p>
<p>　十々瀬は掌を広げた。</p>
<p>　首都の中心部が、すっぽり影に入った。</p>
<p>　五百キロメートル級の彼女の掌は、都市の中枢を覆うには十分すぎるほど大きかった。指の間からわずかに光が漏れ、そこにビルの影が細く伸びる。</p>
<p>　そして、掌が降りた。</p>
<p>　空気が逃げた。</p>
<p>　暴風が外周へ吹き抜け、残っていた建物を先に倒した。次に、掌そのものの圧力が都市へ乗った。超高層ビルは高さを失い、官庁街は層になり、駅も道路も地下施設も区別をなくしていく。</p>
<p>　地表は、彼女の掌紋に沿って波打った。</p>
<p>　生命線のような深い溝が河川を曲げ、指の付け根の圧力が複数の区画を湖底へ変え、掌の中央部は広大な平坦地になった。</p>
<p>　十々瀬が手を上げたとき、首都中心部はもう都市ではなかった。</p>
<p>　掌の形をした巨大な窪地だった。</p>
<p>「きれいに平らになった」</p>
<p>　彼女は満足そうに言った。</p>
<p>　その日、後世の地図から旧首都中心線は消えた。</p>
<p>　代わりに記されたのは、百川十々瀬第二記録災害圏。</p>
<p>　通称、首都掌圧痕。</p>
<p>　十々瀬は自分の手の跡をしばらく眺めていた。</p>
<p>　足跡。<br>　指跡。<br>　接触圧痕。<br>　掌の跡。</p>
<p>　世界に、自分の形が増えていく。</p>
<p>　それがたまらなく面白かった。</p>
<p>「もっといろんな跡、残せるかな」</p>
<p>　彼女は立ち上がった。</p>
<p>　立ち上がるだけで、海から風が流れ込み、首都圏だった盆地に水が入り始めた。湾は拡張され、河口は変わり、都市の残骸は新しい海岸線の一部になっていく。</p>
<p>　十々瀬は遠くの山脈を見た。</p>
<p>　昨日は大きく見えた山々が、今日は低い皺のように見えた。</p>
<p>　自分はまだ大きくなっている。</p>
<p>　その事実に、彼女は不安ではなく期待を覚えた。</p>
<p>「次は、寝転んでみよっかな」</p>
<p>　地上の観測網が、その言葉を記録した。</p>
<p>　それは宣言ではない。<br>　脅迫でもない。<br>　ただの思いつきだった。</p>
<p>　だが人類にとっては、次の災害予告だった。</p>
<p>　百川十々瀬巨大化記録。</p>
<p>　第二話。</p>
<p>　首都をなぞる指先。<br></p></div><div class="chapter-nav"><a href="０１.html">← ０１</a><a href="０３.html">０３ →</a></div></section><section class="chapter" id="ch-０３"><header><h2>０３　寝返りで地方が消えた</h2><div class="meta">改稿版 / ０３_寝返りで地方が消えた_改稿版.txt</div></header><div class="prose"><p>　首都掌圧痕と十々瀬線が地図に刻まれてから、まだ一日も経っていなかった。</p>
<p>　百川十々瀬は、さらに大きくなっていた。</p>
<p>　身長、約七百キロメートル。<br>　推定三サイズ、B約千二百六十キロメートル、W約二百九十キロメートル、H約五百キロメートル。</p>
<p>　五百キロメートル級で首都をなぞったとき、彼女の指先は都市圏を線で裂いた。七百キロメートル級となった今、その指先は地方都市を点として潰し、掌は山脈をまとめて覆い、脚を伸ばせば複数の湾を同時にまたぐほどになっていた。</p>
<p>　そして、彼女の胸元はさらに無視できない地形要因になっていた。</p>
<p>　黒い衣装に包まれた巨大な張り出しは、横たわる姿勢では胴体より先に地表へ近づく。腰や脚よりも前面へ大きくせり出したその量感は、寝返りの軌道上で山脈や都市を広い面として巻き込み、足跡とも掌跡とも違う、なだらかで深い圧痕を残すと予測された。</p>
<p>　人類側の観測網は、彼女を一個の生命体として扱うことを半ば諦めていた。</p>
<p>　気象衛星は、彼女の髪が作る乱流を雲画像として捉えた。<br>　地震計は、彼女の身じろぎを広域地殻変動として記録した。<br>　海洋ブイは、彼女の足先が動くたびに発生する長周期波を津波と判定した。</p>
<p>　災害対策の言葉は、次第に変わっていった。</p>
<p>　避難ではない。<br>　迎撃でもない。<br>　予測だった。</p>
<p>「対象、北東方向へ上体を傾斜」</p>
<p>「接地予測範囲、三県を超過」</p>
<p>「膝、肘、胸部、腹部、太腿の同時接触に注意」</p>
<p>「胸部接地帯、予測図を別枠で出せ。面積が広すぎる」</p>
<p>「寝返りの可能性を最優先で計算しろ」</p>
<p>　最後の言葉を口にした職員は、笑っていなかった。</p>
<p>　七百キロメートルの少女が寝返りを打つ。</p>
<p>　その予測図は、どの災害地図よりも単純で、どの戦略地図よりも絶望的だった。</p>
<p>　だが本人は、そんなことをまるで知らない。</p>
<p>「んー……」</p>
<p>　十々瀬は大きく伸びをした。</p>
<p>　両腕が雲の層を裂き、肩の周囲で薄い大気が流れを変える。指先に引っかかった巻雲が千切れ、白い布切れのように山岳地方へ落ちていった。</p>
<p>「ちょっと疲れたかも」</p>
<p>　彼女にとって、それは当然の感想だった。</p>
<p>　朝からずっと歩いていた。<br>　海を踏み、首都をなぞり、山をつまみ、足を洗い、掌で都市を平らにした。</p>
<p>　身体はさらに大きくなっていて、感覚も変わり続けていた。昨日は大きく見えた山脈が、今日は眠る前の布団の皺のように見える。広いはずの平野も、横になれば自分の胴体ひとつで覆える程度の広がりしかなかった。</p>
<p>　十々瀬は足元を見回した。</p>
<p>　どこに寝転べばいいのか、少し考えた。</p>
<p>「海は冷たいし……山はごつごつしてそうだし……」</p>
<p>　彼女の視線が、内陸の広い盆地と平野に向いた。</p>
<p>　人類側の地図では、そこは複数の県にまたがる農業地帯であり、工業都市群であり、山間の温泉地であり、湖沼と河川を抱えた生活圏だった。</p>
<p>　十々瀬には、少し平らで、寝やすそうな場所に見えた。</p>
<p>「ここでいいかな」</p>
<p>　観測網が、その一言を拾った。</p>
<p>　対策本部に、沈黙が落ちた。</p>
<p>「対象、横臥姿勢へ移行」</p>
<p>「予測接地帯、第一から第五まで表示」</p>
<p>「住民避難は間に合わない。地下退避も不可」</p>
<p>「高所も意味がない。地形ごと沈む」</p>
<p>　それでも、放送は流された。</p>
<p>　逃げろという言葉ではなかった。</p>
<p>　動ける者は、接地予測線から少しでも離れろ。<br>　建物から出ろ。<br>　河川沿いを避けろ。<br>　橋を渡るな。<br>　地割れに注意しろ。</p>
<p>　だが、七百キロメートルの身体が降りてくる前では、それらの言葉はあまりにも小さかった。</p>
<p>　十々瀬は膝を折った。</p>
<p>　膝頭が山麓に触れる。</p>
<p>　山麓と呼ばれていた地形は、彼女の膝の下で幅数十キロにわたって沈み込んだ。森林が円弧状に倒れ、送電鉄塔が細い針のように折れ、谷は土砂で埋まった。山道は、膝が作った圧力の波に飲まれて線を失った。</p>
<p>「あ、ここちょっと固い」</p>
<p>　十々瀬は膝の位置を少しずらした。</p>
<p>　それだけで、山脈の支尾根が横へ押し潰された。尾根はずれ、谷はひしゃげ、地質図上には後に「膝移動剪断帯」と呼ばれる帯状の崩壊地形が残ることになる。</p>
<p>　次に、彼女は両手をついた。</p>
<p>　右手は湖沼地帯に。<br>　左手は工業都市群の外縁に。</p>
<p>　右の掌が湖を押した。</p>
<p>　湖面は一瞬で周囲へ逃げ、堤防を越え、湖岸の町を背後から飲み込んだ。掌の中央で湖底が沈み、指の間から逃げた水が五本の奔流となって平野へ走る。</p>
<p>　左の掌は、工業都市の道路網を掌紋で潰した。</p>
<p>　工場の屋根は薄い膜のように剥がれ、倉庫群は平らな色の帯になり、幹線道路は生命線のような溝に沿って曲がった。河川に架かる橋は、指の付け根の圧力でまとめて沈んだ。</p>
<p>「よいしょ」</p>
<p>　十々瀬は身体を横へ倒した。</p>
<p>　その瞬間、昼が消えた。</p>
<p>　彼女の胴体が空を覆い、広大な影が地方全域へ広がる。山、町、田畑、湖、鉄道、高速道路。すべてが同じ暗さに包まれた。</p>
<p>　接地は、ゆっくり始まった。</p>
<p>　まず髪が落ちた。</p>
<p>　黒い髪の束が山腹へ流れ、森林を帯状になぎ倒した。木々は同じ方向へ伏し、谷間の集落は髪の重みで屋根を失い、河川は黒い束に塞がれて流れを変えた。</p>
<p>　次に、腕が平野を押した。</p>
<p>　前腕だけで、ひとつの地方都市と周辺の田園を覆うほどだった。接触した地面は幅広く沈み、圧力の縁で水田が波のようにめくれた。鉄道線路は途中から地中へ消え、高速道路の高架は腕の下で途切れた。</p>
<p>　そして、胴体が降りた。</p>
<p>　その前に、胸元の影が地上を覆った。</p>
<p>　黒い衣装の巨大な曲面が、盆地の上へゆっくり傾いてくる。地上の観測カメラは一瞬、山岳の斜面が空から降りてきたのだと誤認した。だがそれは地形ではなかった。七百キロメートル級の十々瀬の身体の前面、彼女が横になるだけで先に地表へ届いてしまう巨大な量感だった。</p>
<p>　胸元が、平野の北端に接した。</p>
<p>　衝撃ではなかった。</p>
<p>　巨大な重みが、じわじわと地形を均していく現象だった。</p>
<p>　山裾が沈む。<br>　盆地が浅くなる。<br>　川が二つに分かれる。<br>　町の区画がゆっくり傾き、建物が基礎ごと同じ方向へ流れる。</p>
<p>　胸元の接地帯では、さらに広い変化が起きていた。</p>
<p>　農村地帯と二つの地方都市が、同じ丸みに沿って沈み込む。中心部は緩やかな谷底のように低くなり、外周では地面が押し出されて環状の高まりを作った。鉄道は弧を描いて曲がり、川は圧痕の縁に沿って流路を変え、湖沼地帯の水は低くなった中心へ集まり始めた。</p>
<p>　十々瀬は横になり、頬を手に乗せた。</p>
<p>「ふう。やっぱり寝転ぶと楽」</p>
<p>　十々瀬は何も気にしていない。</p>
<p>　胸元の下で、地図の色が変わっていくことも。押し広げられた地盤の縁で、町が少しずつ傾いていることも。黒い衣装の曲面に沿うように、雲が左右へ逃げ、山間の霧が潰れたように低く這っていることも。</p>
<p>　その声で、近くの湖面に波が立った。</p>
<p>　地上では、観測班が接地図を更新していた。</p>
<p>「第一接地帯、予測より南へ十五キロ拡大」</p>
<p>「右腕下、都市機能消失」</p>
<p>「胴体接地部、広域地盤沈下。深度、最大二百メートル超」</p>
<p>「胸部接地帯、地方都市二、農村圏六、湖沼三を包含。圧痕中心へ水系が流入中」</p>
<p>「髪による河川閉塞、四十二箇所」</p>
<p>「対象、安静状態」</p>
<p>　安静。</p>
<p>　その言葉の意味は、もう人間のものではなかった。</p>
<p>　十々瀬が何もしないでいることが、地上では地形改変だった。</p>
<p>　彼女は目を細め、遠くの山を見た。</p>
<p>「このへん、ふかふかしてる」</p>
<p>　ふかふかしている、という彼女の感想は、地上では農村地帯の沈降を意味していた。田畑は区画を失い、用水路は潰れ、低い丘陵は柔らかい布のように押し広げられている。</p>
<p>　十々瀬は、眠くなってきた。</p>
<p>　まぶたを閉じる。</p>
<p>　呼吸が深くなる。</p>
<p>　その呼吸だけで、周辺の雲は周期的に流れを変えた。吐く息で山腹の霧が吹き払われ、吸う息で沿岸から湿った空気が内陸へ引き込まれる。気象庁の端末には、局地的な風向変化では説明できない巨大な呼吸循環が表示された。</p>
<p>「すう……」</p>
<p>　十々瀬は眠りかけた。</p>
<p>　そのとき、遠くで光が瞬いた。</p>
<p>　地球側軍事網による、最後の通常総攻撃だった。</p>
<p>　首都壊滅後、残存指揮系統は分散していた。山岳地下の予備司令部、沖合へ退避した艦隊、国外基地、軌道上の監視衛星。互いに途切れかけた通信をつなぎ合わせ、彼らは一度だけ、全戦力を同じ目標へ向けた。</p>
<p>　作戦名は、夜明けの鐘。</p>
<p>　目的は撃破ではない。</p>
<p>　撃破という言葉は、すでに会議室から消えていた。</p>
<p>　七百キロメートル級の少女を倒す手段など、通常戦力には存在しない。彼らが狙ったのは、眠りかけた十々瀬を起こすこと、少なくとも姿勢を変えさせることだった。</p>
<p>　それが成功すれば、接地中の地域は救われるかもしれない。</p>
<p>　代わりに、別の地方が潰れる。</p>
<p>　誰もその矛盾を口にしなかった。</p>
<p>「全航空隊、最終進入」</p>
<p>「洋上艦隊、射撃管制同期」</p>
<p>「陸上長距離砲、発射準備完了」</p>
<p>「衛星誘導、誤差修正不能。対象が大きすぎます」</p>
<p>「構わん。光らせろ。彼女に気づかせるんだ」</p>
<p>　最初に飛び込んだのは航空部隊だった。</p>
<p>　高高度爆撃機、戦闘機、無人機、電子戦機。雲の下、雲の上、成層圏の縁。ありったけの高度差を使って、彼らは十々瀬の頬、耳元、肩、指先へ向かった。</p>
<p>　地上から見れば、それは人類の反撃だった。</p>
<p>　十々瀬の視界では、眠る前の暗がりにちらつく小さな虫だった。</p>
<p>　第一波の誘導弾が、彼女の頬の近くで爆ぜた。</p>
<p>「ん……？」</p>
<p>　十々瀬は片目を開けた。</p>
<p>　頬に、いくつかの小さな熱が散った。火花のようだった。</p>
<p>「また花火……？」</p>
<p>　眠そうな声だった。</p>
<p>　第二波が来る。</p>
<p>　沖合艦隊から放たれた巡航弾と艦砲弾が、海面すれすれを走り、内陸へ向かう。山岳基地からは長距離弾が上がり、国外から飛来した弾体が高空で白い線を引いた。</p>
<p>　十々瀬の耳元で、数百の光が弾けた。</p>
<p>　地上では、夜空が昼のように明るくなった。</p>
<p>　十々瀬は眉を寄せた。</p>
<p>「うるさいなあ」</p>
<p>　彼女は、寝ぼけたまま手を振った。</p>
<p>　それだけだった。</p>
<p>　手のひらが大気を押し、雲をまとめて横へ流し、弾道上の誘導弾を吹き散らした。さらにその風圧は山岳地帯を越え、砲撃を行っていた基地の滑走路に土砂と瓦礫を降らせた。</p>
<p>　航空部隊は陣形を失った。</p>
<p>　戦闘機は自分たちの速度ではなく、十々瀬の手振りで生まれた大気の流れに翻弄された。翼はきしみ、無人機は信号を失い、爆撃機は雲の裂け目へ押し流されていく。司令部の画面から、機影が一つずつ消えた。</p>
<p>「第三航空群、散開不能」</p>
<p>「無人機管制、全喪失」</p>
<p>「対象、損傷確認できず」</p>
<p>「損傷どころか、覚醒反応も低い」</p>
<p>　艦隊は、なおも射撃を続けた。</p>
<p>　沖合に展開していた護衛艦、巡洋艦、潜水艦、補給艦。砲口と発射筒から、白い航跡が次々と伸びる。海面は炎と煙で埋まり、人類の海軍力が一つの方向へ注ぎ込まれた。</p>
<p>　十々瀬は、まぶたを半分閉じたまま、海の方へ指を伸ばした。</p>
<p>　眠ったまま、邪魔な音のする方を探しただけだった。</p>
<p>　指先が海へ落ちた。</p>
<p>　海面がへこみ、外へ逃げた水が巨大なうねりとなって艦艇群へ向かった。護衛艦、輸送艦、補給艦。どれも彼女の視界では水面の小さな点にすぎない。波はそれらをまとめて散らし、航跡を消した。</p>
<p>　潜水艦隊も例外ではなかった。</p>
<p>　指先が海底近くまで水を押し込み、急激な圧力変化が海中を走った。潜航していた艦は深度を保てず、海流に巻かれ、互いの位置を見失った。ソナーには、目標の輪郭ではなく、海そのものが動く音だけが映った。</p>
<p>「艦隊、統制不能」</p>
<p>「洋上火力、沈黙」</p>
<p>「海中部隊、通信断絶」</p>
<p>　最後に残ったのは、陸上の重砲と移動式発射部隊だった。</p>
<p>　彼らは眠る十々瀬の指先、耳、首筋へ向けて、残る弾薬を撃ち尽くした。山間の発射地点から、平野の仮設陣地から、破壊された高速道路の路肩から、ありとあらゆる火線が上がった。</p>
<p>　十々瀬の肌の上で、小さな光が散った。</p>
<p>　点。<br>　点。<br>　点。</p>
<p>　それは彼女を傷つけなかった。</p>
<p>　起こすこともできなかった。</p>
<p>「あとで……見よ……」</p>
<p>　十々瀬はそうつぶやいて、目を閉じた。</p>
<p>　彼女は軍隊の存在を理解していなかった。</p>
<p>　敵とも、抵抗とも思っていない。</p>
<p>　眠る前に見えた、遠くの小さな光。</p>
<p>　その程度だった。</p>
<p>　作戦、夜明けの鐘は終了した。</p>
<p>　通常戦力による百川十々瀬への有効干渉、確認できず。</p>
<p>　後世の軍事記録は、その一文で地球軍の抵抗を締めくくる。</p>
<p>　以後、人類の通常軍隊や艦隊が、彼女に何かを気づかせることはほとんどなくなる。</p>
<p>　そして、十々瀬は眠った。</p>
<p>　その夜、人類は初めて、七百キロメートル級の少女の睡眠を観測した。</p>
<p>　睡眠第一時相。</p>
<p>　呼吸による周期風。<br>　体温による局地上昇気流。<br>　接地圧による地盤沈下継続。<br>　髪束による河川閉塞。</p>
<p>　睡眠第二時相。</p>
<p>　微細な身じろぎ。<br>　右肩の沈下。<br>　左太腿の接地拡大。<br>　胸元圧痕の緩慢な拡大。<br>　湖沼の連結。</p>
<p>　眠っている十々瀬の呼吸に合わせて、胸元の接地圧はわずかに変化した。</p>
<p>　吸うとき、圧力が少し緩み、圧痕の底へ濁った水が流れ込む。吐くとき、再び重みが乗り、沈みかけた町の残骸が泥の下へ押し込まれる。人間の目にはほとんど止まって見えるほどゆっくりした変化だったが、数時間の記録を早送りすると、地方の地形が彼女の寝息に合わせて脈打つように沈んでいく様子が見えた。</p>
<p>　睡眠第三時相。</p>
<p>　寝返り予兆。</p>
<p>　その警報が出たとき、対策本部の誰も声を出さなかった。</p>
<p>　十々瀬の肩が動いた。</p>
<p>　まず、髪が引きずられた。</p>
<p>　山腹を覆っていた黒い束が横へ流れ、森林をさらに広く薙いだ。せき止められていた川が突然解放され、土砂と水が下流へ走る。</p>
<p>　次に、腕が持ち上がった。</p>
<p>　腕の下から、潰れた都市の跡が現れた。だがそれは、空気に触れた瞬間に崩れ始めた。圧力で脆くなったビル群が、自重で沈み、地下構造物が連鎖的に落ち込む。</p>
<p>　十々瀬は寝ぼけて、身体を反対側へ転がした。</p>
<p>　寝返り。</p>
<p>　それは地上の言葉では、地方消失だった。</p>
<p>　背中が山脈へ乗り上げた。</p>
<p>　標高二千メートル級の山々が、彼女の背中の下で平たい皺になった。尾根は削れ、山頂は消え、谷は横から押し潰される。火山湖は縁を失い、周辺の町を巻き込んで新しい水域へ流れた。</p>
<p>　胸元が、眠る前とは別の平野へ滑った。</p>
<p>　寝返りの途中で、身体の前へ張り出した巨大な重みが地表を横切った。正面から押すのではない。丸い山体が横倒しのまま移動するように、黒い衣装の曲面が町と丘陵を斜めに押し流していく。</p>
<p>　地方都市の中心部は、最初に影へ呑まれ、次に圧力へ呑まれた。駅前広場、官庁街、商業施設、河川敷、郊外の住宅地。それらは個別に潰れるのではなく、胸元の丸みに沿って一枚の地層のように曲げられ、低い方向へ押し広げられた。</p>
<p>　後にその場所は「第三胸部転動圧痕」と呼ばれる。</p>
<p>　腰が盆地を覆った。</p>
<p>　盆地の空気が外へ押し出され、暴風となって周辺都市へ吹きつけた。地面は中央から沈み、鉄道網は半円形に曲がり、川は流れを失って圧痕の縁に沿う新しい水路になった。</p>
<p>　太腿が別の地方都市群へ落ちた。</p>
<p>　直接的な衝撃で、都市は形を失った。だがそれ以上に大きかったのは、接地後のずれだった。寝返りの勢いで太腿が地表を横へ擦り、数十キロにわたって市街地と丘陵をまとめて削った。</p>
<p>　地図上で見ると、その痕跡は巨大な刷毛で塗りつぶしたように見えた。</p>
<p>　後にそこは「第三地方擦過帯」と呼ばれる。</p>
<p>　十々瀬は、半分眠ったまま小さく笑った。</p>
<p>「ん……くすぐったい……」</p>
<p>　彼女にとっては、地面の凹凸が肌をかすめた程度だった。</p>
<p>　人類にとっては、地方の消失だった。</p>
<p>　夜明け前、彼女は目を覚ました。</p>
<p>　頬の下が少し湿っている。</p>
<p>　寝ている間に、押し潰された湖と川の水が集まり、彼女の顔の近くに広い水面を作っていた。そこには、朝焼けと、彼女の巨大な瞳の一部が映っていた。</p>
<p>「おはよ」</p>
<p>　十々瀬は水面に向かって言った。</p>
<p>　その声で湖面が震え、岸辺の瓦礫が崩れた。</p>
<p>　彼女はゆっくり上体を起こした。</p>
<p>　身体が離れると、地上には新しい地形が現れた。</p>
<p>　腕の形をした低地。<br>　背中に押された山脈の平坦面。<br>　腰の圧力で生まれた盆地。<br>　胸元が沈めた広い丸底の低地。<br>　寝返りで胸部が横へ押し流した転動圧痕。<br>　太腿が擦った広大な帯状荒地。<br>　髪が流れた森の空白。<br>　寝息で向きの変わった雲の道。</p>
<p>　さらに、寝返りの前後で湖沼が連結していた。</p>
<p>　いくつもの湖、ダム、河川、沈んだ町が水でつながり、巨大な内陸水域を作っていた。地図の名前は後から決まる。だが観測班は、その場で仮称をつけた。</p>
<p>　百川十々瀬第三睡眠湖群。</p>
<p>　通称、寝返り湖群。</p>
<p>　十々瀬は、それを見て目を丸くした。</p>
<p>「え、湖増えてる」</p>
<p>　彼女は指先で水面をつついた。</p>
<p>　波が湖群全体に広がり、沈みかけていた町の屋根をさらに水中へ押し込んだ。</p>
<p>「寝てる間にも、いろいろできるんだ」</p>
<p>　嬉しそうな声だった。</p>
<p>　彼女は身体についた土を軽く払った。</p>
<p>　その土の塊が山間部へ落ち、新しい丘を作った。爪の先に残っていた瓦礫を弾くと、それは数十キロ先の平野に降り、細長い瓦礫堤となって川をせき止めた。</p>
<p>　地上の観測員は、疲れ切った声で報告した。</p>
<p>「対象、覚醒」</p>
<p>「第三睡眠災害圏、確定不能。範囲拡大中」</p>
<p>「地方行政単位、複数消失」</p>
<p>「地形名の更新が追いつきません」</p>
<p>　十々瀬は、そんな声を知らない。</p>
<p>　彼女は朝の光の中で膝を立て、遠くの海を見た。</p>
<p>　昨日は広く見えた海が、今日は少し近い。</p>
<p>　そして、自分の身体はまだ大きくなっている。</p>
<p>　立ち上がろうとしただけで、足元の平野が沈んだ。膝を上げると、膝跡に水が流れ込んだ。髪を後ろへ払うと、山の稜線がまた一本、黒い束に撫でられて消えた。</p>
<p>「んー、よく寝た」</p>
<p>　十々瀬は伸びをした。</p>
<p>　その伸びで、雲が東西に裂けた。</p>
<p>　彼女の視線は、海へ向かっていた。</p>
<p>　海。</p>
<p>　昨日は足を洗う場所だった。<br>　今日は、座ってみたらどうなるのか気になる場所だった。</p>
<p>「次は、海で休もっかな」</p>
<p>　彼女はそう言って、立ち上がった。</p>
<p>　その一歩で、寝返り湖群の南端が崩れ、新しい川が生まれた。</p>
<p>　百川十々瀬巨大化記録。</p>
<p>　第三話。</p>
<p>　寝返りで地方が消えた。<br></p></div><div class="chapter-nav"><a href="０２.html">← ０２</a><a href="０４.html">０４ →</a></div></section><section class="chapter" id="ch-０４"><header><h2>０４　小さな水たまりで</h2><div class="meta">改稿版 / ０４_小さな水たまりで_改稿版.txt</div></header><div class="prose"><p>　寝返り湖群が内陸の地図を書き換えた翌朝、百川十々瀬は海を見ていた。</p>
<p>　身長、約一千キロメートル。<br>　推定三サイズ、B約一千八百キロメートル、W約四百二十キロメートル、H約七百二十キロメートル。</p>
<p>　それは、列島の長さそのものが彼女の身体の一部と比較される段階だった。</p>
<p>　七百キロメートル級の睡眠災害を観測した人類は、まだ被害範囲すら確定できていなかった。寝返りで生まれた湖群、山脈を横へ押し流した胸元の転動圧痕、髪にせき止められた河川。どれも地図上では別々の災害名を与えられていたが、十々瀬にとっては、眠っている間についた小さな寝癖のようなものだった。</p>
<p>　彼女は立ち上がった。</p>
<p>　その瞬間、雲は彼女の身体にまとわりつかなかった。</p>
<p>　一千キロメートルの身長に対して、上層雲の雲頂はせいぜい十数キロメートル。十々瀬の目から見れば、それは空に浮かぶ厚い綿ではなく、地表に貼りついた白い薄皮だった。膝も腰も胸元も、雲の層などはるか下に置き去りにしている。足元から少し離れた地表の上にだけ、雲の斑点と筋が、地図の汚れのように残っていた。</p>
<p>　黒い衣装に包まれた胸元は、胴体の前へ巨大な半球状の地形のように張り出していた。彼女が少し前屈みになるだけで、雲を押し分けるのではなく、雲ごと地表の広い範囲を影の下へ沈めた。</p>
<p>　パステル色の髪房が風に流れる。<br>　白銀、薄紫、水色、淡い桃色の束は、空中の雲を引っかける高さではなく、はるか下の地表へ届いた先端だけが、森林と山腹と、そこに貼りつく薄い雲層をまとめて撫で払っていった。</p>
<p>「やっぱり、また大きくなってる」</p>
<p>　十々瀬は嬉しそうに言った。</p>
<p>　声が空を押し、地表近くの薄い雲膜に円形の乱れが走った。</p>
<p>　その声を拾える観測設備は、もう限られていた。地上の通信網は寸断され、軍の通常戦力は第三話に相当する睡眠災害の夜に沈黙していた。航空部隊も艦隊も、彼女に何かを気づかせる力を失っている。</p>
<p>　それでも人類は、彼女を記録しようとしていた。</p>
<p>　百川十々瀬に一刻一刻と生息域を狭められているというのに、彼女に対する記録映像は驚くほど少なかった。</p>
<p>　無理もない。</p>
<p>　一千キロメートル級となった彼女を地上から直接視認できた者は、その数秒後には声の圧力、足運びの衝撃波、胸元の影で発生した急激な気圧差、あるいは髪房が生む暴風のいずれかに巻き込まれていた。カメラを向けることはできても、映像を送信し終える前に、観測点そのものが消えた。</p>
<p>　残っているのは、衛星画像の欠けた輪郭、海面高度計の異常値、地震計の飽和記録、雲頂高度の等値線がまとめて潰された痕跡から逆算された足元の位置。そして、途切れ途切れの数秒だけ映った、黒い衣装の巨大な曲面と、その下に落ちた大陸規模の影だった。</p>
<p>　人類は、まだ存在していた。</p>
<p>　避難する者、記録する者、祈る者、通信を復旧しようとする者、瓦礫の中で地図を描き直す者。</p>
<p>　だが、その文明の動きは、一千キロメートル級の十々瀬には届かなかった。</p>
<p>　彼女に見えるのは、地面の色の違い。<br>　水面の光。<br>　足元に残る、自分の跡。</p>
<p>　それだけだった。</p>
<p>「海、広いと思ってたけど」</p>
<p>　十々瀬は足を伸ばした。</p>
<p>　白いサンダルの底が海峡を越えた。つま先が外洋へ届き、踵はまだ内陸の山地に乗っている。黒いレッグウェアに包まれた細い脚がゆっくり動くだけで、山脈の稜線がたわみ、沿岸平野の地盤が傾き、湾の水面が一斉に持ち上がった。</p>
<p>「今見ると、ちょっとした水たまりみたい」</p>
<p>　彼女は海へ向かって歩いた。</p>
<p>　一歩目で、沿岸平野が消えた。</p>
<p>　足裏が海岸線をまたぎ、港湾都市、河口、空港、工業地帯、漁港、砂浜を同時に押し潰した。海と陸の境目は意味を失い、足跡の内側へ海水が流れ込み、外側へ土砂が押し出された。白いサンダルの溝はそのまま海岸に残り、数百キロメートル幅の新しい入り江と堤状隆起を作った。</p>
<p>　二歩目で、島々が揺れた。</p>
<p>　彼女の足が海底に届き、浅い海は一瞬で押しのけられた。大陸棚の上にあった水が白い壁となって周囲へ逃げ、島々の港を乗り越え、山腹まで駆け上がった。海峡を行き来していた船舶群は、船というより水面に散った細かな欠片として、波の泡に混ざった。</p>
<p>　三歩目で、海底が削れた。</p>
<p>　足指が砂州と海溝の縁をひっかき、泥と岩盤が水中で舞い上がる。爪先の一撫でで海底谷が折れ、濁った海流は渦となり、遠くの湾へ向かって広がった。</p>
<p>「あ、冷たい」</p>
<p>　十々瀬は笑った。</p>
<p>　彼女にとっては、足首を水に入れた程度だった。</p>
<p>　地球の海にとっては、大陸棚の再編だった。</p>
<p>　十々瀬は、そのまま海に腰を下ろした。</p>
<p>　座る。</p>
<p>　ただ、それだけだった。</p>
<p>　しかし一千キロメートル級の身体が海へ沈むと、海水は行き場を失った。</p>
<p>　周囲の海面が持ち上がる。</p>
<p>　湾から湾へ、海峡から海峡へ、白い水の壁が走った。島々の間にあった航路は消え、港湾施設は意味を失い、沿岸都市は陸側からではなく海側から押し潰された。</p>
<p>　水深数百メートルの海域でも、彼女の身体は海底に触れた。</p>
<p>　腰が沈む。<br>　太腿が海底を押し広げる。<br>　海溝の縁が崩れる。<br>　海山が平らになる。<br>　海底ケーブルは髪の毛より細い線として千切れた。</p>
<p>　さらに、胸元の巨大な張り出しが遅れて海面へ近づいた。</p>
<p>　黒い衣装の曲面が空から降りてくるにつれ、海上は昼でありながら夜のように暗くなった。観測衛星は、それを雲の影ではなく、海盆ひとつを覆うほどの身体影として記録した。十々瀬が少し前へ屈むと、その張り出した質量は水面を直接押し、海は柔らかい巨大な壁に押されたように左右へ逃げた。</p>
<p>　胸元が触れた海域には、足跡とは違う、丸く広い圧痕が残った。</p>
<p>　押し潰された水面の下で、海底の泥が外周へ押し出される。中央部は低く沈み、周囲に環状の土砂隆起が生まれた。後世の海図では、そこを第四胸元海盆と呼ぶ。直径、推定六百キロメートル。形成時間、十々瀬が「ちょっと前にかがんだ」数十秒。</p>
<p>「んー、ちょっと浅いかも」</p>
<p>　十々瀬は腰をずらした。</p>
<p>　海が横へ動いた。</p>
<p>　座った位置から押し出された水が、半円形の巨大波となって広がる。波は島を越え、湾を埋め、沿岸の平野を白く覆った。内陸の寝返り湖群へも、河川を逆流した海水が混じり始めた。</p>
<p>　彼女が上半身を揺らすたび、胸元の黒い曲面も遅れて揺れ、その影が海面を横切った。影の下では気温が落ち、風向きが反転し、波の進行方向までねじれた。人類側の気象記録には、突発的な低温域としてではなく、百川十々瀬の胸部影が通過した時刻として残される。</p>
<p>　人類側の観測資料には、こう記録される。</p>
<p>　百川十々瀬第四海洋接座災害。</p>
<p>　通称、海座圧。</p>
<p>　十々瀬本人は、その名前を知らない。</p>
<p>　彼女はただ、海の冷たさが気に入っていた。</p>
<p>「足、ぷかぷかする」</p>
<p>　実際には、足は浮いていなかった。</p>
<p>　海底を押し潰しながら、海水が足の周囲を逃げているだけだった。それでも十々瀬には、水に触れる感覚が少し心地よかった。</p>
<p>　彼女は近くの島へ手を伸ばした。</p>
<p>　人類の地図では、複数の町と港と山を持つ大きな島だった。</p>
<p>　十々瀬には、海に浮いた小石に見えた。</p>
<p>「これ、動かせるかな」</p>
<p>　彼女は親指と人差し指を島の両側へ寄せた。</p>
<p>　つまむつもりだった。</p>
<p>　だが千キロメートル級の彼女にとって、島ひとつは細かすぎる。指先は海岸線と山地と海底基盤をまとめて押し込み、島の端を横から滑らせる形になった。</p>
<p>　島は抵抗した。</p>
<p>　地殻として、海底として、長い時間をかけてそこにあった地形として。</p>
<p>　だが、十々瀬の指の力には足りなかった。</p>
<p>　海岸線が砕け、山が割れ、島の基部が海底から裂けた。大量の土砂が水中へ崩れ、海面が泡立つ。彼女は海底ごとその位置を少し押しずらし、すぐ隣の海域へ寄せた。</p>
<p>「こっちの方が、並びがいいかも」</p>
<p>　島が落ちた。</p>
<p>　新しい場所で海底が沈み、水が跳ね、周囲の小島が波に飲まれた。元の場所には、えぐれた海底と濁流だけが残った。</p>
<p>　十々瀬はもう一つ、小さな島を指で押した。</p>
<p>　島は横滑りするように崩れ、半分が海へ沈んだ。</p>
<p>「あ、割れちゃった」</p>
<p>　彼女は少しだけ残念そうに言った。</p>
<p>　だが、すぐに笑った。</p>
<p>「まあ、これはこれでかわいいかな」</p>
<p>　そのころ、人類側で最後の決定が下されていた。</p>
<p>　通常兵器は終わった。</p>
<p>　航空隊も艦隊も、砲兵も誘導弾も、七百キロメートル級の十々瀬に有効な干渉を与えられなかった。一千キロメートル級になった彼女には、もはや音も光も届かない。</p>
<p>　残された最後の砦。</p>
<p>　核ミサイル。</p>
<p>　地下指揮所の照明は、何度も明滅していた。壁には亀裂が走り、外では余震と津波警報が重なっている。通信は不安定で、発射権限の確認も途切れ途切れだった。</p>
<p>「通常戦力は全て無効」</p>
<p>「対象は海洋接座中」</p>
<p>「胸部影による通信遮断、継続」</p>
<p>「これで反応がなければ、人類側からの干渉は事実上終了する」</p>
<p>「承認を」</p>
<p>　返答まで、数秒の沈黙があった。</p>
<p>　それは戦術的な沈黙ではなかった。</p>
<p>　文明が、自分の最後の声を選ぶための沈黙だった。</p>
<p>「発射を承認する」</p>
<p>　ミサイルが上がった。</p>
<p>　複数の地下サイロから。<br>　移動式発射台から。<br>　まだ通信可能な潜水艦から。</p>
<p>　白い尾を引き、核弾頭は空へ向かった。</p>
<p>　十々瀬は、それに気づかなかった。</p>
<p>　彼女は海面に手を差し入れ、指の間から逃げる水を見ていた。</p>
<p>「きらきらしてる」</p>
<p>　海水に混じる瓦礫、燃料、砂、街の破片が、朝日を受けて光っていた。</p>
<p>　核ミサイル群は、彼女の肩、腕、頬、そして黒い衣装の胸元を覆う巨大な曲面へ向かう。</p>
<p>　弾頭が起爆した。</p>
<p>　太陽のような閃光が、雲の下でいくつも開いた。</p>
<p>　熱線が海面を焼き、爆風が地表に貼りついた薄い雲膜を吹き飛ばし、衝撃波が海洋接座によって荒れた水面をさらに叩いた。人類が作り出した最大級の火が、百川十々瀬へ向けて放たれた。</p>
<p>　十々瀬は、そこでようやく顔を上げた。</p>
<p>「ん？」</p>
<p>　頬に、少し熱があった。</p>
<p>　腕の表面に、小さな光の輪が広がって消えた。</p>
<p>　黒い胸元の上で、いくつかの閃光が白い斑点のように散った。</p>
<p>　海面の近くで、蒸気が小さく膨らんだ。</p>
<p>　それだけだった。</p>
<p>「今の、なに？」</p>
<p>　彼女は首を傾げた。</p>
<p>　核爆発の閃光は、彼女の瞳には遠くで弾ける小さな光に見えた。熱は、肌に触れた夏の日差しほどでもない。爆風は、海辺の風の変化と区別がつかなかった。</p>
<p>「花火……にしては、ちょっとあったかい？」</p>
<p>　十々瀬は指で爆心近くの海面をつついた。</p>
<p>　水が大きくへこみ、放射状の波が広がる。蒸気の柱は指先の風圧で散り、核攻撃によって生じた波は、彼女の一突きで上書きされた。</p>
<p>　地下指揮所では、観測員が最後の数値を読み上げていた。</p>
<p>「全弾、起爆確認」</p>
<p>「熱反応、対象表面に一時発生」</p>
<p>「損傷、確認できず」</p>
<p>「行動変化……なし」</p>
<p>　誰も次の命令を出さなかった。</p>
<p>　命令が残っていなかった。</p>
<p>　通常戦力も、最後の核攻撃も、百川十々瀬を止められなかった。</p>
<p>　それどころか、彼女の興味を長く引くことすらできなかった。</p>
<p>　十々瀬はもう、核の光を見ていなかった。</p>
<p>　彼女は、海の向こうへ視線を向けていた。</p>
<p>　水平線。</p>
<p>　その先に、まだ触っていない海がある。</p>
<p>　さらにその向こうには、大陸がある。</p>
<p>　そして空の上には、夜になると星が出る。</p>
<p>「もっと広いところ、あるかな」</p>
<p>　彼女はぽつりと言った。</p>
<p>　一千キロメートルの身体が、海からゆっくり立ち上がる。</p>
<p>　海水が滝のように落ちた。</p>
<p>　水滴の一つ一つが湖ほどの大きさで、沿岸と島へ降り注ぐ。胸元からも大きな雫が連なって落ち、海面へ叩きつけられるたび、局地的な津波が新しく生まれた。彼女が腰を上げた跡には、海底の巨大な窪地が残り、押し戻された海水がその周囲で渦を巻いた。</p>
<p>　足を踏み出すと、海峡がまた形を変えた。</p>
<p>　島はずれ、海底は削れ、沿岸線は昨日とは違うものになった。</p>
<p>　人類の文明は、まだどこかで息をしている。</p>
<p>　だが十々瀬にとって、それはもう地面の模様ですらなかった。</p>
<p>　彼女が次に気にし始めたのは、雲の上ではなかった。</p>
<p>　雲なら、もう足元の地表に貼りついた薄い白い層でしかない。</p>
<p>　彼女が見上げたのは、そのさらに外側だった。</p>
<p>「空の上って、どんな感じなんだろ」</p>
<p>　十々瀬は笑った。</p>
<p>　その笑いで、海面が震えた。</p>
<p>　百川十々瀬巨大化記録。</p>
<p>　第四話。</p>
<p>　海は小さな水たまり。<br></p></div><div class="chapter-nav"><a href="０３.html">← ０３</a><a href="０５.html">０５ →</a></div></section><section class="chapter" id="ch-０５"><header><h2>０５　雲より上にいる</h2><div class="meta">改稿版 / ０５_雲より上にいる_改稿版.txt</div></header><div class="prose"><p>　海座圧によって沿岸線が描き換えられたあと、百川十々瀬はしばらく空を見ていた。</p>
<p>　身長、約三千キロメートル。<br>　推定三サイズ、B約五千四百キロメートル、W約千二百六十キロメートル、H約二千百六十キロメートル。</p>
<p>　その高さでは、雲はもう彼女の身体を飾るものではなかった。</p>
<p>　高い雲でも雲頂は十数キロメートル程度にすぎない。三千キロメートル級の十々瀬から見れば、それは空に浮かぶ塊ではなく、地表へ貼りついた白い薄膜、あるいは海と大陸の輪郭を曖昧にする擦れた塗料に近かった。膝も腰も胸元も、そんな薄い気象の膜をはるか下へ置き去りにしている。</p>
<p>　彼女の足元では、大陸沿岸に張りついていた雲の筋が、白い傷のように伸びていた。<br>　そこへ、黒い衣装に包まれた胸元の巨大な張り出しが、身体の前にもう一つの地形のような丸みをつくっている。少し身を乗り出すだけで、その曲面は雲をかき分けるのではなく、雲ごと地表一帯を影の下へ沈めた。</p>
<p>　白銀、薄紫、水色、淡い桃色を帯びた長い髪房が風に流れる。<br>　その先端だけがはるか下の地表へ届き、森林帯と山腹に貼りつく薄雲とをまとめて撫で払っていった。衛星画像には、気圧配置の乱れより先に、髪が通過した帯状の晴天域が記録される。</p>
<p>「やっぱり、また大きくなってる」</p>
<p>　十々瀬は嬉しそうに言った。</p>
<p>　その声は地表へ言葉として届かなかった。<br>　届いたのは、空気柱そのものを揺らす圧力の脈動だった。山岳観測所の気圧計は針を振り切り、沿岸の残存レーダーは空を見失い、雪を残していた高地では雪崩と落石が同時に走った。地上の人々が見たのは、空が鳴った、という現象だけである。</p>
<p>　人類は、百川十々瀬を直接見ることをほとんど諦めていた。</p>
<p>　地上から見上げても、そこにあるのは全身像ではない。<br>　水平線を塞ぐ脚の壁。<br>　昼を夜に変える影。<br>　地震と同じ時刻に移動する気圧差。<br>　海面高度計から逆算される足裏の位置。<br>　雲頂等値線の欠損域。</p>
<p>　観測者たちは彼女を見ているのではなく、彼女によって書き換えられた世界を読んでいた。</p>
<p>　どの海域の海面が下がったか。<br>　どの沿岸で風向が反転したか。<br>　どの大陸縁に白い雲膜の裂け目が生じたか。<br>　どの地域で太陽光発電の出力が、同時に失われたか。</p>
<p>　その欠落をつなぎ合わせて、そこに百川十々瀬がいる、と推定していた。</p>
<p>「んー……」</p>
<p>　十々瀬は海から立ち上がり、大きく伸びをした。</p>
<p>　その瞬間、地表を覆っていた雲の薄膜が、広い帯状に裂けた。<br>　彼女の肩に雲が絡んだわけではない。ただ、腕の移動が大気全体へ長大な圧力差を走らせ、下層から上層まで積み重なっていた雲の分布を東西へ引き伸ばしたのだ。数時間後には、大陸規模の天気図そのものが別物になっていた。</p>
<p>「空の上、思ったより近いかも」</p>
<p>　彼女は笑った。</p>
<p>　その笑いだけで、雲頂高度の分布が円形に歪んだ。<br>　海面には細かな波紋が広がり、山岳地帯では観測史上にない周期の気圧振動が記録される。音として再生できた記録はほとんど残っていない。機材の多くは、音になる前に飽和していた。</p>
<p>　十々瀬は自分の胸元を見下ろした。</p>
<p>　身体が大きくなればなるほど、自分の一部がどこまで世界を覆っているのか、感覚だけではわかりにくくなる。<br>　彼女は少し前かがみになった。</p>
<p>　ただ、足元の白い模様の向こうを見ようとしただけだった。</p>
<p>　その姿勢では、指先より先に胸元が降りる。</p>
<p>　黒い衣装に包まれた巨大な胸元が、太陽と地表のあいだへゆっくり差し込み、そのまま大陸規模の範囲へ触れた。都市も平野も山脈も海岸線も、柔らかな巨大質量の影の中へ沈み、接地した帯では地表そのものが押し広げられた。昼のはずの地域で気温が急落し、送電網の出力が落ち、渡り鳥の群れが夕方と誤認して進路を変えた。</p>
<p>　胸部の下面が触れた一帯では、薄い雲膜が外周へ押し出され、海岸平野と内陸低地がなだらかな圧痕へ変わっていく。踏み潰したのではない。巨大な丸みへ静かに押し伏せられ、広域の盆地として地形そのものが書き換えられたのだった。</p>
<p>　地上の人々には、日食と地盤沈下が同時に起きたように見えた。<br>　だがそれは月でも断層でもない。<br>　百川十々瀬が、少し身を乗り出しただけだった。</p>
<p>「暗くなった？」</p>
<p>　彼女は首を傾げた。</p>
<p>　その動きで影がずれた。<br>　さっきまで夜だった平野に光が戻り、代わりに別の海岸線が暗くなる。影の縁では急激な温度差が風の壁を生み、地表の白い雲膜が巻き上がって渦をつくった。後に気象記録では、この現象を「第五胸影日照欠落」と呼ぶことになる。</p>
<p>「わ、影も大きい」</p>
<p>　十々瀬は嬉しそうに言った。</p>
<p>　彼女は試すように身体を左右へ揺らした。<br>　巨大な影が、大陸を一つずつ撫でていく。<br>　都市圏が暗くなる。<br>　山脈が沈む。<br>　湖面から反射光が消える。<br>　海岸線が夜の中へ引き込まれる。</p>
<p>　影の移動に合わせて、地上の気温が乱れ、風向が変わり、下層の雲が生まれては潰れた。人類側は、雲を見て天候を予測する段階を過ぎ、影を見て十々瀬の姿勢を逆算する段階へ入っていた。</p>
<p>「こうすると、もっと見えるかな」</p>
<p>　十々瀬はさらに身をかがめた。</p>
<p>　今度は胸元の巨大な丸みが、より深く広く地表へ沈んだ。<br>　接地帯の外周から白い雲膜が噴き出すように押しのけられ、高地の上にあった雲群は平野側へ流される。胸元の曲面が密着した中心部では、地面はゆっくり潰れるのではなく、重い柔らかさに押し広げられて沈降した。まだ生きていた航空管制網は一斉に全飛行の放棄を宣言し、影の中心部では、昼なのに星が見えたという証言が複数残っている。</p>
<p>　十々瀬は地表を覗き込もうとしていた。<br>　だが三千キロメートルの彼女にとって、地表は近すぎて遠い。</p>
<p>　自分の影。<br>　自分の呼吸で動く空気。<br>　自分の髪が作る風。<br>　自分の胸元が生む遮蔽。</p>
<p>　それらが大きすぎて、細かなものはもうほとんど見えない。</p>
<p>「見えないなあ」</p>
<p>　彼女は頬を膨らませ、軽く息を吹いた。</p>
<p>　その吐息が、海の上で超大型の渦を育てた。</p>
<p>　最初に、地表へ貼りついていた雲膜が押し流された。<br>　次に、海上の湿った空気が一方向へ引きずられ、既存の低気圧と結びつく。衛星画像では、彼女の口元から海へ落ちる白い流れが、数時間のうちに巨大な螺旋へ成長していく様子が確認された。</p>
<p>　十々瀬はそれを見下ろした。</p>
<p>「雲、丸くなった」</p>
<p>　彼女は指を伸ばした。<br>　海上で育ちつつあったその白い渦の縁へ、爪先を近づける。</p>
<p>　人間にとっては台風だった。<br>　彼女にとっては、地表に描かれた白い綿の輪のようなものだった。</p>
<p>　指先が近づいただけで、渦の進路が曲がった。<br>　北へ抜けるはずだった巨大低気圧は、大陸側へ押し戻され、まだ復旧していない沿岸へ雨を運び直す。津波で壊れた港、海座圧で沈んだ湾岸都市、十々瀬線と掌圧痕で水を集めていた低地は、今度は空から注がれる豪雨で再び輪郭を失った。</p>
<p>「雨、降ってる」</p>
<p>　十々瀬は楽しそうに言った。</p>
<p>　彼女はさらに両手を広げた。<br>　空をすくうように、地表近くの白い雲膜を広い範囲から寄せ集める。</p>
<p>　左右の掌が大気を挟むと、雲は塊というより、下層の湿った空気ごと持ち上げられた。掌のあいだで凝縮が進み、雷がちらつき、山脈ほどの広がりを持つ白い塊が形成されていく。</p>
<p>「わ、ふわふわ」</p>
<p>　十々瀬はそれを丸めた。</p>
<p>　地上の気象は、彼女の遊びに合わせて崩れた。<br>　降るはずの雨を失った地域。<br>　晴れるはずの平野に落雷を受けた地域。<br>　乾いた内陸へ海の湿り気が押し込まれ、見たことのない雲帯が生まれた地域。</p>
<p>　十々瀬は、丸めた白い塊を大陸の内側へ落とした。</p>
<p>　山岳地帯へぶつかった雲塊は、広域豪雨となって崩れた。<br>　斜面が滑る。<br>　谷が埋まる。<br>　湖が溢れる。<br>　寝返り湖群から伸びた新しい川が、さらに別の盆地へ流れ込む。</p>
<p>「落ちた」</p>
<p>　彼女は笑った。<br>　その笑いで、集め残された雲の膜がまた別方向へ散った。</p>
<p>　人類側の記録は、もはや断片的だった。</p>
<p>　第四話の核攻撃以降、地球上の文明は百川十々瀬に対する能動的干渉をほぼ失っていた。ミサイルも航空機も艦隊も、彼女には届かない。届いたとしても、それは光や熱の小さな粒にすぎない。</p>
<p>　残された行為は、記録だけだった。</p>
<p>　しかし、記録もまた壊れ続けていた。<br>　衛星の視野は、彼女の影と体表反射と帯電粒子で欠ける。<br>　地上レーダーは、雲と海塩と粉塵で読めなくなる。<br>　通信網は、胸元の影による発電低下と、気圧変動に伴う設備破壊で順次沈黙する。</p>
<p>　最も信頼できたのは、皮肉にも、失われた日照量だった。</p>
<p>　どの地域が何分暗くなったか。<br>　どの海域で風が反転したか。<br>　どの大陸縁で雲膜が剥がれたか。<br>　どの山脈が、髪房の通過直後に裸地へ変わったか。</p>
<p>　それをつなぎ合わせることでしか、百川十々瀬の姿勢は推定できない。</p>
<p>　彼女が身を乗り出す。<br>　大陸が陰に入る。</p>
<p>　彼女が笑う。<br>　気圧が変わる。</p>
<p>　彼女が息を吹く。<br>　台風が生まれる。</p>
<p>　彼女が髪を払う。<br>　森林帯と観測拠点が同じ帯の中で消える。</p>
<p>　百川十々瀬は、もう出来事ではなかった。<br>　環境だった。</p>
<p>「もっと上、見たいな」</p>
<p>　十々瀬は空を見上げた。</p>
<p>　青は、まだ空の色をしている。<br>　けれど彼女の目の高さでは、その青は薄く、上の方は暗い。地表へ貼りつく雲膜は足元の白い模様にすぎず、雷は膝よりはるか下で瞬き、山脈は皮膚へ触れるざらつきに近づいていた。</p>
<p>　彼女は片足を引いた。<br>　その足が海へ沈み、海面が外へ押し出される。足裏の周囲で巨大な渦が生まれ、遅れて沿岸へ波が届いた。</p>
<p>「ジャンプしたら、届くかな」</p>
<p>　地上の観測員たちは、その言葉を正確には聞き取れなかった。<br>　聞き取れたのは、気圧の急変と、広域地震の前兆だけだった。</p>
<p>　十々瀬は膝を曲げた。<br>　片膝が山脈を押し、片足が海底へ沈む。大陸縁がわずかに沈下し、海水が逆流し、地表の白い雲膜は円形に吹き払われた。胸元の黒い曲面も前へ揺れ、その影が複数の沿岸域を同時に覆う。</p>
<p>　彼女は跳ぶかわりに、まず踵を浮かせてみた。<br>　ほんの少しだけ。<br>　自分では、軽く弾んでみる前の試し動作のつもりだった。</p>
<p>「よっ」</p>
<p>　その瞬間、足裏の荷重が一斉にずれた。</p>
<p>　地球が震えた。</p>
<p>　足元の海底がさらに沈み、沿岸地盤が波打ち、既存の足跡湖群は縁を崩した。空気は一気に押し下げられ、衝撃波が大陸の上を走り、地表の白い雲膜は同心円状に吹き飛ぶ。空を塞いでいた身体は持ち上がるより先に荷重の逃げ場を変え、広い範囲で影の輪郭だけが揺れた。</p>
<p>　ほんの少し。<br>　十々瀬にとっては、踵を浮かせただけ。</p>
<p>　だが次の瞬間、戻った体重が海と大陸を同時に叩いた。</p>
<p>　海面は跳ね、山脈は崩れ、内陸の湖群は新しい川を生み、まだ形を保っていた都市の残骸は土煙の下へ沈んだ。地震計はもはや数値を示さない。すべての観測上限を超えていた。</p>
<p>「あはは、ちょっと浮いた！」</p>
<p>　十々瀬は嬉しそうに笑った。</p>
<p>　その笑いは、雲より上で広がった。</p>
<p>　彼女はもう一度、空を見上げる。<br>　そこには、青の向こうの暗さがあった。<br>　夜にならなくても、星が少し見えた。</p>
<p>　十々瀬は目を輝かせた。</p>
<p>「星、見える」</p>
<p>　その瞬間、彼女の興味は地上から少し離れた。<br>　海も、大陸も、雲の白い模様も、まだ面白い。<br>　けれど空の上には、もっと広い場所がある。<br>　彼女はそれを知ってしまった。</p>
<p>　百川十々瀬は三千キロメートル。<br>　胸元の影は大陸の日照を奪い、吐息は台風を育て、掌は雲膜を寄せ集め、髪は森林と観測網を撫で払い、軽い跳躍は地球を震わせた。</p>
<p>　人類の世界は、もう彼女の足元にあるだけではない。<br>　彼女の影の中にあり、呼吸の中にあり、遊びの余波の中にあった。</p>
<p>「もっと上、行けるかな」</p>
<p>　十々瀬は空へ手を伸ばした。<br>　その指先が、地表の雲膜よりも、青よりも、さらに高い暗がりへ向かう。</p>
<p>　百川十々瀬巨大化記録。</p>
<p>　第五話。</p>
<p>　雲より上にいる。<br></p></div><div class="chapter-nav"><a href="０４.html">← ０４</a><a href="０６.html">０６ →</a></div></section><section class="chapter" id="ch-０６"><header><h2>０６　地球儀の上で</h2><div class="meta">草稿 / ０６_地球儀の上で_草稿.txt</div></header><div class="prose"><p>　第五胸影日照欠落の記録が途切れ始めたころ、百川十々瀬は空の上を見ていた。</p>
<p>　身長、約一万キロメートル級。<br>　推定三サイズ、B約一万八千キロメートル、W約四千二百キロメートル、H約七千二百キロメートル。</p>
<p>　ただし、その数字は途中経過にすぎない。</p>
<p>　この日、人類側の最後の観測群は、十々瀬の巨大化そのものを記録した。</p>
<p>　それは、成長と呼ぶには速すぎた。</p>
<p>　膨張と呼ぶには、あまりにも生き物めいていた。</p>
<p>　十々瀬は雲より上へ手を伸ばしていた。青の向こうの暗さ、昼でも見える星、その先にある広い空間へ興味を向けていた。足元では海が震え、大陸が影に沈み、彼女の呼吸に合わせて大気の流れが変わっている。</p>
<p>「もうちょっと、届きそう」</p>
<p>　彼女は背伸びをした。</p>
<p>　その瞬間、観測値が跳ねた。</p>
<p>　身長三千キロメートル級。三サイズはB約五千四百キロメートル、W約千二百六十キロメートル、H約二千百六十キロメートル。<br>　四千キロメートル級。<br>　五千キロメートル級。</p>
<p>　数値は、追いつかなかった。</p>
<p>　彼女の脚が伸びる。</p>
<p>　足裏が海底をさらに深く押し込み、ふくらはぎが雲を裂き、膝が大気の上層を越えていく。腰の位置が上がり、周囲の雲帯は身体にまとわりつくものではなく、足元を流れる白い模様になった。</p>
<p>　十々瀬は自分の手を見た。</p>
<p>　指が、また大きくなっている。</p>
<p>　掌紋の隙間に、雲の渦が入り込んでいた。爪の先に、薄い大気の光がかかっている。腕を少し動かすだけで、地球の表面を覆っていた雲海が大きくずれた。</p>
<p>「わ……伸びてる」</p>
<p>　嬉しそうな声だった。</p>
<p>　その声は、もはや地上には届かなかった。</p>
<p>　届いたのは音ではなく、空気の圧力差だった。大気全体が震え、地表の残存観測装置は一斉に飽和し、山脈の雪と土砂が同時に崩れた。</p>
<p>　身長、約七千キロメートル。三サイズはB約一万二千六百キロメートル、W約二千九百四十キロメートル、H約五千四十キロメートル。</p>
<p>　彼女の身体は、地球の半径に近づいていた。</p>
<p>　十々瀬が見下ろすと、地表はもう平面ではなかった。</p>
<p>　丸い。</p>
<p>　海も大陸も雲も、ひとつの球の表面に貼りついている。これまで足元に広がっていた世界が、実はゆるやかに曲がっていたことを、彼女は初めてはっきり意識した。</p>
<p>「地球って、ほんとに丸いんだ」</p>
<p>　彼女は感心したように言った。</p>
<p>　その言葉を記録できた設備は、ほとんど残っていない。</p>
<p>　だが後世の断片記録には、巨大化第六段階において、百川十々瀬が地球の球面を玩具として認識し始めた、と記されている。</p>
<p>　身長、約一万キロメートル。三サイズはB約一万八千キロメートル、W約四千二百キロメートル、H約七千二百キロメートル。</p>
<p>　十々瀬は片足を引いた。</p>
<p>　その動作で、地球の表面に巨大な影が滑った。影は大陸を越え、海洋を越え、半球の一部を夜のように覆った。太陽はまだ昇っていたが、地上では十々瀬の身体がそれを遮っていた。</p>
<p>　彼女は慎重に、足先を地球へ添えた。</p>
<p>「そっと、そっと」</p>
<p>　本人は気をつけているつもりだった。</p>
<p>　もう地球は、立つための地面ではない。<br>　一万キロメートル級の彼女にとっては、丸い玩具へ重さの一部を預けるような感覚だった。</p>
<p>　足先が触れる。</p>
<p>　大陸の一部が沈んだ。</p>
<p>　山脈が横へ滑り、地殻が波のように歪み、海岸線は数百キロ単位で形を変えた。海は外へ押され、反対側の海域で盛り上がり、巨大な水の移動が惑星規模で始まった。</p>
<p>　足先を離すと、そこには足跡ではなく、地殻のひしゃげた広域盆地が残っていた。</p>
<p>「……やわらかい」</p>
<p>　十々瀬は少し驚いた。</p>
<p>　これまで都市も山も海も壊してきた。</p>
<p>　だが、地球そのものがこんなに柔らかく感じるとは思っていなかった。</p>
<p>　彼女はしゃがみ込むのではなく、地球を胸元へ引き寄せるように身を寄せた。</p>
<p>　膝を曲げ、片腕を回し、もう片方の手を海へ添える。</p>
<p>　その動きでは、胸元の巨大な張り出しが先行して球面へ迫り、膝と手はあとから支えとして位置を変える。</p>
<p>　それだけで、地球の表面に複数の接触点が生まれた。</p>
<p>　片膝が大陸縁を押し潰し、片手が海洋へ沈み、胸元の黒い曲面が別の半球を広く影に入れたうえで、柔らかな重みとして海洋と大陸縁の一帯へ触れ始める。もう片方の手が別の大陸の上空を覆い、彼女の身体の影は半球を横切り、昼夜の境界線は本来の自転とは関係なく乱された。</p>
<p>　海に入れた掌が、地球の海をかき混ぜた。</p>
<p>　指の間を流れる水は、彼女には冷たい膜のようだった。</p>
<p>　だが地球にとっては、海洋の再配置だった。</p>
<p>　海盆がこすられ、海溝が崩れ、海山が削られ、島弧がまとめて水の中でずれた。海水は巨大な渦となって大陸へ押し寄せ、すでに変形していた沿岸線をさらに消した。</p>
<p>「水、少ないかも」</p>
<p>　十々瀬は指をすくい上げた。</p>
<p>　その指先から、海水が宇宙空間へ向かって飛び散った。</p>
<p>　水滴は地球の重力を離れきれず、いくつかは細かな氷の粒となって軌道上へ散り、いくつかはまた地表へ戻って巨大な雨となった。</p>
<p>　彼女はその光景を見て笑った。</p>
<p>「きらきらしてる」</p>
<p>　地球の周囲に、小さな氷の輪が生まれ始めていた。</p>
<p>　人類の最後の衛星群は、その輪の中で信号を失っていく。軌道上の機械は、彼女の髪の乱流と飛び散った水粒、舞い上がった塵と岩片に包まれて、ひとつずつ沈黙した。</p>
<p>　それでも、十々瀬はまだ遊んでいた。</p>
<p>　地球を壊そうとしているわけではない。</p>
<p>　ただ、丸いものを触っている。</p>
<p>　ただ、柔らかいところを押している。</p>
<p>　ただ、水がどのように動くかを見ている。</p>
<p>　十々瀬は両手で地球を挟むようにした。</p>
<p>　完全に掴むには、まだ少し大きすぎる。</p>
<p>　それでも彼女の左右の掌は、地球の広い範囲を影に入れた。片方の掌が海洋を覆い、もう片方の掌が大陸側を覆う。指の影が、極域から赤道近くまで長く伸びる。</p>
<p>「地球儀みたい」</p>
<p>　彼女は昔、教室で見た地球儀を思い出した。</p>
<p>　青くて、丸くて、くるくる回るもの。</p>
<p>　指で回すと、知らない国の名前が流れていく。海が広くて、陸が小さくて、でもその中に街や人や道路があると教えられた。</p>
<p>　今、目の前にあるそれは、地球儀そのものだった。</p>
<p>　ただし本物で、柔らかく、少し壊れやすい。</p>
<p>「回るかな」</p>
<p>　十々瀬は指先で地球の表面を押した。</p>
<p>　彼女にとっては、地球儀を軽く回すつもりだった。</p>
<p>　だが、現実の地球は台座に載った模型ではない。</p>
<p>　指が大陸をなぞる。</p>
<p>　地殻が裂けた。</p>
<p>　海底がずれた。</p>
<p>　自転に乱れが生じ、海水が遅れて流れ、地表のあちこちで巨大な断層が開いた。大陸の内部に長い亀裂が走り、そこから赤い光が漏れた。</p>
<p>「あれ」</p>
<p>　十々瀬は手を止めた。</p>
<p>　地球の表面が、割れていた。</p>
<p>　細い線ではない。</p>
<p>　彼女の指跡に沿って、大陸規模の裂け目が開いている。海水がそこへ落ち込み、蒸気が上がり、赤く光る内部が見え隠れした。</p>
<p>「ちょっと強かった？」</p>
<p>　彼女は困ったように笑った。</p>
<p>　そして、割れ目を直そうとした。</p>
<p>　指で、裂けた地殻の両側を寄せる。</p>
<p>　それが悪かった。</p>
<p>　地殻は押し戻されるのではなく、別の方向へ割れた。圧力が逃げ場を求め、海底の亀裂が極域へ伸び、大陸の端が持ち上がり、惑星全体がきしむ。</p>
<p>　地球の形がわずかに歪んだ。</p>
<p>　十々瀬の目にも、それはわかった。</p>
<p>「え、曲がった」</p>
<p>　彼女は慌てて手を離した。</p>
<p>　だが、すでに遅かった。</p>
<p>　巨大化した彼女の接触、海洋の移動、地殻の裂け目、押し戻そうとした力。それらが重なり、地球は内部から持ちこたえられなくなっていた。</p>
<p>　最初に、長い割れ目から光が噴いた。</p>
<p>　次に、大陸の一部が持ち上がった。</p>
<p>　海がそこへなだれ込み、瞬時に蒸発し、白い雲が惑星規模で広がる。</p>
<p>　十々瀬は目を丸くした。</p>
<p>「わ、わ、待って」</p>
<p>　彼女は両手を伸ばした。</p>
<p>　受け止めようとした。</p>
<p>　けれど、彼女の掌は大きすぎた。</p>
<p>　地球の表面に触れた瞬間、まだつながっていた地殻がさらに割れた。押さえた部分は沈み、押さえきれなかった部分は反対側へ膨らむ。ひとつの球だった世界は、いくつもの裂け目を持った脆い殻になった。</p>
<p>　そして、地球は爆ぜた。</p>
<p>　爆発というより、内側から砕けて広がる崩壊だった。</p>
<p>　大陸だったものが岩塊になり、海底だったものが巨大な板となって外へめくれ、赤く光る内部の物質が細かな粒となって飛び散った。海水は蒸気と氷と水滴に分かれ、雲は一瞬で形を失い、地球の周囲に破片の輪が広がっていく。</p>
<p>　完全に粉々になったわけではない。</p>
<p>　中心には、まだ重い岩の塊が残っていた。</p>
<p>　その周囲に、いくつもの巨大な岩塊が浮かんでいる。大陸の断片、海底の板、山脈の折れた端、赤く冷え始める内部の塊。それらがゆっくり離れ、ぶつかり、砕け、また重力で引かれ合っていた。</p>
<p>　人類の文明は、その時点で記録としてはほぼ途絶えた。</p>
<p>　最後に残った観測ログは、数行だけだった。</p>
<p>　地殻連続性、喪失。<br>　海洋保持、不能。<br>　惑星形状、崩壊。<br>　対象、百川十々瀬、行動継続。</p>
<p>　それ以降の記録は、地球上からではない。</p>
<p>　破片に残った自律観測機か、軌道上を漂う衛星の断片か、あるいは後に別の誰かが拾った信号か。</p>
<p>　確かなことは、百川十々瀬がその瞬間、少し困った顔をしていたということだけだった。</p>
<p>「……壊れちゃった」</p>
<p>　彼女は、地球だったものを見下ろした。</p>
<p>　さっきまで丸かった玩具は、もう丸くなかった。</p>
<p>　青い海も、白い雲も、緑と茶色の大陸も、彼女の手の中で混ざり、割れ、いくつもの岩塊になって浮かんでいた。</p>
<p>　十々瀬は指先で、近くの岩塊をつついた。</p>
<p>　大陸の一部だったそれは、ゆっくり回転しながら別の破片へぶつかり、さらに小さな欠片を散らした。</p>
<p>「これ、もう戻らないかな」</p>
<p>　しばらく考えた。</p>
<p>　だが、十々瀬は深く落ち込まなかった。</p>
<p>　罪悪感ではなく、遊んでいた玩具を壊してしまったときの、少し残念そうな表情だった。</p>
<p>「まあ……仕方ないか」</p>
<p>　彼女は周囲を見回した。</p>
<p>　地球の破片の向こうに、月があった。</p>
<p>　白くて、丸くて、地球よりずっと小さい。</p>
<p>　さらに遠くには、星があった。</p>
<p>　点のような光。</p>
<p>　無数の光。</p>
<p>　十々瀬は目を輝かせた。</p>
<p>「他にも、丸いのある」</p>
<p>　彼女は地球の破片から手を離した。</p>
<p>　破片はゆっくり漂い、互いにぶつかり、砕けた惑星の名残として暗い空間に広がっていく。彼女が身じろぎすると、その周囲の岩塊が押され、さらに外へ散った。</p>
<p>　十々瀬は一歩を踏み出そうとして、足元がないことに気づいた。</p>
<p>「あ、そっか。ここ、地面ないんだ」</p>
<p>　彼女は少し笑った。</p>
<p>　身体は、まだ大きくなっている。</p>
<p>　一万キロメートル級。<br>　一万二千キロメートル級。<br>　一万五千キロメートル級。</p>
<p>　地球の破片は、彼女の周囲でどんどん小さく見え始めた。さっきまで手に余る地球儀だったものが、今では壊れた砂利のように見える。</p>
<p>　月が近くにあった。</p>
<p>　十々瀬は手を伸ばす。</p>
<p>　月は、彼女の掌に収まりそうだった。</p>
<p>「次は、あれで遊ぼうかな」</p>
<p>　彼女はそう言って、砕けた地球を背にした。</p>
<p>　百川十々瀬巨大化記録。</p>
<p>　第六話。</p>
<p>　地球儀の上で。<br></p></div><div class="chapter-nav"><a href="０５.html">← ０５</a><a href="０７.html">０７ →</a></div></section><section class="chapter" id="ch-０７"><header><h2>０７　月は白い小石</h2><div class="meta">草稿 / ０７_月は白い小石_草稿.txt</div></header><div class="prose"><p>　地球だったものは、もう青い球ではなかった。</p>
<p>　暗い空間に、岩塊が漂っていた。</p>
<p>　大陸の断片。<br>　海底の板。<br>　赤く冷え始める内部の塊。<br>　氷になった海水の粒。<br>　雲だった白い霧。</p>
<p>　それらがゆっくりと離れ、ぶつかり、砕け、また重力に引かれて集まろうとしている。</p>
<p>　百川十々瀬は、その中心に浮かぶように立っていた。</p>
<p>　身長、約二万キロメートル級。<br>　推定三サイズ、B約三万六千キロメートル、W約八千四百キロメートル、H約一万四千四百キロメートル。</p>
<p>　もはや地表という言葉は、彼女の足元には存在しない。踏む場所はなく、歩く道もない。けれど十々瀬は不思議と落ちていかなかった。巨大化した身体は、砕けた地球の重力よりも、もっと大きな何かに支えられているように、暗い空間の中にいた。</p>
<p>「地面、なくなっちゃった」</p>
<p>　十々瀬は少しだけ困ったように笑った。</p>
<p>　足元に、地球の破片がいくつか漂っている。</p>
<p>　彼女がつま先を動かすと、そのうちの一つが軽く押され、別の岩塊にぶつかった。衝突で細かな欠片が散り、暗い空間に小さな光のように広がる。</p>
<p>「あ、また割れた」</p>
<p>　十々瀬は肩をすくめた。</p>
<p>　仕方ない。</p>
<p>　もうこの玩具は、元の形には戻らない。</p>
<p>　彼女は視線を上げた。</p>
<p>　そこに、月があった。</p>
<p>　白く、丸く、地球よりずっと小さい。</p>
<p>　かつて地上から見上げていたころ、月は遠い夜空の丸い光だった。だが今の十々瀬には、掌の上に転がせそうな白い小石に見えた。</p>
<p>「月って、こんなに近かったんだ」</p>
<p>　そう見えただけで、まだ指先で届く距離ではなかった。</p>
<p>　十々瀬はしばらく宇宙を漂う。<br>　壊れた地球の破片帯を抜け、月の軌道が崩れて寄ってくる方向へ、自分でも無意識のうちに体を進めた。近づくあいだにも、彼女の身体は少しずつ大きくなっていく。</p>
<p>　それから、彼女は手を伸ばした。</p>
<p>　月の周囲には、まだ地球の破片が漂っていた。砕けた惑星の残骸に引かれ、月の軌道はすでに乱れている。だが十々瀬には、その細かな力の均衡などわからない。</p>
<p>　彼女は、ただ白い丸に触れてみたかった。</p>
<p>　指先が月面に近づく。</p>
<p>　月には大気がない。</p>
<p>　だから、風は吹かなかった。</p>
<p>　音もなかった。</p>
<p>　ただ、指の影が月面を覆い、クレーターの列が暗くなり、古い山脈と平原が百川十々瀬の爪の下に沈んだ。</p>
<p>「ざらざらしてそう」</p>
<p>　指先が触れた。</p>
<p>　月面が沈んだ。</p>
<p>　クレーターが潰れ、古い衝突盆地が形を失い、白い砂と岩が輪状に押し出される。彼女にとっては指で粉を触った程度だった。月にとっては、数十億年残っていた地形の消失だった。</p>
<p>「ほんとに粉っぽい」</p>
<p>　十々瀬は人差し指で月面をなぞった。</p>
<p>　一本の溝ができた。</p>
<p>　月の表側を横切る、巨大な指跡。</p>
<p>　その溝はクレーター群をつなぎ、山地を削り、月面の明るい高地と暗い海を同じ白い粉に変えていった。</p>
<p>「地球より固いけど、ちっちゃいね」</p>
<p>　彼女は月を両手で挟んだ。</p>
<p>　完全に握るほどではない。</p>
<p>　けれど、月はもう逃げられる大きさではなかった。彼女の掌と指に挟まれ、白い球は軌道からゆっくり外れていく。</p>
<p>　月の重力に縛られていた塵が舞い上がり、砕けた地球の残骸と混ざった。</p>
<p>　十々瀬は月を掌の上で転がしてみた。</p>
<p>　白い小石が、指の付け根から掌の中央へころりと移動する。</p>
<p>　その動きだけで、月面の山脈は崩れ、裏側の地殻に新しい亀裂が走った。</p>
<p>「転がる転がる」</p>
<p>　彼女は楽しそうに笑った。</p>
<p>　月は、掌紋の溝に引っかかった。</p>
<p>　月面の一部が削れ、白い粉が宇宙へ散る。粉は地球の破片の輪へ混ざり、砕けた青い惑星の残骸に白い帯を加えた。</p>
<p>　そのころ、地球の破片の一つに取り残されていた自律観測機が、最後の映像を送信していた。</p>
<p>　映っていたのは、地球の空ではない。</p>
<p>　砕けた惑星の破片越しに見える、巨大な少女の手だった。</p>
<p>　その掌の上で、月が転がっている。</p>
<p>　観測機は信号を繰り返した。</p>
<p>　対象、月を把持。<br>　月軌道、消失。<br>　月面形状、急速変化。<br>　対象、遊戯行動継続。</p>
<p>　そして映像は途切れた。</p>
<p>　十々瀬は月を顔の近くへ持ってきた。</p>
<p>「穴がいっぱい」</p>
<p>　彼女はクレーターを覗き込んだ。</p>
<p>　クレーターの一つに爪を当てる。</p>
<p>　くり、とえぐる。</p>
<p>　月面にあった円形の地形が、さらに深い穴になった。内側の岩盤が剥がれ、粉が外へ散る。</p>
<p>「これ、模様みたいでかわいい」</p>
<p>　彼女は別のクレーターもなぞった。</p>
<p>　月は少しずつ、白い球ではなくなっていった。</p>
<p>　爪跡。<br>　指跡。<br>　掌紋による擦過痕。<br>　押し潰された高地。<br>　割れた裏側。</p>
<p>　それでも、十々瀬にはまだ小石としての形が残っているように見えた。</p>
<p>「月、軽いなあ」</p>
<p>　彼女は何気なく、月を少し放り上げた。</p>
<p>　月は彼女の掌から離れ、ゆっくりと浮かんだ。</p>
<p>　その先に、地球の大きな岩塊が漂っていた。</p>
<p>「あ」</p>
<p>　月が岩塊にぶつかった。</p>
<p>　白い球と、かつて大陸だった岩の塊が衝突する。</p>
<p>　音はない。</p>
<p>　だが衝撃は目に見えた。</p>
<p>　月の一部が欠け、岩塊が割れ、白い粉と赤黒い破片が一緒に広がる。月は回転しながら弾かれ、さらに別の破片へかすった。</p>
<p>「ごめん、強かった」</p>
<p>　十々瀬は月を受け止めようと手を伸ばした。</p>
<p>　だが、その手がさらに破片を押した。</p>
<p>　地球の残骸の輪は乱れ、岩塊同士が連鎖的にぶつかり始めた。砕けた地球と欠けた月が、一つの大きな瓦礫の雲になっていく。</p>
<p>　十々瀬は少しの間、それを眺めていた。</p>
<p>　きらきらしている。</p>
<p>　白い粉。<br>　青かった氷。<br>　赤い岩。<br>　黒い影。</p>
<p>「これはこれで、きれいかも」</p>
<p>　彼女は月の欠片を一つ拾った。</p>
<p>　小さな白い岩片。</p>
<p>　かつての月の山脈の一部だったもの。</p>
<p>　十々瀬はそれを指先で転がし、すぐに飽きた。</p>
<p>　もっと遠くに、別の光があったからだ。</p>
<p>　赤い星。</p>
<p>　その向こうに、さらに大きな縞模様の星。</p>
<p>　そして、もっともっと遠くには、数えきれない光の粒。</p>
<p>「月より大きいの、いっぱいある」</p>
<p>　彼女の声が、砕けた地球と月の破片の間を通り過ぎた。</p>
<p>　誰も聞いていない。</p>
<p>　人類の記録は、もうほとんど途絶えている。</p>
<p>　それでも、百川十々瀬は続いていた。</p>
<p>　彼女は月の欠片をそっと手放した。</p>
<p>　欠片は地球の残骸へ混ざり、かつて青い惑星と白い衛星だったものは、一つの壊れた輪になって暗い空間に広がった。</p>
<p>「次、あっち」</p>
<p>　十々瀬は赤い星へ向かって手を伸ばした。</p>
<p>　身体は、まだ大きくなっている。</p>
<p>　二万キロメートル。<br>　三万キロメートル。<br>　四万キロメートル。</p>
<p>　砕けた地球と欠けた月は、彼女の背後で、どんどん小さな砂利のようになっていった。</p>
<p>　百川十々瀬巨大化記録。</p>
<p>　第七話。</p>
<p>　月は白い小石。<br></p></div><div class="chapter-nav"><a href="０６.html">← ０６</a><a href="０８.html">０８ →</a></div></section><section class="chapter" id="ch-０８"><header><h2>０８　星の軌道をほどく</h2><div class="meta">草稿 / ０８_星の軌道をほどく_草稿.txt</div></header><div class="prose"><p>　砕けた地球と欠けた月を背にして、百川十々瀬は赤い星へ向かった。</p>
<p>　身長、約十万キロメートル級。<br>　推定三サイズ、B約十八万キロメートル、W約四万二千キロメートル、H約七万二千キロメートル。</p>
<p>　もう、月は小石ですらなかった。</p>
<p>　地球の破片も、月の欠片も、彼女の背後で細かな砂の帯になって漂っている。振り返れば見える。だが、気にしなければ忘れてしまう程度の大きさだった。</p>
<p>　目の前には、赤い惑星があった。</p>
<p>　地球より小さく、月より大きい。</p>
<p>　かつて人類が火星と呼んだ星。</p>
<p>　赤茶色の大地と、薄い大気と、白い極冠を持つ丸い世界だった。</p>
<p>「赤い」</p>
<p>　十々瀬は目を輝かせた。</p>
<p>　彼女は赤い星へ顔を近づけた。</p>
<p>　火星の薄い大気が揺れる。</p>
<p>　彼女の呼吸だけで、火星の空はこれまで経験したことのない圧力の変化を受けた。砂嵐が生まれ、低地へ流れ、巨大な赤い雲となって惑星を包み始める。</p>
<p>「あ、砂っぽく見える」</p>
<p>　十々瀬は、粉を吸いこんだのではなく、赤い砂が舞う見た目につられてそう言った。くしゃみをしそうになって、少し鼻を押さえる。</p>
<p>　その仕草で、さらに大気が乱れた。</p>
<p>　火星の地表には、人類の古い探査機がまだいくつも残っていた。</p>
<p>　車輪の跡。<br>　着陸機の残骸。<br>　停止した観測基地。<br>　遠い昔に送られた、小さな機械の墓標。</p>
<p>　それらは、十々瀬の影が落ちた時点で、砂嵐の中に消えた。</p>
<p>　彼女は指を伸ばした。</p>
<p>　赤い惑星の表面に、そっと触れる。</p>
<p>　指先が火星の大峡谷を横切った。</p>
<p>　もともと惑星規模の裂け目だった谷は、十々瀬の指にとっては細い傷のようなものだった。彼女がなぞると、その縁は崩れ、谷底は赤い粉で埋まり、別の場所へ新しい裂け目が伸びた。</p>
<p>「ここ、ひび入ってる」</p>
<p>　彼女はその裂け目を広げてみた。</p>
<p>　爪先を差し込む。</p>
<p>　火星の地殻が割れた。</p>
<p>　大峡谷はさらに広がり、赤い大地が二つに引き裂かれていく。薄い大気が裂け目へ流れ込み、砂が滝のように落ちた。</p>
<p>　十々瀬は慌てた様子もなく、それを眺めた。</p>
<p>「地球より乾いてるね」</p>
<p>　彼女は火星の極冠に目を留めた。</p>
<p>　白い部分。</p>
<p>　氷だった。</p>
<p>　彼女は人差し指で、極冠を軽くこすった。</p>
<p>　白い氷が削れ、赤い砂と混ざり、淡い桃色の粉になって宇宙へ舞い上がる。</p>
<p>「かき氷みたい」</p>
<p>　十々瀬は笑った。</p>
<p>　そして、火星全体をつまんだ。</p>
<p>　親指と人差し指で、赤い球を挟む。</p>
<p>　このころの彼女にとって、火星はもう片手で持てる玩具だった。完全に握るには少し大きいが、動かすには十分小さい。</p>
<p>　火星の軌道が乱れた。</p>
<p>　赤い星は太陽の周りを回る軌道から外れ、十々瀬の指の間でゆっくり持ち上がった。</p>
<p>「あ、取れた」</p>
<p>　彼女は嬉しそうに言った。</p>
<p>　火星の表面では、地殻が悲鳴を上げていた。</p>
<p>　つままれた部分が沈み、反対側が盛り上がり、内部の応力が惑星全体へ走る。巨大な火山は斜面を崩し、古い盆地はひび割れ、薄い大気は火星の回転に遅れて揺れた。</p>
<p>　十々瀬は火星を少し回した。</p>
<p>　赤い球が指の間でくるりと動く。</p>
<p>　そのたびに、表面の砂嵐が帯になって流れ、裂け目が別の方向へ伸びる。</p>
<p>「地球儀より軽い」</p>
<p>　彼女は火星を掌に乗せた。</p>
<p>　掌紋の谷に、赤い砂がこぼれた。</p>
<p>　火星の一部が削れて、彼女の掌の線に沿って粉の筋を作る。かつて山だった部分が崩れ、盆地だった場所がひしゃげ、赤い惑星は少しずつ丸さを失っていった。</p>
<p>　彼女はそれを、月の欠片の方へ転がそうとした。</p>
<p>「赤いのと白いの、並べたらかわいいかも」</p>
<p>　しかし、地球と月の残骸はすでに遠く、小さく、散らばっていた。</p>
<p>　火星をそこへ向けて軽く押すと、赤い惑星は想定より速く流れた。</p>
<p>「あ、行きすぎ」</p>
<p>　火星は途中で、小惑星帯の一部に突っ込んだ。</p>
<p>　無数の小天体が散る。</p>
<p>　十々瀬には、砂粒が跳ねたように見えた。</p>
<p>　だが小惑星たちにとっては、赤い惑星が軌道を乱しながら突入してきた災厄だった。岩塊が割れ、衝突し、さらに細かな群れになって広がった。</p>
<p>　火星の表面にも傷が増えた。</p>
<p>　赤い地殻に、黒い衝突痕が無数に開く。</p>
<p>「ぶつぶつになった」</p>
<p>　十々瀬は指で火星を止めた。</p>
<p>　その指がまた表面を押し、赤い地殻に新しい大陥没を作った。</p>
<p>　火星はまだ壊れていない。</p>
<p>　だが、元の火星ではなかった。</p>
<p>　軌道は外れ、地形は崩れ、薄い大気は散り、赤い粉を宇宙に引きずっている。</p>
<p>　十々瀬は少し考えた。</p>
<p>「これ、置き場所ないなあ」</p>
<p>　彼女は火星をそっと離した。</p>
<p>　赤い惑星は、歪んだ軌道でゆっくり漂い始めた。太陽の重力に引かれ、小惑星の破片にぶつかり、砕けた赤い粉を尾のように引いている。</p>
<p>　十々瀬は、さらに遠くを見た。</p>
<p>　そこには、大きな縞模様の星があった。</p>
<p>　火星よりずっと大きい。</p>
<p>　丸く、淡い色の帯を持ち、周囲にいくつもの小さな月を従えている。</p>
<p>「大きいの、ある」</p>
<p>　木星だった。</p>
<p>　十々瀬は、それを見つけた瞬間、火星のことを少し忘れた。</p>
<p>　彼女の身体は、また大きくなり始めていた。</p>
<p>　十万キロメートル。<br>　十五万キロメートル。<br>　二十万キロメートル。</p>
<p>　火星はもう、指先についた赤い粉のように見えた。</p>
<p>　木星は、次の玩具に見えた。</p>
<p>　だがそのころ、太陽系の外縁で、別の誰かが百川十々瀬を観測していた。</p>
<p>　人類ではない。</p>
<p>　地球の文明ではない。</p>
<p>　長い時間をかけて太陽系を監視していた、異星由来の自律観測機だった。</p>
<p>　観測機は、砕けた地球、欠けた月、軌道を外れた火星、そして赤い星をつまんで遊ぶ巨大な少女を記録した。</p>
<p>　信号が、太陽系外へ送られる。</p>
<p>　内容は短かった。</p>
<p>　未確認超巨大生命体、恒星系内に出現。<br>　第三惑星、崩壊。<br>　第四惑星、軌道逸脱。<br>　対象、成長継続。<br>　文明圏への警告を要請。</p>
<p>　十々瀬は、その信号に気づかない。</p>
<p>　彼女は縞模様の星へ、楽しそうに手を伸ばしていた。</p>
<p>　百川十々瀬巨大化記録。</p>
</div><div class="chapter-nav"><a href="０７.html">← ０７</a><a href="０９.html">０９ →</a></div></section><section class="chapter" id="ch-０９"><header><h2>０９　小さな光</h2><div class="meta">草稿 / ０９_小さな光_草稿.txt</div></header><div class="prose"><p>　木星は、百川十々瀬にとって初めての大きな玩具だった。</p>
<p>　身長、約五十万キロメートル級。<br>　推定三サイズ、B約九十万キロメートル、W約二十一万キロメートル、H約三十六万キロメートル。</p>
<p>　火星をつまんだころの彼女には、木星はまだ両手で扱うほどの大きさに見えていた。だが、木星へ近づくまでの間にも、十々瀬の身体は成長を続けていた。</p>
<p>　二十万キロメートル。<br>　三十万キロメートル。<br>　五十万キロメートル。</p>
<p>　彼女の影は惑星軌道を横切り、太陽光を遮り、木星の雲頂に広大な暗い領域を作った。</p>
<p>「しましま」</p>
<p>　十々瀬は目を輝かせた。</p>
<p>　木星の縞模様は、彼女には柔らかな布の柄のように見えた。茶色、白、赤。巨大な嵐の渦さえ、彼女の指先から見れば丸い模様に過ぎない。</p>
<p>　彼女は指を伸ばし、大赤斑に触れようとした。</p>
<p>　その直前、木星の周囲に光が走った。</p>
<p>　小さな点。</p>
<p>　ひとつではない。</p>
<p>　数百、数千、さらに多く。</p>
<p>　木星の衛星軌道上に展開していた艦隊が、一斉に推進光を灯したのだ。</p>
<p>　それは人類の艦隊ではなかった。</p>
<p>　太陽系外縁を監視していた異星文明の前哨基地。</p>
<p>　氷衛星の地下海に設けられた港湾都市。</p>
<p>　木星の強い磁気圏を利用する防衛網。</p>
<p>　彼らは長いあいだ、太陽系を観測していた。地球文明にはほとんど干渉せず、外縁から静かに記録し続けていた。</p>
<p>　だが、第三惑星は崩壊した。</p>
<p>　第四惑星は軌道を外れた。</p>
<p>　そして今、未確認超巨大生命体が木星へ手を伸ばしている。</p>
<p>　彼らは沈黙を捨てた。</p>
<p>　木星圏惑星防衛軍。</p>
<p>　それが、十々瀬の前に現れた最初の異星軍だった。</p>
<p>「接近体、木星半径の数倍を超過」</p>
<p>「成長継続中。質量推定不能」</p>
<p>「第三惑星を破壊した対象と同一」</p>
<p>「全衛星都市へ退避命令」</p>
<p>「主砲、重力槍、磁気圏砲、同期完了」</p>
<p>　防衛軍の指揮艦は、氷衛星の影から浮上した。</p>
<p>　艦体は山脈ほどの長さを持ち、表面には青白い線が走っている。その周囲に、無数の護衛艦、無人砲台、機雷群、重力制御衛星が展開した。</p>
<p>　彼らにとって、それは文明圏存続をかけた戦いだった。</p>
<p>　十々瀬にとっては、木星の周りに光る細かな粒だった。</p>
<p>「あれ？　なにか飛んでる」</p>
<p>　彼女は指を止めた。</p>
<p>　木星防衛軍は、その一瞬を攻撃機会と判断した。</p>
<p>「全艦、射撃開始」</p>
<p>　宇宙が光った。</p>
<p>　重力槍が放たれた。</p>
<p>　青白い線が、木星の磁気圏を貫き、十々瀬の指先へ集まる。磁気圏砲が粒子の嵐を撃ち出し、無人機群が彼女の爪周辺へ突入した。艦隊の主砲は一斉に火を噴き、数千の光条が巨大な少女の手へ降り注ぐ。</p>
<p>　それは、地球の核攻撃とは比べものにならない出力だった。</p>
<p>　惑星間文明が、巨大ガス惑星のエネルギーを利用して放つ総力砲撃。</p>
<p>　十々瀬の指先で、光が弾けた。</p>
<p>「わ」</p>
<p>　彼女は少し目を丸くした。</p>
<p>　初めて、少しはっきりと気づいた。</p>
<p>　痛いというほどではない。</p>
<p>　だが、光がまとまって当たる感覚があった。</p>
<p>「ぱちぱちする」</p>
<p>　彼女は指を引っ込めた。</p>
<p>　防衛軍の司令部に歓声が上がりかけた。</p>
<p>「対象、手を後退」</p>
<p>「効果あり」</p>
<p>「再斉射準備」</p>
<p>　だが、その判断は早すぎた。</p>
<p>　十々瀬は怖がったのではない。</p>
<p>　面白がっただけだった。</p>
<p>「今の、きれい」</p>
<p>　彼女はもう一度、指を差し出した。</p>
<p>　まるで、火花で遊ぶ子どものように。</p>
<p>「もう一回」</p>
<p>　防衛軍は再び撃った。</p>
<p>　今度は火力を集中した。</p>
<p>　重力槍が彼女の人差し指の腹を狙い、磁気圏砲が爪の根元へ粒子を叩き込み、無人機群は近接して自爆した。</p>
<p>　光が散る。</p>
<p>　青、白、紫、赤。</p>
<p>　宇宙空間に、花のような閃光が咲いた。</p>
<p>　十々瀬は笑った。</p>
<p>「すごい、ほんとに花火みたい」</p>
<p>　防衛軍の攻撃は続いた。</p>
<p>　十々瀬は指先で光を受け止め、少し手を動かした。</p>
<p>　それだけで、艦隊の陣形が崩れた。</p>
<p>　彼女の指が木星軌道を横切り、重力制御衛星群をまとめて散らした。無人砲台は指先の影に入り、照準を失い、互いに衝突した。護衛艦の一部は、彼女の爪の近くを通過しただけで乱流と重力の変化に巻かれ、軌道を外れた。</p>
<p>「逃げるの速い」</p>
<p>　十々瀬は小さな光の群れを追った。</p>
<p>　その手が、氷衛星の近くを通った。</p>
<p>　衛星表面が揺れた。</p>
<p>　氷の地殻に亀裂が入り、地下海が噴き出し、そこに築かれていた基地都市の外殻が割れた。防衛軍の港湾施設は、彼女に触れられてすらいない。だが彼女の手が衛星の近くを横切った瞬間、重力勾配が急変し、木星と衛星のあいだに保たれていた潮汐均衡が一気に崩れたのだ。</p>
<p>「衛星都市、外殻破損」</p>
<p>「避難船、発進不能」</p>
<p>「対象の手部接近だけで地殻応力が限界」</p>
<p>「全艦、対象を衛星群から引き離せ」</p>
<p>　防衛軍は囮を出した。</p>
<p>　高速艦隊が木星から離れる方向へ光を放ちながら逃げる。十々瀬の興味を引くため、わざと明るい推進光を残した。</p>
<p>「あっちにもいる」</p>
<p>　十々瀬はそちらを見た。</p>
<p>　囮作戦は成功した。</p>
<p>　ただし、成功しすぎた。</p>
<p>　彼女が顔を向けただけで、木星の上空を覆っていた影が動き、防衛軍の主力艦隊が急激な日照と熱環境の変化を受けた。さらに、彼女の髪の先が木星の磁気圏をかすめ、帯電粒子の嵐が艦隊通信を乱した。</p>
<p>「通信、全域でノイズ」</p>
<p>「重力槍、同期不能」</p>
<p>「囮艦隊、対象視線を引き付けています」</p>
<p>「引き付けすぎだ。距離を取れ」</p>
<p>　十々瀬は囮艦隊を追って、軽く息を吹いた。</p>
<p>「ふー」</p>
<p>　宇宙に空気はない。</p>
<p>　だが彼女の吐息は、ただの空気ではなくなっていた。</p>
<p>　唇の前で押し出されたのは、微細な氷、塵、帯電粒子、木星圏に漂う希薄ガスの層だった。吐息そのものというより、彼女の前面で急に押された粒子流が壁になって艦隊へ走ったのである。囮艦隊の推進光は乱れ、船体は回転し、編隊は光の砂のように散らばった。</p>
<p>「散った」</p>
<p>　十々瀬は嬉しそうに言った。</p>
<p>　その間に、彼女のもう片方の手が木星へ触れた。</p>
<p>　指が縞模様の雲を押す。</p>
<p>　木星の大気がへこんだ。</p>
<p>　茶色と白の帯が歪み、大赤斑の縁が引き伸ばされ、巨大な渦が彼女の指先に沿って崩れた。木星そのものはまだ壊れない。だが、表面の気象構造は、人為的な、いや十々瀬的な傷を受けた。</p>
<p>「ぷにぷにしてる」</p>
<p>　彼女は驚いたように言った。</p>
<p>　木星防衛軍は、最後の兵器を起動した。</p>
<p>　衛星軌道上に隠されていた巨大な環状装置。</p>
<p>　木星磁気圏全体を利用した重力拘束網。</p>
<p>　複数の衛星、軌道砲台、重力制御塔を同期させ、対象の手を木星圏へ縛り付ける兵器だった。</p>
<p>「拘束網、展開」</p>
<p>　青い輪が宇宙に現れた。</p>
<p>　幾何学的な光が、十々瀬の手首と指の周囲に絡みつく。重力の糸が彼女の動きを遅らせ、木星の磁場が粒子の檻を作る。</p>
<p>　十々瀬は手を止めた。</p>
<p>「ん？」</p>
<p>　少し引っかかる。</p>
<p>　そんな感覚だった。</p>
<p>「これ、輪っか？」</p>
<p>　彼女は手首をひねった。</p>
<p>　拘束網がきしんだ。</p>
<p>　防衛軍の全装置が悲鳴を上げる。衛星の軌道がずれ、重力制御塔が過負荷で光り、環状装置の一部が爆ぜた。</p>
<p>「出力限界」</p>
<p>「保持不能」</p>
<p>「対象、拘束を認識。しかし抵抗動作が大きすぎる」</p>
<p>「網が持たない」</p>
<p>　十々瀬は、もう少し強く手を振った。</p>
<p>　拘束網が切れた。</p>
<p>　青い光の輪は、細かな破片になって散った。重力制御衛星は軌道を外れ、いくつかは木星大気へ落ち、いくつかは氷衛星へ衝突した。</p>
<p>「取れた」</p>
<p>　十々瀬は満足そうに言った。</p>
<p>　そして、木星の縞模様にもう一度触れた。</p>
<p>　防衛軍は、撤退命令を出した。</p>
<p>「木星圏放棄」</p>
<p>「全生存艦、外縁へ退避」</p>
<p>「対象に対する防衛行動、失敗」</p>
<p>「銀河統括航宙軍へ救援要請を送信」</p>
<p>　その信号は、太陽系を越えて送られた。</p>
<p>　木星防衛軍の残存艦隊は、光の粒となって遠ざかっていく。</p>
<p>　十々瀬はそれを少し見送った。</p>
<p>「行っちゃった」</p>
<p>　つまらなそうだった。</p>
<p>　だが、すぐに木星へ興味が戻った。</p>
<p>　彼女は木星を両手で挟み、縞模様をゆっくり撫でた。</p>
<p>　巨大なガス惑星の雲帯が乱れ、大赤斑は崩れ、衛星たちは軌道を歪められた。</p>
<p>　その上で、彼女は遠くを見た。</p>
<p>　木星防衛軍が送った信号の先に、もっとたくさんの光がある。</p>
<p>　そこから、何かが近づいてくるような気がした。</p>
<p>「次は、もっといっぱい来るかな」</p>
<p>　百川十々瀬は笑った。</p>
<p>　身長は、さらに伸びていた。</p>
<p>　五十万キロメートル。<br>　八十万キロメートル。<br>　百万キロメートル級へ。</p>
<p>　木星の縞模様は、彼女の掌の中で小さくなり始めていた。</p>
<p>　百川十々瀬巨大化記録。</p>
<p>　第九話。</p>
<p>　惑星防衛軍の光。<br></p></div><div class="chapter-nav"><a href="０８.html">← ０８</a><a href="１０.html">１０ →</a></div></section><section class="chapter" id="ch-１０"><header><h2>１０　恒星系で遊ぶ</h2><div class="meta">改稿版 / １０_恒星系で遊ぶ_改稿版.txt</div></header><div class="prose"><p>　木星防衛軍の救援要請は、太陽系外へ届いた。</p>
<p>　それを受け取ったのは、単一の惑星国家ではない。</p>
<p>　複数の恒星系を結ぶ航路網。<br>　植民惑星を保護する連合艦隊。<br>　古い星間条約に基づいて編成された、防衛共同体。</p>
<p>　恒星系連合航宙軍。</p>
<p>　その第七遠征艦隊が、太陽系外縁から土星圏外周まで先行群を進出させたとき、彼らが見たものは、すでに防衛対象としての太陽系ではなかった。</p>
<p>　第三惑星は砕けていた。</p>
<p>　衛星は欠け、第四惑星は軌道を乱し、小惑星帯は赤い砂と岩片でかき回されている。木星の雲帯は歪み、大赤斑は崩壊し、氷衛星のいくつかは軌道を外れていた。</p>
<p>　そして、その中心に、少女がいた。</p>
<p>　身長、約五百万キロメートル級。<br>　推定三サイズ、B約九百万キロメートル、W約二百十万キロメートル、H約三百六十万キロメートル。</p>
<p>　木星防衛軍と戦ったとき、百川十々瀬は百万キロメートル級に達しつつあった。だが第七遠征艦隊が到着するまでのわずかな時間に、彼女はさらに大きくなっていた。</p>
<p>　木星は、もう大きな玩具ではない。</p>
<p>　片手で包める縞模様の球だった。</p>
<p>　火星は赤い粉を引く小球。<br>　月と地球の残骸は、壊れた砂利の輪。<br>　木星の衛星群は、彼女の掌の周りに散った小さな粒。</p>
<p>　太陽だけが、まだ大きかった。</p>
<p>　それでも十々瀬には、触れられないほど遠いものではなくなっている。</p>
<p>「あったかそう」</p>
<p>　彼女は太陽を見ていた。</p>
<p>　その言葉を、第七遠征艦隊は翻訳できなかった。</p>
<p>　だが、意図は理解した。</p>
<p>　対象は恒星に興味を示している。</p>
<p>　太陽が壊されれば、この恒星系全体が終わる。</p>
<p>「全艦、戦闘配置」</p>
<p>　第七遠征艦隊の旗艦、星槍級統合指揮艦オルファンの艦橋に、青い警報灯が灯った。</p>
<p>　艦隊は、惑星防衛軍とは比べものにならない規模だった。</p>
<p>　恒星間戦艦、重力駆逐艦、空間歪曲砲艦、無人戦闘群、補給要塞、医療船、移民船団護衛部隊。太陽系外縁を半球状に包むように展開し、数万の艦影が星々を背景に並んだ。</p>
<p>「対象サイズ、五百万キロメートル級を突破」</p>
<p>「成長速度、指数的」</p>
<p>「質量推定、意味を失っています」</p>
<p>「木星圏防衛軍、残存艦より戦闘記録受信」</p>
<p>「通常砲撃、重力拘束網、磁気圏兵器、いずれも無効」</p>
<p>　艦隊司令は、しばらく黙っていた。</p>
<p>　正面の映像には、百川十々瀬の横顔が映っている。</p>
<p>　映像と言っても、全身は入らない。複数の観測艦が異なる角度から撮った断片を合成して、ようやく彼女の姿勢らしきものが見えていた。</p>
<p>　彼女は木星を片手に持ち、太陽を見ている。</p>
<p>　まるで、暖炉の火に手を伸ばそうとしている子どものように。</p>
<p>「恒星接触を阻止する」</p>
<p>　司令は言った。</p>
<p>「撃破ではない。進路を変えさせろ」</p>
<p>　それは木星防衛軍と同じ結論だった。</p>
<p>　倒すことはできない。</p>
<p>　気づかせ、そらし、遅らせる。</p>
<p>　文明の総力が、そこまで後退していた。</p>
<p>　十々瀬は、艦隊の存在に気づいた。</p>
<p>「また光ってる」</p>
<p>　彼女の視界に、太陽系外縁で集まる光の帯が映った。</p>
<p>　前より多い。</p>
<p>　木星の周りで見た粒より、ずっと多い。</p>
<p>「今度はいっぱい」</p>
<p>　彼女は嬉しそうに笑った。</p>
<p>　その笑いは、真空の中で音にはならない。</p>
<p>　しかし周囲の粒子と塵、木星圏から散ったガスを震わせ、艦隊のセンサーに巨大な波形として現れた。</p>
<p>「対象、艦隊を認識」</p>
<p>「敵意判定不能」</p>
<p>「表情解析、好奇心」</p>
<p>「好奇心で恒星系が壊されるぞ」</p>
<p>　戦闘が始まった。</p>
<p>　第七遠征艦隊は、距離を取ったまま第一斉射を放った。</p>
<p>　空間歪曲砲が、彼女の手と太陽の間に歪みを作る。重力駆逐艦が局所重力井戸を発生させ、彼女の指先を横へ引こうとする。無人戦闘群は散開し、彼女の視界に入るように光を点滅させながら、誘導弾を撃ち込んだ。</p>
<p>　十々瀬の手の前で、宇宙がきらめいた。</p>
<p>「わ、線香花火みたい」</p>
<p>　彼女は太陽へ伸ばしかけた手を止めた。</p>
<p>　艦隊は、その反応を見て出力を上げた。</p>
<p>「進路変更確認」</p>
<p>「成功だ、対象の注意を引けている」</p>
<p>「第二波、全砲門開け」</p>
<p>　数万の艦が、同時に火を放つ。</p>
<p>　太陽系外縁に、人工の星雲が生まれた。</p>
<p>　粒子砲の帯。<br>　反物質弾頭の閃光。<br>　重力波の干渉縞。<br>　空間歪曲の黒い裂け目。</p>
<p>　それらが百川十々瀬の腕、頬、肩へ集まっていく。</p>
<p>　彼女は目を細めた。</p>
<p>「前のより、きれい」</p>
<p>　痛みはない。</p>
<p>　ただ、光が多い。</p>
<p>　肌の上でぱちぱち弾ける。</p>
<p>　少しだけくすぐったい。</p>
<p>「くすぐったいかも」</p>
<p>　彼女は肩をすくめた。</p>
<p>　その動作で、艦隊の前衛が崩れた。</p>
<p>　肩の動きが周囲の塵と微粒子を押し、彼女の髪が作った帯電粒子の流れが艦隊陣形を横断した。重力駆逐艦は照準を失い、無人戦闘群は互いの制御信号を干渉させ、空間歪曲砲艦の一部は自らの歪みに巻き込まれた。</p>
<p>「前衛、散開」</p>
<p>「第十二無人群、消失」</p>
<p>「重力井戸、制御不能」</p>
<p>「対象の身じろぎだけで、陣形が維持できません」</p>
<p>　十々瀬は、艦隊へ手を伸ばした。</p>
<p>　捕まえるつもりではない。</p>
<p>　光る粒を近くで見たかっただけだった。</p>
<p>　掌が土星圏外周の戦域を覆う。</p>
<p>　第七遠征艦隊の多くが、影に入った。</p>
<p>　星明かりが消え、太陽光が遮られ、艦体表面の温度が急激に変化する。光学センサーは巨大な肌色の壁だけを映し、重力センサーは彼女の指の移動を惑星接近と誤認した。</p>
<p>　だが、艦隊の後方監視網が最後に記録した影は、指ではなかった。十々瀬が身を乗り出したことで、黒い衣装に包まれた胸元の曲面が視界外から滑り込み、外縁補給群の上をゆっくり塞いだのである。彼女は前方の太陽を見ていて、その接近には気づいていない。補給群の航路灯は、巨大な曲面の影の下で一斉に消え、通信記録には「恒星光遮断、重力面接近、退避不能」という三つの語だけが残った。</p>
<p>「回避、回避」</p>
<p>「掌が来る」</p>
<p>「距離が足りない」</p>
<p>　十々瀬の指が、艦隊の端をかすめた。</p>
<p>　それだけで、数百隻が消えた。</p>
<p>　直接潰されたのではない。</p>
<p>　指先の周囲で空間が歪み、艦隊の軌道が乱れ、互いに衝突し、推進方向を失って散った。いくつかの艦は、彼女の掌紋の浅い谷に捕まり、光る埃のように張りついた。</p>
<p>「あ、ついた」</p>
<p>　十々瀬は掌を顔に近づけた。</p>
<p>　艦隊にとって、それは地獄のような接近だった。</p>
<p>　掌に捕らわれた艦は、巨大な皮膚の溝を山脈のように見上げていた。周囲には他の艦の残骸があり、遠くでは十々瀬の顔が惑星より大きく迫っている。</p>
<p>「これ、船？」</p>
<p>　彼女は小さくつぶやいた。</p>
<p>　掌の上の艦隊には、声は届かない。</p>
<p>　代わりに、振動だけが走った。</p>
<p>　艦体が軋み、船内の警報が鳴り、乗員たちは初めて、自分たちが敵の掌の上にいることを理解した。</p>
<p>「対象、捕獲艦を観察中」</p>
<p>「救出不能」</p>
<p>「捕獲艦隊、信号途絶」</p>
<p>　十々瀬は掌を軽く払った。</p>
<p>　艦船が散った。</p>
<p>　いくつかは宇宙へ戻り、いくつかは木星の方向へ飛び、いくつかは太陽へ向かう軌道に投げ出された。</p>
<p>「小さすぎて、よく見えない」</p>
<p>　彼女は少し残念そうだった。</p>
<p>　艦隊司令は、最後の作戦を決めた。</p>
<p>　恒星系規模の空間歪曲。</p>
<p>　太陽と外縁軌道の重力を利用し、十々瀬の進路をわずかにそらす。成功すれば、彼女を太陽から遠ざけられる。失敗すれば、艦隊の半数以上が歪曲場に飲まれる。</p>
<p>「実行」</p>
<p>　艦隊が散開した。</p>
<p>　何万もの艦が、太陽系を包む巨大な陣を描く。重力波が重なり、空間に淡い輪が浮かび上がった。</p>
<p>　十々瀬はそれを見た。</p>
<p>「輪っかだ」</p>
<p>　彼女は以前、木星で見た拘束網を思い出した。</p>
<p>　青い輪。</p>
<p>　手首に絡んだ、少し引っかかる玩具。</p>
<p>　今度の輪は、もっと大きい。</p>
<p>　外太陽系を横切るほどの、光の輪。</p>
<p>「大きい輪っか」</p>
<p>　十々瀬は、輪に手を伸ばした。</p>
<p>　艦隊は歪曲場を起動する。</p>
<p>　空間が曲がり、彼女の手がわずかに太陽から逸れた。</p>
<p>「お？」</p>
<p>　十々瀬は面白がった。</p>
<p>　自分の手が、思った方向と少し違う場所へ進む。</p>
<p>　彼女はそれに逆らって、手を動かした。</p>
<p>　歪曲場が悲鳴を上げた。</p>
<p>　艦隊の半数が過負荷に陥り、補給要塞が光を失い、重力駆逐艦が陣形から弾き出される。それでも輪は保たれた。</p>
<p>「強い」</p>
<p>　十々瀬は笑った。</p>
<p>　そして、まず片手を大きく回した。</p>
<p>　光の輪を、外側から撫で崩すように。</p>
<p>　恒星系連合航宙軍の最大作戦は、その瞬間、玩具になった。</p>
<p>　彼女の指が歪曲場の端に触れ、艦隊の配置が崩れる。空間の輪はねじれ、太陽系外縁の航路網は折れ曲がり、何千もの艦が予定外の方向へ跳ね飛ばされた。</p>
<p>　その混乱のさらに外側で、彼女の足先がわずかに位置を変えた。白いサンダルの先、黒いレッグウェアから覗く足の指の影が、警戒線の端をまたいだだけで、数十の無人観測基地が連鎖的に沈黙した。十々瀬は太陽の輪に夢中で、足元の光点が消えたことには最後まで気づかなかった。</p>
<p>　十々瀬は、輪を引っ張った。</p>
<p>　歪曲場が破れた。</p>
<p>　宇宙に、音のない閃光が走った。</p>
<p>　艦隊陣形は壊滅した。</p>
<p>　太陽系外縁の空間は、乱れた航跡、漂う艦体、散った光、ねじれた重力波で満たされた。</p>
<p>　第七遠征艦隊は敗北した。</p>
<p>　しかし、目的の一部は達成していた。</p>
<p>　十々瀬の注意は、太陽から逸れていた。</p>
<p>　彼女は壊れた光の輪の破片を見て、楽しそうに笑っていた。</p>
<p>「これ、きれいだった」</p>
<p>　司令艦オルファンは、半壊しながらも最後の通信を送った。</p>
<p>　宛先は、さらに遠い銀河中枢。</p>
<p>　銀河統括航宙軍。</p>
<p>　通信内容は、短く、絶望的だった。</p>
<p>　恒星系連合第七遠征艦隊、交戦。<br>　対象、百川十々瀬。<br>　サイズ、五百万キロメートル級以上、成長継続。三サイズはB約九百万キロメートル以上、W約二百十万キロメートル以上、H約三百六十万キロメートル以上。<br>　恒星系規模歪曲場、破断。<br>　通常艦隊戦力、無効。<br>　銀河級対応を要請。</p>
<p>　十々瀬は、その信号を知らない。</p>
<p>　彼女は太陽系を見回していた。</p>
<p>　壊れた地球。<br>　欠けた月。<br>　傷ついた火星。<br>　乱れた木星。<br>　散った艦隊。<br>　そして、まだ燃えている太陽。</p>
<p>　恒星系は、彼女にとって玩具箱のようだった。</p>
<p>　でも、少し狭い。</p>
<p>「もっと向こうにも、いっぱいあるよね」</p>
<p>　彼女は星々の方を見た。</p>
<p>　太陽系の外。</p>
<p>　銀河の中。</p>
<p>　無数の光が、遠くに並んでいる。</p>
<p>　十々瀬の身体は、また大きくなり始めた。</p>
<p>　五百万キロメートル。<br>　七百万キロメートル。<br>　一千万キロメートル級へ。</p>
<p>　太陽系の惑星たちは、彼女の周囲で少しずつ小さくなっていく。</p>
<p>　そして、遠い銀河の軍隊が、彼女の方へ動き始めていた。</p>
<p>　百川十々瀬巨大化記録。</p>
<p>　第十話。</p>
<p>　恒星系の玩具箱。<br></p></div><div class="chapter-nav"><a href="０９.html">← ０９</a><a href="１１.html">１１ →</a></div></section><section class="chapter" id="ch-１１"><header><h2>１１　銀河の防衛線</h2><div class="meta">再改稿版 / １１_銀河の防衛線_再改稿版.txt</div></header><div class="prose"><p>　恒星系連合航宙軍第七遠征艦隊の最後の通信は、銀河統括航宙軍の辺境管制網に、遅れて届いた。</p>
<p>　通信は、映像ではなかった。<br>　映像として成立するだけの距離感が、すでに壊れていた。</p>
<p>　記録に残っていたのは、太陽系外縁から放たれた断片的な座標列、歪んだ重力波形、そして翻訳不能なほど拡大された少女の輪郭である。</p>
<p>　対象名、百川十々瀬。<br>　推定身長、約三光年。<br>　キロメートル換算、約二十八兆三千八百二十一億キロメートル。<br>　推定三サイズ、B約五光年、W約一光年前後、H約二光年。<br>　B換算、約四十七兆三千三十六億キロメートル。</p>
<p>　銀河統括航宙軍の記録官は、最初その数値を誤記だと考えた。</p>
<p>　一光年は、約九兆四千六百七億キロメートル。<br>　太陽から地球までの平均距離、一天文単位は約一億四千九百六十万キロメートル。<br>　太陽系でもっとも外側の古い惑星軌道を基準にしても、せいぜい数十億キロメートルから百億キロメートル台の尺度で語られる。</p>
<p>　対して、百川十々瀬の身長は約三光年。</p>
<p>　太陽系は、彼女の身体の前では点ではなく、点になる前の計算誤差だった。</p>
<p>　実在の太陽は直径約百三十九万キロメートル。<br>　木星は直径約十四万二千九百八十四キロメートル。<br>　地球は直径約一万二千七百五十六キロメートル。</p>
<p>　それらの数値は、少女の巨大さを証明するための物差しとしてだけ、かろうじて意味を残していた。</p>
<p>　銀河統括航宙軍第一防衛線は、近傍恒星圏の外側に構築された。</p>
<p>　恒星を盾にはしない。<br>　居住星系を戦場にはしない。<br>　艦隊と航路標識だけで、対象の進路をそらす。</p>
<p>　それが、作戦の名目だった。</p>
<p>　だが、銀河統括航宙軍そのものは、人類の延長ではなかった。</p>
<p>　第一防衛線に参加した主力種族の一つ、環星巨人族は、平均身長約三十四万キロメートル。現人類の約二億倍の背丈を持つ、スペースファンタジーじみたヒューマノイドである。</p>
<p>　彼らの生活圏では、扉一枚が約四十万キロメートル、居室の天井高が約二百万キロメートル、都市一つの直径が十億キロメートルに達した。艦艇も、武器も、食器も、文字も、道路も、遊具も、彼らの身体倍率に合わせて巨大化している。彼らにとって惑星は家屋の基礎材であり、小型恒星は暖炉に近かった。</p>
<p>　それでも、十々瀬は桁が違った。</p>
<p>　環星巨人族の兵士が三十四万キロメートルなら、十々瀬の三光年は約二十八兆三千八百二十一億キロメートル。身長差は八千万倍を超える。人類と環星巨人族の差を、そのままもう一度、さらに大きく引き延ばしたような隔たりだった。</p>
<p>「対象、第一防衛線へ接近」</p>
<p>「距離、三・二光年。キロメートル換算、約三十兆二千七百四十三億」</p>
<p>「二・八光年。約二十六兆四千九百億キロメートル」</p>
<p>「距離計が逆転しています。対象の指先が、こちらの空間基準をまたいでいます」</p>
<p>「空間隔壁、出力最大」</p>
<p>　亜光速戦艦群が星間空間へ展開し、重力帆が何十もの恒星風を受けて薄く広がる。恒星風砲は恒星の放射を束ね、空間隔壁は恒星と恒星の間に透明な壁を立てた。</p>
<p>　それらは現実の太陽系よりもはるかに巨大な、物語上の軍事構造だった。</p>
<p>　星間都市を持つ巨人族のために造られた航宙艦は、一隻で地球と月の距離を越える全長を持つ。要塞艦の主砲身は百万キロメートル級で、通常の惑星文明なら、それだけで神話になる。</p>
<p>　だが第一防衛線は、銀河地図の上では一本の弧だった。<br>　十々瀬から見ると、それは星と星の間に張られた細い光の糸でしかなかった。</p>
<p>「わ、遠くまで光ってる」</p>
<p>　彼女は太陽系を振り返らなかった。</p>
<p>　足元という概念は、もうほとんど意味を失っている。以前なら空だった場所、星空だった場所の中に、彼女の膝や腕や髪が漂っていた。太陽はまだ熱い粒として残っていたが、その実在の直径百三十九万キロメートルという数値さえ、彼女の指幅と比べれば光の粉を説明するための注釈でしかない。</p>
<p>　太陽系の惑星軌道は、ひとつの広い渦ではなかった。<br>　彼女にとっては、散らした砂の周囲に引かれた、ほとんど見えない円だった。</p>
<p>　十々瀬は片手を伸ばした。</p>
<p>　黒い衣装に包まれた胸元の曲面が、背後の星々をまとめて隠した。航宙軍の遠距離観測網には、数光年幅の星空が突然消え、そこに柔らかな輪郭を持つ暗い弧が現れたように記録された。</p>
<p>　彼女が手を伸ばす姿勢を取ったことで、その前方の張り出しは指先よりも広い範囲に先に影を落とした。第一防衛線の右翼にいた艦隊群は、十々瀬の視界にも入らないまま、胸元の曲面が作る重力勾配へ吸い寄せられた。衝突ではない。巨大な身体の前面が近づいたことで、艦隊の基準空間そのものが押し曲げられ、隊列は柔らかな黒い弧の手前で薄い膜のように潰れていった。</p>
<p>　その指先が第一防衛線へ近づいただけで、残る艦隊の時間同期が乱れた。</p>
<p>　航宙軍は撃った。</p>
<p>　恒星風砲が、複数の恒星から集めた熱と粒子を帯にして放つ。亜光速弾体が暗黒の海を走り、重力帆艦隊は彼女の手首周辺へ干渉波を重ねた。環星巨人族の要塞艦群は、彼ら自身の手で扱える大きさに合わせた百万キロメートル級の兵器を、一斉に光らせた。</p>
<p>　十々瀬の目には、それが小さな線香花火の列に見えた。</p>
<p>「また花火？」</p>
<p>　彼女は笑った。</p>
<p>　その表情変化だけで、周囲数光年、すなわち数十兆キロメートルの微細な塵が波紋を作り、第一防衛線の観測座標に巨大な誤差が生じた。</p>
<p>　砲撃は彼女の指に届いた。</p>
<p>　光が肌の表面で散り、空間歪曲が爪の縁で薄くひしゃげる。重力帆の干渉波は、彼女の指紋の谷に沿って流れ、艦隊側の計算機には「地形に沿って兵器が滑落した」と記録された。</p>
<p>「ちょっと、ぴりぴりする」</p>
<p>　十々瀬は人差し指を振った。</p>
<p>　ただ、それだけだった。</p>
<p>　星と星の間に張られていた防衛線が、ほどけた。</p>
<p>　亜光速艦隊の隊列は光の粉になり、重力帆は裂けた薄紙のように丸まった。空間隔壁は支点を失って内側へ倒れ、恒星風砲の照準線は別々の方向へねじれた。</p>
<p>　環星巨人族の百万キロメートル級要塞艦も、彼女の指先から見れば、爪の縁に浮いた微かな光点でしかなかった。要塞艦の艦橋では、三十四万キロメートル級の兵士たちが、彼ら自身より八千万倍以上も大きい少女の指紋を地形図として見上げていた。</p>
<p>　第一防衛線は、破られたのではない。<br>　払われた。</p>
<p>　航宙軍の記録官は、後にこの現象を「第一光糸払拭」と名づけた。</p>
<p>　同じ記録には、主戦域から外れた別の欠損も残っている。彼女が首を少し傾げた際、うなじの後ろを流れた淡い髪の房が長い弧を描き、背後の観測中継網をまとめて横切った。十々瀬は振り返ってさえいない。だが数光年にわたる中継灯は、柔らかな髪の影に撫でられた順番で消え、以後その宙域は「後頸部遮蔽帯」と呼ばれる空白になった。</p>
<p>　十々瀬にとっては、指に絡んだ糸くずを取っただけだった。</p>
<p>「あ、取れた」</p>
<p>　彼女は満足そうに手を開いた。</p>
<p>　その掌の向こうで、複数の恒星間航路が歪み、避難船団の予定進路が星図から消えた。居住星系そのものはまだ壊れていない。だが、そこへ行く道と、そこから逃げる道が、地図の上で同じ形を保てなくなっていた。</p>
<p>「対象、第一防衛線を通過」</p>
<p>「通過ではありません。防衛線が存在定義を喪失」</p>
<p>「対象分類を更新します」</p>
<p>　銀河統括航宙軍は、このとき初めて彼女を惑星級でも恒星系級でもないものとして扱った。</p>
<p>　銀河地形変更存在。</p>
<p>　その分類名が発令されたとき、十々瀬は近くの恒星を眺めていた。</p>
<p>　実在する恒星間距離は、最も近い恒星でさえ数光年、数十兆キロメートルに達する。</p>
<p>　だが今の彼女にとって、その距離は身を少し乗り出せば届きそうに見える、暗い部屋の中のビー玉の間隔だった。</p>
<p>「こっちにも、明るいビー玉がある」</p>
<p>　彼女は嬉しそうに、さらに銀河の内側へ上体を少し寄せるように手を伸ばした。<br></p></div><div class="chapter-nav"><a href="１０.html">← １０</a><a href="１２.html">１２ →</a></div></section><section class="chapter" id="ch-１２"><header><h2>１２　星間航路をほどく</h2><div class="meta">改稿版 / １２_星間航路をほどく_改稿版.txt</div></header><div class="prose"><p>　第一防衛線の喪失後、銀河統括航宙軍は戦場を作り直した。</p>
<p>　作戦区域は、近傍恒星圏から数百光年に拡大された。<br>　対象、百川十々瀬。<br>　推定身長、数十光年級から数百光年級へ移行中。<br>　推定三サイズ、B数十光年級後半から数百光年級、W十数光年級から百光年級未満、H数十光年級から数百光年級。</p>
<p>　もはや彼女の全身を一枚の図に収めることはできない。</p>
<p>　観測艦が捉えられるのは、髪の一部、指先の影、膝らしき曲線、星間塵の流れで推定される呼吸の痕跡だけだった。そこへ時折、黒い衣装に包まれた胸元の曲面が観測図の端を横切る。全体像は分からない。ただ、数十光年幅の航路群が同時に暗くなり、星間塵の流れが押し退けられるため、そこに彼女の前面が近づいたのだと後から推定できるだけだった。</p>
<p>　銀河統括航宙軍は、彼女を止めることを諦めた。</p>
<p>　次に選ばれた方針は、隠すことだった。</p>
<p>　居住星系へ伸びる恒星間航路を折り畳み、避難船団の光を消し、航路標識を偽装する。空間遮断帯によって、彼女の前方に無人恒星域だけが見えるようにする。</p>
<p>　文明圏そのものを、銀河地図の裏側へ隠す。</p>
<p>「第二防衛線、展開完了」<br>「航路光量、一パーセント以下」<br>「避難船団、沈黙航行へ移行」</p>
<p>　だが、十々瀬は見つけた。</p>
<p>　彼女の目には、星と星の間を走る航路標識の列が、暗い部屋に細く残った一本のイルミネーションの筋のように見えていた。</p>
<p>「あれ、まだ光ってる」</p>
<p>　十々瀬は首をかしげた。</p>
<p>　その動きで、数十光年に広がる星間ガスが揺れ、遮断帯の端がわずかにたわむ。航宙軍の観測網は、そのたわみを巨大な重力波として記録した。</p>
<p>「対象、航路光を視認」<br>「光量は落としているはずだ」<br>「対象の視覚尺度が変化しています。隠蔽効果、低下」</p>
<p>　十々瀬は、指を伸ばした。</p>
<p>　爪の先だけで、複数恒星圏を覆う影が落ちる。<br>　その影の下で、航路標識は細い糸のように震えた。</p>
<p>　同時に、指を伸ばすために少し前屈みになった胸元が、別の航路帯を視界外から圧した。接触したというより、巨大な曲面が近づいたことで星間塵の層と航路基準点がまとめて押し流されたのである。十々瀬は指先の細い飾り紐だけを見ていて、胸元の下で第三避難航路が潰れたことには気づかなかった。</p>
<p>「これ、絡まってる」</p>
<p>　彼女は、悪気なくそう言った。</p>
<p>　航宙軍には、それが何を意味するのか理解できなかった。<br>　理解できたときには、もう遅かった。</p>
<p>　十々瀬は光の濃い節をつまんだ。</p>
<p>　実際には、彼女が掴んだのは航路標識そのものではない。航路標識と航路計算と空間折畳みの基準点が重なった、星図上の結び目である。</p>
<p>　だが彼女にとっては、光が少し濃く見える細い飾り紐の結び目だった。</p>
<p>「んー……こっち？」</p>
<p>　彼女が軽く引いた。</p>
<p>　数十の植民星系を結ぶ距離が伸びた。<br>　別の航路は縮んだ。<br>　隣り合っていたはずの補給点が観測上は遠ざかり、遠方だったはずの無人恒星が避難船団の正面へ現れた。</p>
<p>　星間距離の基準が狂ったのである。</p>
<p>「航路座標、全面不一致」<br>「第二避難網、自己交差」<br>「遮断帯が対象指先へ付着」</p>
<p>　空間遮断帯は、十々瀬の爪に薄い膜のように貼りついた。</p>
<p>　彼女は目を細める。</p>
<p>「なにこれ。セロハンみたい」</p>
<p>　爪先を軽く振った。</p>
<p>　それだけで、遮断帯を支えていた艦隊群が周囲の空間ごと散った。</p>
<p>　爆発の光は小さすぎて、十々瀬にはほとんど見えなかった。彼女が気づいたのは、爪が少しだけきれいになったことだけである。</p>
<p>「取れた」</p>
<p>　この一連の現象は、後に「第二航路解舒」と呼ばれる。</p>
<p>　航路は破壊されたのではない。<br>　ほどかれた。</p>
<p>　その結果、文明圏の星図は何度も更新され、更新されるたびに別の避難計画が無効化された。星系は残っている。惑星も残っている。だが、それらを結ぶ関係が、少女の指先と、彼女自身も意識していない胸元の圧力で、別の形へ変えられていた。</p>
<p>　後の解析では、いくつかのビーコン群が彼女の瞳に映り込んでいたことも分かっている。十々瀬にとっては視界の端で瞬いた光の粒にすぎず、網膜上の反射として流れて消えた。外部記録では、その瞬間にビーコン群の送信波が一括で途絶していた。</p>
<p>　銀河統括航宙軍は結論した。</p>
<p>　防衛線では足りない。<br>　航路隠蔽でも足りない。</p>
<p>　銀河構造そのものを、彼女の視界から隠さなければならない。</p>
<p>　十々瀬は、ほどいた光の線を眺めて笑った。</p>
<p>「こっちのほうが、きれいかも」</p>
<p>　その言葉とともに、銀河腕の奥で、無数の星団が彼女の次の遊び場として輝き始めた。<br></p></div><div class="chapter-nav"><a href="１１.html">← １１</a><a href="１３.html">１３ →</a></div></section><section class="chapter" id="ch-１３"><header><h2>１３　銀河をかき混ぜる</h2><div class="meta">改稿版 / １３_銀河をかき混ぜる_改稿版.txt</div></header><div class="prose"><p>　銀河統括航宙軍主力艦隊は、銀河腕の中腹で待ち受けた。</p>
<p>　対象、百川十々瀬。<br>　推定身長、数千光年級。<br>　推定三サイズ、B一万光年級に迫る規模、W二千光年級前後、H数千光年級。<br>　成長継続時、銀河腕スケールへ到達する見込み。</p>
<p>　彼女の髪は星間雲をかすめ、肩の輪郭は複数の星団を背景に黒い弧として浮かんだ。さらに前面では、黒い衣装に包まれた胸元の張り出しが、銀河腕の明るい帯を大きく隠していた。指一本の幅を測るだけで、観測班は小型星団の直径を比較単位にしなければならなかったが、胸元の影はそれよりも広く、星形成領域の分布図に巨大な欠けを作っていた。</p>
<p>　十々瀬は、銀河腕を見ていた。</p>
<p>「わあ、砂場みたい」</p>
<p>　星団は、彼女には光る砂の集まりに見えた。<br>　星間雲は、薄い綿のように見える淡い光の層。<br>　暗黒星雲は、その綿に混じった黒い埃のような影。</p>
<p>　銀河統括航宙軍は、その砂場の中に主力を並べた。</p>
<p>　星団要塞。<br>　超重力砲。<br>　恒星炉弾。<br>　銀河腕を横断する防衛陣。</p>
<p>　各文明圏は、居住星系を切り離しながら後退していた。航路を捨て、補給点を捨て、星図に記載された名前を一つずつ空白に戻していく。</p>
<p>「主力艦隊、射程内」<br>「対象は星間雲に接触」<br>「星形成領域、重力平衡を喪失」</p>
<p>　十々瀬は、手を入れた。</p>
<p>　星間雲の中へ。</p>
<p>　彼女にとっては、柔らかな綿に見える光の層へ指を差し入れるような感覚だった。実際に触れているのは手触りではなく、密度の違うガスと光の偏りである。指の周囲でガスが渦を巻き、まだ星になりきっていない濃い領域が引き裂かれる。新しい恒星を生むはずだった場所が広がり、薄まり、別の方向へ流れていった。</p>
<p>「ふわふわして見える」</p>
<p>　彼女が指を動かすたび、星形成領域は地図から消えた。</p>
<p>　だが最大の欠損は、彼女が見ていない場所で起きた。十々瀬が身を乗り出した拍子に、胸元の巨大な曲面が銀河腕の別の枝へ近づき、濃い星間雲をゆっくり押し広げたのである。そこには航宙軍の迂回陣地があったが、彼女の視線は指先のふわふわした感触に向いたままだった。記録上、その陣地は「敵攻撃を受けた」のではなく、「背景ガスごと圧し退けられた」としか表現できなかった。</p>
<p>　軍は総攻撃を開始した。</p>
<p>　超重力砲が発射され、局所的な重力崩壊を彼女の手の甲へ投げつける。恒星炉弾が、内部に封じた人工恒星の熱を解放し、星団要塞群が同時に砲門を開いた。</p>
<p>　銀河腕の一部が、人工の夜明けに染まった。</p>
<p>　十々瀬は目を輝かせた。</p>
<p>「すごい、火花がいっぱい」</p>
<p>　その火花の一つ一つが、文明圏の最大兵器だった。</p>
<p>　だが彼女の肌の上では、光の粒にすぎない。熱は届く前に拡散し、重力崩壊は彼女の身じろぎで引き伸ばされ、空間歪曲は指紋の谷に沿って流れた。</p>
<p>　十々瀬はくすぐったそうに笑った。</p>
<p>　笑い声は真空には響かない。<br>　しかし重力的な揺らぎとして、艦隊陣形を揺らした。</p>
<p>「陣形維持不能」<br>「第三星団軌道、変位」<br>「第五要塞群、重力基準を喪失」</p>
<p>　笑っただけだった。</p>
<p>　それでも、複数の星団軌道が崩れた。</p>
<p>　彼女は指を横へ動かす。</p>
<p>　銀河腕に、巨大な指跡が残った。<br>　星間雲は左右へ押し分けられ、若い恒星群は流砂のように位置を変えた。そこにあった航宙軍の防衛陣は、星図上ではまだ存在していることになっていたが、実際にはもう同じ場所に集まっていなかった。</p>
<p>　十々瀬がくすぐったさに腹を少し引いたとき、腹部の影が別の星雲帯を横切った。直接触れてはいない。それでも、巨大な身体が動くことで周辺の重力場が傾き、未成熟の恒星群は淡い粉のように流れた。彼女は笑っているだけで、自分の視界外で銀河腕の側面が薄く削れたことを知らなかった。</p>
<p>「ここ、混ぜたらきれいになりそう」</p>
<p>　十々瀬は両手を使った。</p>
<p>　銀河腕の淡い光が、彼女の手の間でかき混ぜられる。<br>　星団の縁が伸び、星間雲が渦を巻き、暗黒星雲が細い筋になって流れた。</p>
<p>　航宙軍主力艦隊は、その渦の中で散った。</p>
<p>　後世の記録では、この戦闘を「銀河腕攪拌戦」と呼ぶ。</p>
<p>　戦闘、という語は正確ではない。</p>
<p>　片方は総力を尽くして撃った。<br>　もう片方は、光る砂場を手でならした。</p>
<p>　銀河統括航宙軍は主力を失った。</p>
<p>「銀河単位での防衛は不可能」</p>
<p>　最後の統合作戦司令部は、そう結論した。</p>
<p>　十々瀬は、手のひらに残った星間雲の淡い光を眺めていた。</p>
<p>「手、きらきらしてる」</p>
<p>　そして彼女は、銀河腕の外へ視線を向けた。</p>
<p>　そこには、さらに小さな渦がいくつも浮かんでいた。<br></p></div><div class="chapter-nav"><a href="１２.html">← １２</a><a href="１４.html">１４ →</a></div></section><section class="chapter" id="ch-１４"><header><h2>１４　銀河団の泡</h2><div class="meta">改稿版 / １４_銀河団の泡_改稿版.txt</div></header><div class="prose"><p>　銀河腕攪拌戦の後、百川十々瀬は銀河の外側へ出た。</p>
<p>　出た、という表現は正確ではない。</p>
<p>　彼女の身体が大きくなりすぎたため、銀河が彼女の周囲に収まったのである。</p>
<p>　対象、百川十々瀬。<br>　推定身長、銀河全域級。<br>　推定三サイズ、B銀河直径を大きく超過、W銀河腕スケール、H銀河円盤スケール。<br>　成長時、銀河団スケールへ移行。</p>
<p>　それまで星空だったものは、彼女の視界の中で一枚の渦模様になった。</p>
<p>　銀河円盤。<br>　中心核。<br>　腕状構造。<br>　暗い塵の帯。</p>
<p>　文明が何万年もかけて名づけた星域は、十々瀬には手元の模様に見えていた。</p>
<p>「こうなってたんだ」</p>
<p>　彼女は感心したように、銀河を見下ろした。</p>
<p>　銀河統括航宙軍の残存艦隊は、銀河外縁へ退いていた。</p>
<p>　主力はすでにない。<br>　残っているのは、敗走艦隊、観測機、避難船団、そして銀河間空間に設置された最後の砲台群だけである。</p>
<p>　彼らは、複数銀河の重力を利用した包囲陣を作った。</p>
<p>　局所銀河群全体を使った、最後の防壁だった。</p>
<p>「対象、銀河外縁へ接触」<br>「外縁恒星群、流出」<br>「包囲陣、まだ維持」</p>
<p>　十々瀬は人差し指を伸ばし、銀河の縁をなぞった。</p>
<p>　その姿勢に合わせて、胸元の巨大な張り出しが観測図の上辺を暗く塞いだ。指先より先に、黒い衣装の曲面がいくつかの矮小銀河群へ影を落とし、そこに置かれていた退避中継網を沈黙させた。十々瀬はなぞっている銀河のふちだけを見ている。胸元の下で別の小さな渦が形を失ったことには気づかなかった。</p>
<p>　そこにあった外縁恒星群が、淡い粉のように流れた。</p>
<p>　銀河円盤の端に、巨大な指跡が残る。<br>　渦模様は少しだけ崩れ、恒星の流れは新しい曲線を描いた。</p>
<p>「ふち、さらさら」</p>
<p>　彼女は楽しそうだった。</p>
<p>　その指跡の下で、航宙軍の退避座標は崩壊した。座標とは、背景になる銀河と星団が安定しているという前提で作られている。だがその背景そのものが、指でなぞられ、胸元の影で隠され、形を変えた。</p>
<p>　残存艦隊は撃った。</p>
<p>　銀河間砲撃。<br>　重力レンズを束ねた焦点砲。<br>　矮小銀河の暗黒物質分布を利用した干渉爆雷。</p>
<p>　それらは、文明が銀河の外へ持ち出せる最大の抵抗だった。</p>
<p>　十々瀬の頬に、小さな光が散った。</p>
<p>「ん？」</p>
<p>　彼女は指先だけを頬へ寄せた。</p>
<p>　痛みではない。<br>　熱でもない。<br>　微かな静電気のような感覚だけがあった。</p>
<p>「ぱちってした」</p>
<p>　その仕草で、周囲の小銀河が揺れた。</p>
<p>　十々瀬は近くに浮かぶ矮小銀河に気づいた。</p>
<p>　それは、彼女にとって小さな渦だった。</p>
<p>「小さい渦、かわいい」</p>
<p>　彼女は親指と人差し指を寄せ、つまむ真似をした。</p>
<p>　同時に、腰をわずかにずらした。観測圏の反対側で、彼女のお尻側の質量が銀河団外縁の泡構造へ近づき、泡の薄い境界をゆっくり押し潰した。本人には座り直したほどの感覚もない。けれど、その外縁に避難していた艦隊群から見れば、宇宙の壁そのものが背後から丸く迫り、逃げ場の座標を閉じていく現象だった。</p>
<p>　つまむ、と言っても、銀河を直接握ったわけではない。周囲の重力場と外縁物質をまとめて寄せ、渦の位置をずらしただけである。</p>
<p>　だが結果は同じだった。</p>
<p>　矮小銀河は元の軌道から外れ、主銀河のそばへ並べられた。</p>
<p>「こっちのほうが、並んでてかわいい」</p>
<p>　銀河間潮汐が乱れた。</p>
<p>　包囲陣は形を失い、退避中の艦隊は自分たちがどの銀河を基準に動いているのか判断できなくなった。観測基準は崩れ、救難信号は別の方向へ曲がり、残存艦隊の配置図は一瞬で古文書になった。</p>
<p>　後世の呼称は、「局所群配列変動」。</p>
<p>　十々瀬本人の記憶では、ただ渦を並べただけだった。</p>
<p>　航宙軍は、この段階で軍としての機能を失った。</p>
<p>　彼らが守ろうとした銀河は、すでに戦場ではない。<br>　少女の手元の模様だった。</p>
<p>　十々瀬は銀河団のほうへ顔を向ける。</p>
<p>　遠くに、いくつもの光る泡が浮かんでいた。</p>
<p>「まだいっぱいある」</p>
<p>　彼女は笑った。</p>
<p>　その笑みが、銀河外縁の暗い空間に、ゆっくりと広がっていった。<br></p></div><div class="chapter-nav"><a href="１３.html">← １３</a><a href="１５.html">１５ →</a></div></section><section class="chapter" id="ch-１５"><header><h2>１５　宇宙の網目をたぐる</h2><div class="meta">改稿版 / １５_宇宙の網目をたぐる_改稿版.txt</div></header><div class="prose"><p>　銀河団は、百川十々瀬には泡の集まりに見えた。</p>
<p>　対象、百川十々瀬。<br>　推定身長、銀河団スケール。<br>　推定三サイズ、B複数銀河団を覆う規模、W銀河団内径級、H銀河団外縁級。<br>　成長継続時、宇宙大規模構造スケールへ移行。</p>
<p>　銀河は、もう一つ一つの渦ではない。<br>　泡の内側で光る粒だった。</p>
<p>　銀河団同士を結ぶフィラメントは、暗い布についた糸くずの網のように見えていた。広大なボイドは、網目の間に空いた穴だった。</p>
<p>「なんか、まとわりついて見える」</p>
<p>　十々瀬はそう言った。</p>
<p>　文明圏の最終観測網は、その言葉を拾えなかった。</p>
<p>　拾えたのは、彼女の唇が動いたことで生じた銀河団間ガスの波と、複数観測機の同時飽和だけである。</p>
<p>　航宙軍という組織は、すでに事実上存在しない。</p>
<p>　残っていたのは、銀河団ごとに散った観測中継点、避難信号、無人記録機、そして文明が自分たちの宇宙の形を最後まで測ろうとする意志だけだった。</p>
<p>「輪郭測定、再開」<br>「対象指先、フィラメント領域へ接近」<br>「前面遮蔽、同時発生。胸部曲面、複数銀河団を覆っています」<br>「座標変換、第五方式に切替」<br>「第五方式、破綻」</p>
<p>　十々瀬は、指先で宇宙の網目をつまんだ。</p>
<p>　その少し手前で、胸元の曲面もまた網目に触れていた。彼女の視界には入らない位置だったため、十々瀬は何も反応しない。だが複数の銀河団を含む薄いフィラメントが、黒い衣装の前面に押されて平たくたわみ、観測者には「指でつままれる前から宇宙の布が沈んでいた」ように見えた。</p>
<p>　もちろん、糸そのものがあるわけではない。</p>
<p>　銀河団と銀河団の間を結ぶ、物質の淡い流れ。<br>　暗黒物質の分布。<br>　数えきれない銀河の連なり。</p>
<p>　それらが、彼女の尺度では一本の細い糸に見えていた。</p>
<p>「この糸、まとわりついて見える」</p>
<p>　彼女は軽くたぐった。</p>
<p>　銀河団同士の距離が縮んだ。</p>
<p>　遠く離れていたはずの泡が寄り、ボイドの形が潰れ、宇宙大規模構造に折り目のような歪みが生じた。</p>
<p>　最終観測網は、その瞬間、三度宇宙地図を破棄した。</p>
<p>　一度目は、距離が合わなかったため。<br>　二度目は、方向が合わなかったため。<br>　三度目は、地図という概念が、彼女の指先の動きに追いつかなかったためである。</p>
<p>　四度目は、そもそも破壊の原因が指ではなかったためである。十々瀬が首を横に振っただけで、うなじから流れた髪の帯が観測網の背後を撫で、数千万光年規模の参照銀河がまとめて隠れた。彼女は髪がどこに触れたかなど知らない。だが観測者にとっては、宇宙の座標軸が背後から拭き取られたのと同じだった。</p>
<p>「観測基準、喪失」<br>「フィラメント群、接近」<br>「ボイド形状、圧縮」<br>「退避信号、背景雑音化」</p>
<p>　十々瀬は眉を寄せた。</p>
<p>　真剣な顔だった。<br>　だが、それは破壊への意志ではない。</p>
<p>　大きな刺繍のほつれを直そうとしているような顔だった。</p>
<p>「こっちを、こうして……」</p>
<p>　彼女は別の網目もつまんだ。</p>
<p>　銀河団間ガスが波打ち、観測機は波に呑まれた。逃げ延びていた艦隊の残骸や避難船団の信号は、宇宙背景放射の揺らぎに紛れ、どれが人工の声だったのか判別できなくなった。</p>
<p>　文明圏は沈黙したのではない。<br>　十々瀬に届く尺度から、外れた。</p>
<p>「んー、まだ変」</p>
<p>　十々瀬は首を傾げる。</p>
<p>　その動きだけで、複数の超銀河団の相対位置が観測上ずれた。</p>
<p>　後にこの現象を記録しようとした者たちは、「宇宙網目牽引」と呼んだ。</p>
<p>　しかし、記録名は完全ではない。</p>
<p>　彼女は引いた。<br>　たぐった。<br>　整えようとした。</p>
<p>　その全てが、宇宙にとっては地形改変だった。</p>
<p>　十々瀬は、指先にまとわりつく淡い光を見つめた。</p>
<p>　その瞳に、無数の銀河団通信ビーコンが小さな点として映った。彼女の網膜上では一瞬のきらめきにすぎない。だが外側の記録では、その反射の中に入ったビーコン群が、観測線を失って一斉に沈黙していた。十々瀬は瞬きをし、消えた光点の数を数えることもなかった。</p>
<p>「ちょっと広すぎると思ったけど、触れるんだ」</p>
<p>　それは発見だった。</p>
<p>　宇宙は、彼女の外側に広がる遠い場所ではなくなっていた。<br>　触れられるものになっていた。</p>
<p>　彼女は両手を広げる。</p>
<p>　網目の向こう、観測可能宇宙の境界に近い暗がりが、彼女の視界に入った。</p>
<p>「じゃあ、端っこもあるのかな」</p>
<p>　十々瀬は、さらに大きくなりながら、その暗がりへ手を伸ばした。<br></p></div><div class="chapter-nav"><a href="１４.html">← １４</a><a href="１６.html">１６ →</a></div></section><section class="chapter" id="ch-１６"><header><h2>１６　宇宙の外側へ</h2><div class="meta">改稿版 / １６_宇宙の外側へ_改稿版.txt</div></header><div class="prose"><p>　最後に記録された百川十々瀬の推定身長は、観測可能宇宙級だった。</p>
<p>　推定三サイズは、B観測可能宇宙の直径を超過、W超銀河団網目スケール、H観測可能宇宙級。</p>
<p>　ただし、この数値は正確ではない。</p>
<p>　正確でない、というより、比較対象が失われていた。</p>
<p>　銀河は粒になり、銀河団は泡になり、宇宙大規模構造は彼女の前に広がる淡い網目模様になっていた。距離を測るための光は、彼女の身体の一部を回り込むだけで観測限界を超えた。</p>
<p>　対象、百川十々瀬。<br>　観測可能宇宙級。<br>　成長継続。<br>　以後、分類不能。</p>
<p>　彼女は宇宙を見下ろしていた。</p>
<p>「こういう模様だったんだ」</p>
<p>　その声は、どこにも届かなかった。</p>
<p>　届かなかったのは、音が真空に伝わらないからではない。声を受け取る文明の尺度が、もう彼女の周囲に存在できなかったからである。</p>
<p>　生き残った航宙軍の信号は、まだどこかで瞬いていた。<br>　避難した文明圏の祈りも、記録機の送信も、無人観測網の最後のパルスも、完全には消えていなかった。</p>
<p>　ただ、十々瀬には届かない。</p>
<p>　彼女の目には、淡い光の細かなざわめきとしてしか映らなかった。</p>
<p>「さっきの糸、まだ曲がってる」</p>
<p>　十々瀬は指を伸ばした。</p>
<p>　けれど、宇宙の網目に最初に触れたのが指先だったとは、後の記録でも断定できない。推定三サイズのうち、胸部は観測可能宇宙の直径を超えていた。彼女が前へ身を乗り出すだけで、黒い衣装に包まれた前面の曲面が、指の到達より先にいくつものフィラメントを暗く押し込んでいた可能性が高い。</p>
<p>　宇宙の網目が、彼女の指先と胸元の影に触れる。</p>
<p>　銀河団同士の距離が縮み、別の場所では広がり、ボイドは押し潰された泡のように形を変えた。フィラメントは引き伸ばされ、絡み、ほどけ、再び別の形でつながる。</p>
<p>　宇宙地図は、最後まで完成しなかった。</p>
<p>　観測可能宇宙の内側で育った文明は、自分たちの宇宙を地図にしようとした。だがその宇宙は、少女の指先で柔らかい網のように動き、彼女自身も見ていない胸元や腹部や腰の影で、地図の外から押し潰されていた。</p>
<p>「こっちは、ちょっと狭いかも」</p>
<p>　十々瀬は脚を少したたむように、全身の向きを変えた。</p>
<p>　その動作で、観測可能宇宙の縁に近い領域が揺れた。<br>　星も銀河も、背景の微細な光になった。<br>　大規模構造も、彼女の身体の周囲では衣服についた埃ほどの存在感しか持てなくなった。</p>
<p>　彼女は、少し困ったように笑う。</p>
<p>「最初は、地面が大きいと思ってたのにな」</p>
<p>　地面。</p>
<p>　その言葉が指すものは、もう宇宙のどこにも残っていなかった。</p>
<p>　かつての地球。<br>　都市。<br>　海。<br>　山脈。<br>　月。<br>　太陽。<br>　木星。<br>　恒星系。<br>　銀河腕。<br>　銀河団。</p>
<p>　それらは、すべて彼女が通り過ぎてきた大きさの記憶になっていた。</p>
<p>　十々瀬は振り返らない。</p>
<p>　忘れたわけではない。<br>　ただ、振り返るには小さすぎた。</p>
<p>　観測網の最後の記録には、彼女の手が映っている。</p>
<p>　映っている、と表現されるが、それも厳密ではない。記録されたのは、宇宙背景の片側が不可解に暗くなり、次いで全方向の距離基準が同時に歪んだという事実だけである。</p>
<p>　後世の神話では、それを「宇宙の外側へ伸ばされた手」と呼んだ。</p>
<p>　十々瀬は指を開く。</p>
<p>　その直前、彼女は足の指をほんの少し丸めた。観測可能宇宙の境界近くに残っていた最後の参照点群は、足先側の圧力変化を「外部からの曲率異常」として記録したまま途絶した。十々瀬は足元を見ていない。自分の足の指の動きが、宇宙の端に残った目印を消したことにも気づかなかった。</p>
<p>　観測可能宇宙の境界は、壁ではなかった。<br>　端でもなかった。<br>　けれど彼女には、薄い幕のように感じられた。</p>
<p>「向こう、あるかな」</p>
<p>　彼女はその幕に触れた。</p>
<p>　宇宙は完全には壊れなかった。</p>
<p>　ただ、彼女の触れた場所から、これまで内側と呼ばれていたものの意味が変わった。銀河団の泡は揺れ、網目はほどけ、光の届く範囲は彼女の背後で小さくまとまっていく。</p>
<p>　十々瀬は、身体をさらに大きくした。</p>
<p>　もう、観測は追いつけない。</p>
<p>　彼女の髪が宇宙の網目を越え、肩が境界の向こうへ消え、胸元の巨大な曲面が最後の背景光を覆い、最後に指先だけが残った。</p>
<p>　その指先も、やがて外側へ抜けた。</p>
<p>　記録はそこで途切れている。</p>
<p>　最後に復元された言葉は、一つだけだった。</p>
<p>「ここも、ちょっと狭いかも」</p>
<p>　それが本編における、百川十々瀬の最後の観測発言である。</p>
<p>　以後、彼女の行方は通常の宇宙記録では追えない。</p>
<p>　残された宇宙には、彼女が触れた網目の歪みと、泡のように寄せられた銀河団と、外側へ向かって開いたままの暗い余白だけがあった。<br></p></div><div class="chapter-nav"><a href="１５.html">← １５</a><span></span></div></section></main></div><script>function toggleTheme(){const root=document.documentElement;root.setAttribute('data-theme',root.getAttribute('data-theme')==='dark'?'light':'dark');}function toggleWriting(){document.body.classList.toggle('vertical');}function fontSize(delta){const root=document.documentElement;const cur=parseFloat(getComputedStyle(root).getPropertyValue('--font-size'));root.style.setProperty('--font-size',Math.max(14,Math.min(30,cur+delta))+'px');}</script></body></html>
